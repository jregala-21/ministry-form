<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Setlists Archive</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #10b981;
            --service-header: #4f46e5;
            --danger: #ef4444;
            --btn-hover: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 15px;
            max-width: 900px;
            margin: auto;
            line-height: 1.6;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 25px;
            gap: 10px;
        }
        .header h1 { font-size: 1.4rem; margin: 0; }
        .back-btn {
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
        }

        /* --- Service Blocks --- */
        .service-block {
            margin-bottom: 30px;
            background: rgba(30, 41, 59, 0.6);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--service-header);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .service-title {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        /* --- Buttons --- */
        .view-btn {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px solid #818cf8;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .view-btn:hover { background: rgba(99, 102, 241, 0.2); }

        .btn-open-all {
            background: var(--accent);
            color: #064e3b;
            border: none;
        }
        .btn-open-all:hover { background: #059669; color: white; }

        .btn-delete {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* --- List Styles --- */
        .category-group { margin-bottom: 15px; }
        .category-title {
            color: var(--accent);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            border-bottom: 1px solid #334155;
            display: inline-block;
        }

        .song-row {
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .song-row span {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- PDF MODAL (Viewer) --- */
        #pdfModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            z-index: 2000;
            flex-direction: column;
        }
        .modal-header {
            padding: 12px 20px;
            background: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .close-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        #pdfContainer {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px 10px;
        }
        .pdf-frame {
            width: 100%;
            max-width: 850px;
            height: 80vh;
            border: 1px solid #334155;
            border-radius: 8px;
            background: white;
        }
        .pdf-label {
            color: white;
            margin-bottom: 8px;
            font-size: 12px;
            background: var(--service-header);
            padding: 4px 12px;
            border-radius: 20px;
        }

        @media (min-width: 600px) {
            body { padding: 40px; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📋 Setlist Archive</h1>
        <a href="setlist.html" class="back-btn">← BACK TO BUILDER</a>
    </div>

    <div id="archive-container">
        <div id="loading-indicator" style="text-align: center; color: #94a3b8; margin-top: 50px;">
            Fetching your setlists...
        </div>
    </div>

    <div id="pdfModal">
        <div class="modal-header">
            <span id="modalTitle" style="font-weight: bold; font-size: 14px;">Viewing PDF</span>
            <button class="close-btn" onclick="closeViewer()">CLOSE</button>
        </div>
        <div id="pdfContainer">
            </div>
    </div>

    <script>
        const POST_URL = "https://script.google.com/macros/s/AKfycbw11UhydEjyfPDlr5s43nddQn0rHHbRF4AIYtfNnnm3kmjkErPZm5rwCjEc18MUTVje/exec"; 
        let fullArchiveData = []; // Global storage for "Open All" logic

        async function loadArchive() {
            const container = document.getElementById('archive-container');
            try {
                const resp = await fetch(`${POST_URL}?getSetlist=true&t=${Date.now()}`);
                const items = await resp.json();
                fullArchiveData = items; 
                
                if (!items || items.length === 0) {
                    container.innerHTML = "<p style='text-align:center; color:#94a3b8;'>No setlists saved yet.</p>";
                    return;
                }

                container.innerHTML = "";
                const services = {};
                
                // Group by Service Name
                items.forEach(item => {
                    const sName = (item.serviceName || "Unnamed Service").trim();
                    if (!services[sName]) services[sName] = [];
                    services[sName].push(item);
                });

                for (const sName in services) {
                    const serviceBlock = document.createElement('div');
                    serviceBlock.className = 'service-block';
                    const escapedName = sName.replace(/'/g, "\\'");
                    
                    serviceBlock.innerHTML = `
                        <div class="service-title">
                            <span>🗓️ ${sName}</span>
                            <div class="action-group">
                                <button class="view-btn btn-open-all" onclick="openAllPDFs('${escapedName}')">OPEN ALL</button>
                                <button class="view-btn btn-delete" onclick="deleteServiceGroup(event, '${escapedName}')">DELETE</button>
                            </div>
                        </div>`;
                    
                    // Group by Category inside Service
                    const categories = {};
                    services[sName].forEach(song => {
                        const cat = song.category || "General";
                        if (!categories[cat]) categories[cat] = [];
                        categories[cat].push(song);
                    });

                    for (const cat in categories) {
                        const catGroup = document.createElement('div');
                        catGroup.className = 'category-group';
                        catGroup.innerHTML = `<div class="category-title">${cat}</div>`;
                        
                        categories[cat].forEach(song => {
                            const row = document.createElement('div');
                            row.className = 'song-row';
                            row.innerHTML = `
                                <span>${song.title}</span>
                                <button class="view-btn" onclick="openSinglePDF('${song.title.replace(/'/g, "\\'")}', '${song.pdfUrl}')">OPEN PDF</button>
                            `;
                            catGroup.appendChild(row);
                        });
                        serviceBlock.appendChild(catGroup);
                    }
                    container.appendChild(serviceBlock);
                }
            } catch (e) {
                container.innerHTML = "<p style='text-align:center; color:var(--danger);'>Error loading data. Please refresh.</p>";
            }
        }

        // --- View Logic ---

        function formatDriveUrl(url) {
            if (url.includes('view?usp=sharing') || url.includes('/view')) {
                return url.replace(/\/view.*$/, '/preview');
            } else if (url.includes('id=')) {
                const idMatch = url.match(/id=([^&]+)/);
                return idMatch ? `https://drive.google.com/file/d/${idMatch[1]}/preview` : url;
            }
            return url;
        }

        function openSinglePDF(title, url) {
            const modal = document.getElementById('pdfModal');
            const container = document.getElementById('pdfContainer');
            const titleEl = document.getElementById('modalTitle');

            container.innerHTML = `<iframe src="${formatDriveUrl(url)}" class="pdf-frame"></iframe>`;
            titleEl.innerText = title;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop background scroll
        }

        function openAllPDFs(serviceName) {
            const modal = document.getElementById('pdfModal');
            const container = document.getElementById('pdfContainer');
            const titleEl = document.getElementById('modalTitle');
            
            container.innerHTML = "";
            titleEl.innerText = `Full Flow: ${serviceName}`;

            const songs = fullArchiveData.filter(item => item.serviceName === serviceName);

            songs.forEach(song => {
                const wrapper = document.createElement('div');
                wrapper.style.width = "100%";
                wrapper.style.textAlign = "center";
                wrapper.innerHTML = `
                    <div class="pdf-label">${song.category}: ${song.title}</div>
                    <iframe src="${formatDriveUrl(song.pdfUrl)}" class="pdf-frame"></iframe>
                `;
                container.appendChild(wrapper);
            });

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            const modal = document.getElementById('pdfModal');
            document.getElementById('pdfContainer').innerHTML = "";
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // --- Delete Logic ---

        async function deleteServiceGroup(evt, serviceName) {
            if (!confirm(`Permanently delete all songs in "${serviceName}"?`)) return;
            const btn = evt.target;
            btn.innerText = "WAIT...";
            btn.disabled = true;

            try {
                await fetch(POST_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify({ action: "deleteSetlist", serviceName: serviceName })
                });
                setTimeout(loadArchive, 1500);
            } catch (e) {
                alert("Action failed.");
                btn.innerText = "DELETE";
                btn.disabled = false;
            }
        }

        window.onload = loadArchive;
    </script>
</body>
</html>
