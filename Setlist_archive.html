<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setlist Archive | Full Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --border: #334155; 
            --text-main: #f8fafc;
            --accent: #10b981; 
            --service-header: #4f46e5; 
            --danger: #ef4444;
            --chord-color: #fbbf24; 
            --header-color: #fb923c; 
            --sub-text: #94a3b8;
            --communion-purple: #a78bfa;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 16px; 
            max-width: 800px; 
            margin: auto; 
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 16px; 
            margin-bottom: 24px; 
        }
        
        .search-container { margin-bottom: 24px; width: 100%; }
        
        .archive-search-input {
            width: 100%; 
            padding: 14px 16px; 
            border-radius: 10px; 
            border: 1px solid var(--border);
            background: var(--card-bg); 
            color: var(--text-main); 
            font-size: 15px; 
            outline: none;
            box-sizing: border-box; 
            transition: all 0.2s;
        }
        .archive-search-input:focus { 
            border-color: var(--service-header); 
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
        }

        .service-block { 
            margin-bottom: 24px; 
            background: var(--card-bg); 
            border-radius: 14px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        .service-header-row { 
            background: rgba(79, 70, 229, 0.15); 
            padding: 16px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .service-name { font-size: 16px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }

        .song-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.04); 
            justify-content: space-between; 
            transition: background 0.2s;
        }
        .song-item:hover { background: rgba(255,255,255,0.02); }
        .song-info { display: flex; align-items: center; }
        .song-title-text { font-weight: 500; font-size: 15px; }

        .cat-badge { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            padding: 4px 10px; 
            border-radius: 6px; 
            margin-right: 15px; 
            min-width: 90px; 
            text-align: center; 
            letter-spacing: 0.03em;
        }
        .cat-intro { background: #334155; color: #cbd5e1; }
        .cat-praise { background: rgba(16, 185, 129, 0.2); color: var(--accent); }
        .cat-worship { background: rgba(251, 191, 36, 0.2); color: var(--chord-color); }
        .cat-ministerial { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .cat-communion { background: rgba(167, 139, 250, 0.2); color: var(--communion-purple); }
        .cat-victory { background: rgba(244, 63, 94, 0.2); color: #f43f5e; } 
        .cat-closing { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            padding: 8px 14px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase; 
            transition: all 0.2s; 
        }
        .btn-view { background: var(--accent); color: #064e3b; }
        .btn-view:hover { background: #059669; }
        .btn-pdf { background: #f1f5f9; color: #0f172a; }
        .btn-pdf:hover { background: #cbd5e1; }
        .btn-edit { background: #334155; color: #fff; }
        .btn-edit:hover { background: #475569; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #dc2626; }

        .remove-btn { 
            color: var(--danger); 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px; 
            padding: 4px 8px; 
            transition: transform 0.2s; 
        }
        .remove-btn:hover { transform: scale(1.2); }
        
        .full-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 16px; background: #111827; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #contentContainer { flex-grow: 1; overflow-y: auto; padding: 24px 16px; }

        .chord-line { line-height: 2.4; font-family: 'Consolas', monospace; font-size: 16px; white-space: pre; position: relative; margin-top: 1.2em; }
        .chord-wrap { position: absolute; top: -1.1em; color: var(--chord-color); font-weight: bold; }
        .section-tag { color: var(--header-color); font-weight: bold; display: block; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border); }
        
        .loading-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 12px 28px; border-radius: 30px; font-weight: bold; z-index: 4000; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        
        .edit-controls { display: flex; gap: 4px; align-items: center; }
        .move-btn { background: #334155; color: white; border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
        .move-btn:hover { background: var(--service-header); }

        .form-select, .form-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-size: 15px;
        }
        .form-input { color: #000; background: #fff; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.3rem; margin:0;"><i class="fa-solid fa-box-archive" style="color:var(--service-header);"></i> Setlist Archive</h1>
        <a href="Setlist.html" class="btn btn-edit"><i class="fa-solid fa-arrow-left"></i> BACK</a>
    </div>

    <div class="search-container">
        <input type="text" id="archiveSearchInput" class="archive-search-input" placeholder="🔍 Search setlists by date or layout name..." oninput="renderArchive()">
    </div>

    <div id="archive-container">
        <div style="text-align: center; color: var(--sub-text); margin-top: 50px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading archive elements...</div>
    </div>

    <div id="viewerModal" class="full-modal">
        <div class="modal-nav">
            <div id="modalTitle" style="font-weight:700; font-size:16px;">Setlist</div>
            <button onclick="closeModal()" class="btn btn-danger"><i class="fa-solid fa-xmark"></i> CLOSE</button>
        </div>
        <div id="contentContainer"></div>
    </div>

    <div id="pdf-template" style="display:none;"></div>

    <script>
        const ARCHIVE_URL = "https://script.google.com/macros/s/AKfycbw11UhydEjyfPDlr5s43nddQn0rHHbRF4AIYtfNnnm3kmjkErPZm5rwCjEc18MUTVje/exec"; 
        const LIB_URL = "https://script.google.com/macros/s/AKfycbyabmsybyBb52Jj3-e5eNX31I_HBVIuZD_xF2WFyKjQWW3TdPNnP_NPDbQctpRnY8VT/exec";

        const flowCategories = ["Intro", "Praise", "Worship", "Ministerial", "Communion", "Victory", "Closing"];
        let archiveCache = [];
        let libraryCache = {};
        let editingService = null;

        async function init() {
            try {
                const libResp = await fetch(LIB_URL);
                const libData = await libResp.json();
                libData.forEach(s => { libraryCache[s.title || s.Title] = s.content || s.Content; });
                loadArchive();
            } catch (e) { console.error(e); }
        }

        async function loadArchive() {
            try {
                const resp = await fetch(`${ARCHIVE_URL}?getSetlist=true`);
                archiveCache = await resp.json();
                renderArchive();
            } catch (e) { document.getElementById('archive-container').innerText = "Sync failed."; }
        }

        function renderArchive() {
            const container = document.getElementById('archive-container');
            if (!container) return;

            const scrollPos = window.scrollY;
            container.innerHTML = "";
            
            const suggestionHtml = `<datalist id="song-suggestions">${getSuggestionsList()}</datalist>`;
            container.innerHTML = suggestionHtml;

            const searchQuery = document.getElementById('archiveSearchInput').value.toLowerCase().trim();

            // Track unique service positions precisely as they arrive sequentially from the spreadsheet array
            const orderOfAppearance = [];
            const groups = {};

            archiveCache.forEach(item => {
                const name = item.serviceName;
                if (!groups[name]) {
                    groups[name] = [];
                    orderOfAppearance.push(name);
                }
                groups[name].push(item);
            });

            // FIXED CRITICAL ORDERING: Reverse orderOfAppearance to ensure bottom sheet rows show up cleanly at the top of the webpage view
            const orderedKeys = orderOfAppearance.reverse();
            const filteredKeys = orderedKeys.filter(sName => sName.toLowerCase().includes(searchQuery));

            if (filteredKeys.length === 0) {
                container.innerHTML += `<div style="text-align: center; color: var(--sub-text); margin-top: 50px;">No matching setlists found.</div>`;
                return;
            }

            filteredKeys.forEach(sName => {
                const isEditing = editingService === sName;
                const sId = sName.replace(/[^a-zA-Z0-9]/g, ''); 
                const block = document.createElement('div');
                block.className = 'service-block';
                
                let listHtml = "";
                flowCategories.forEach(cat => {
                    const catSongs = groups[sName].filter(s => s.category === cat);
                    catSongs.forEach((s, idx) => {
                        listHtml += `
                            <div class="song-item">
                                <div class="song-info">
                                    <span class="cat-badge cat-${cat.toLowerCase()}">${cat}</span>
                                    <span class="song-title-text">${s.title}</span>
                                </div>
                                <div class="edit-controls">
                                    ${isEditing ? `
                                        <button class="move-btn" onclick="moveSong('${sName.replace(/'/g, "\\'")}', '${cat}', ${idx}, -1)"><i class="fa-solid fa-chevron-up"></i></button>
                                        <button class="move-btn" onclick="moveSong('${sName.replace(/'/g, "\\'")}', '${cat}', ${idx}, 1)"><i class="fa-solid fa-chevron-down"></i></button>
                                        <button class="remove-btn" onclick="removeSongLocally('${sName.replace(/'/g, "\\'")}', '${cat}', '${s.title.replace(/'/g, "\\'")}')">&times;</button>
                                    ` : ''}
                                </div>
                            </div>`;
                    });
                });

                block.innerHTML = `
                    <div class="service-header-row">
                        <span class="service-name"><i class="fa-regular fa-calendar-days" style="color:var(--sub-text);"></i> ${sName}</span>
                        <div class="controls" style="display:flex; gap:6px;">
                            ${isEditing ? 
                                `<button class="btn btn-view" onclick="showAddForm('${sId}')"><i class="fa-solid fa-plus"></i> ADD</button>
                                 <button class="btn btn-danger" onclick="deleteEntireSetlist('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash"></i> DELETE ALL</button>
                                 <button class="btn btn-edit" onclick="toggleEditMode(null)">DONE</button>` :
                                `<button class="btn btn-view" onclick="openPreviewAll('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-music"></i> CHORDS</button>
                                 <button class="btn btn-pdf" onclick="exportToPDF('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                                 <button class="btn btn-edit" onclick="toggleEditMode('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-pen-to-square"></i> EDIT</button>`
                            }
                        </div>
                    </div>

                    <div id="add-form-${sId}" style="display:none; padding: 16px; background: rgba(0,0,0,0.15); border-bottom: 1px solid var(--border);">
                        <div style="display: flex; gap: 10px; flex-direction: column;">
                            <select id="cat-select-${sId}" class="form-select">
                                ${flowCategories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                            <input type="text" id="title-input-${sId}" class="form-input" list="song-suggestions" placeholder="Type Song Title...">
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-view" style="flex:1;" onclick="addSongLocally('${sName.replace(/'/g, "\\'")}', '${sId}')">INSERT INTO LIST</button>
                                <button class="btn btn-danger" onclick="cancelAdd('${sId}')">CANCEL</button>
                            </div>
                        </div>
                    </div>
                    <div class="song-list-container">${listHtml || '<div style="padding:20px; color:var(--sub-text); text-align:center;">Empty Setlist</div>'}</div>
                `;
                container.appendChild(block);
            });

            window.scrollTo(0, scrollPos);
        }

        function cancelAdd(sId) {
            const form = document.getElementById(`add-form-${sId}`);
            const input = document.getElementById(`title-input-${sId}`);
            if (form) form.style.display = 'none';
            if (input) input.value = "";
        }

        function getSuggestionsList() {
            const titles = Object.keys(libraryCache);
            return titles.map(title => `<option value="${title.replace(/'/g, "&apos;")}">`).join('');
        }

        function toggleEditMode(sName) {
            editingService = (editingService === sName) ? null : sName;
            renderArchive();
        }

        async function removeSongLocally(sName, cat, title) {
            if(!confirm(`Remove "${title}" from this setlist?`)) return;
            
            showToast("Removing song...");
            try {
                const payload = { action: "deleteSingleSong", serviceName: sName, category: cat, songTitle: title };
                await fetch(ARCHIVE_URL, { method: "POST", body: JSON.stringify(payload) });

                archiveCache = archiveCache.filter(s => !(s.serviceName === sName && s.category === cat && s.title === title));
                renderArchive();
            } catch (e) {
                alert("Removal failed.");
            } finally { hideToast(); }
        }

        async function deleteEntireSetlist(sName) {
            if(!confirm(`Delete the entire setlist for ${sName}?`)) return;
            
            showToast("Deleting setlist...");
            try {
                const payload = { action: "deleteSetlist", serviceName: sName };
                await fetch(ARCHIVE_URL, { method: "POST", body: JSON.stringify(payload) });

                archiveCache = archiveCache.filter(s => s.serviceName !== sName);
                editingService = null;
                renderArchive();
            } catch (e) {
                alert("Delete failed.");
            } finally { hideToast(); }
        }

        async function moveSong(sName, cat, index, direction) {
            let serviceSongs = archiveCache.filter(s => s.serviceName === sName && s.category === cat);
            let newIndex = index + direction;
            if (newIndex < 0 || newIndex >= serviceSongs.length) return;

            showToast("Reordering...");
            const temp = serviceSongs[index];
            serviceSongs[index] = serviceSongs[newIndex];
            serviceSongs[newIndex] = temp;

            try {
                archiveCache = archiveCache.filter(s => !(s.serviceName === sName && s.category === cat));
                archiveCache.push(...serviceSongs);

                for (let s of serviceSongs) {
                     await fetch(ARCHIVE_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "deleteSingleSong", serviceName: sName, category: cat, songTitle: s.title })
                    });
                }
                for (let s of serviceSongs) {
                     await fetch(ARCHIVE_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "saveSetlist", serviceName: sName, category: cat, songTitle: s.title })
                     });
                }
                renderArchive();
            } catch (e) {
                alert("Move failed.");
            } finally { hideToast(); }
        }

        async function exportToPDF(sName) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let yPos = 20;
            const setlist = archiveCache.filter(s => s.serviceName === sName);
            
            doc.setFontSize(22); doc.setTextColor(40); doc.text(`Setlist: ${sName}`, 20, yPos); yPos += 15;

            flowCategories.forEach(cat => {
                const catSongs = setlist.filter(s => s.category === cat);
                if (catSongs.length > 0) {
                    doc.setFontSize(16); doc.setTextColor(100); doc.text(`--- ${cat} ---`, 20, yPos); yPos += 10;

                    catSongs.forEach(song => {
                        doc.setFontSize(14); doc.setTextColor(0); doc.setFont("helvetica", "bold");
                        doc.text(`• ${song.title}`, 25, yPos); yPos += 10;

                        const searchTitle = song.title.trim().toLowerCase();
                        const actualKey = Object.keys(libraryCache).find(k => k.trim().toLowerCase() === searchTitle);
                        const songData = actualKey ? libraryCache[actualKey] : null;

                        if (songData) {
                            const content = typeof songData === 'string' ? songData : (songData.content || songData.chords || "");
                            const lines = content.split('\n');
                            doc.setFont("courier", "normal"); doc.setFontSize(10);

                            lines.forEach(line => {
                                let xOffset = 30;
                                const parts = line.split(/(\[.*?\])/g);
                                parts.forEach(part => {
                                    if (part.startsWith('[') && part.endsWith(']')) {
                                        doc.setFont("courier", "bold"); doc.setTextColor(0, 102, 204); 
                                        doc.text(part.replace(/[\[\]]/g, ''), xOffset, yPos - 4); 
                                    } else {
                                        doc.setFont("courier", "normal"); doc.setTextColor(60);
                                        doc.text(part, xOffset, yPos); xOffset += doc.getTextWidth(part);
                                    }
                                });
                                yPos += 10; if (yPos > 275) { doc.addPage(); yPos = 20; }
                            });
                            yPos += 6; 
                        } else { yPos += 10; }
                    });
                }
            });
            doc.save(`${sName}_Chord_Sheet.pdf`);
        }

        function openPreviewAll(sName) {
            const songs = archiveCache.filter(i => i.serviceName === sName);
            let html = `<h2 style="color:var(--accent); text-align:center; margin-bottom: 20px;">${sName}</h2>`;
            
            flowCategories.forEach(cat => {
                const catSongs = songs.filter(s => s.category === cat);
                if (catSongs.length > 0) {
                    html += `<div style="margin-top:25px; border-bottom: 2px solid var(--accent); padding-bottom:5px; color:var(--accent); font-weight:bold; text-transform:uppercase; font-size:13px;">${cat}</div>`;
                    catSongs.forEach(s => {
                        const searchTitle = s.title.trim().toLowerCase();
                        const actualKey = Object.keys(libraryCache).find(k => k.trim().toLowerCase() === searchTitle);
                        const content = actualKey ? libraryCache[actualKey] : null;

                        html += `
                            <div style="margin-bottom:30px; padding: 16px; background: rgba(15, 23, 42, 0.4); border-radius: 10px; border:1px solid var(--border);">
                                <h3 style="margin-top:0; color:#fff; font-size:16px;">${s.title}</h3>
                                ${content ? parseChords(content) : "<i style='color:gray;'>[Lyrics/Chords not found in library]</i>"}
                            </div>`;
                    });
                }
            });
            document.getElementById('contentContainer').innerHTML = html;
            document.getElementById('viewerModal').style.display = 'flex';
        }

        function parseChords(content) {
            if (!content) return "";
            const lines = content.split('\n'); let formattedHtml = "";
            lines.forEach(line => {
                let chordLine = ""; let lyricLine = ""; let i = 0; let hasChords = false;
                if (line.trim().length > 0 && (line.trim().includes(':') || (line.trim().split(' ').length <= 2 && !line.includes('[')))) {
                    formattedHtml += `<div style="margin-top:14px; margin-bottom:6px; border-bottom:1px solid var(--border);"><span style="color:#f6ad55; font-weight:bold; font-size:11px; text-transform:uppercase;">${line.trim()}</span></div>`;
                    return;
                }
                while (i < line.length) {
                    if (line[i] === '[') {
                        hasChords = true; let chord = ""; i++; 
                        while (i < line.length && line[i] !== ']') { chord += line[i]; i++; }
                        i++; chordLine += `<b style="color: #f6ad55;">${chord}</b>`;
                    } else { lyricLine += line[i]; chordLine += "&nbsp;"; i++; }
                }
                if (hasChords || lyricLine.trim().length > 0) {
                    formattedHtml += `<div style="font-family:'Courier New', monospace; white-space:pre; line-height:1.2; margin-bottom:10px;">
                        ${hasChords ? `<div style="color:#f6ad55; font-weight:bold; font-size:14px; height:1.2em;">${chordLine}</div>` : ''}
                        <div style="color:#f8fafc; font-size:14px;">${lyricLine}</div>
                    </div>`;
                }
            });
            return `<div style="background:#1e293b; padding:16px; border-radius:8px; overflow-x:auto;">${formattedHtml}</div>`;
        }

        function showToast(m) { const t=document.createElement('div'); t.id="toast"; t.className="loading-toast"; t.innerHTML=`<i class="fa-solid fa-spinner fa-spin"></i> ${m}`; document.body.appendChild(t); }
        function hideToast() { const t=document.getElementById("toast"); if(t) t.remove(); }
        function closeModal() { document.getElementById('viewerModal').style.display = 'none'; }
        window.onload = init;

        function showAddForm(sId) {
            const form = document.getElementById(`add-form-${sId}`);
            if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function addSongLocally(sName, sId) {
            const catElement = document.getElementById(`cat-select-${sId}`);
            const titleElement = document.getElementById(`title-input-${sId}`);
            if (!titleElement || !catElement) return;

            const cat = catElement.value; const title = titleElement.value.trim();
            if (!title) return alert("Please enter a song title");

            showToast("Adding song...");
            try {
                const payload = { action: "saveSetlist", serviceName: sName, category: cat, songTitle: title };
                const resp = await fetch(ARCHIVE_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await resp.json();

                if (result.result === "success" || result.result === "exists") {
                    archiveCache.push({ serviceName: sName, category: cat, title: title });
                    titleElement.value = "";
                    renderArchive();
                } else { alert("Error: " + result.message); }
            } catch (e) {
                archiveCache.push({ serviceName: sName, category: cat, title: title });
                renderArchive();
            } finally { hideToast(); }
        }
    </script>
</body>
</html>
