<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saved Setlists Archive</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #10b981;
            --service-header: #4f46e5;
            --danger: #ef4444;
            --chord-color: #fbbf24; 
            --header-color: #fb923c; 
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 10px;
            max-width: 900px;
            margin: auto;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- Responsive Layout --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            padding: 10px 0 15px 0;
            margin-bottom: 20px;
        }
        .header h1 { font-size: 1.2rem; margin: 0; }

        .back-btn {
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .service-block {
            margin-bottom: 20px;
            background: rgba(30, 41, 59, 0.6);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--service-header);
        }

        .service-title {
            font-size: 16px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        @media (min-width: 600px) {
            .service-title { flex-direction: row; justify-content: space-between; align-items: center; }
            .header h1 { font-size: 1.8rem; }
        }

        .view-btn {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            border: 1px solid #818cf8;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        .song-row {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        .song-row span { font-size: 14px; flex: 1; }

        /* --- Mobile-First Viewer --- */
        #viewerModal {
            display: none;
            position: fixed;
            inset: 0;
            background: #0f172a; 
            color: var(--text-main);
            z-index: 2000;
            flex-direction: column;
        }

        .modal-header {
            padding: 10px 15px;
            background: #111827;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        #contentContainer {
            flex-grow: 1;
            overflow-x: auto; /* Allows side-scroll if lyrics are long on mobile */
            overflow-y: auto;
            padding: 20px 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 2.4; 
            font-size: 15px; /* Base mobile size */
        }

        @media (min-width: 600px) {
            #contentContainer { font-size: 18px; padding: 40px; }
        }

        /* --- Chord Engine --- */
        .chord-line { 
            position: relative; 
            margin-top: 1.3em; 
            white-space: pre; 
            min-width: fit-content; 
        }
        .chord-wrap { 
            position: absolute; 
            top: -1.2em; 
            color: var(--chord-color); 
            font-weight: bold; 
            pointer-events: none;
        }
        .section-tag { 
            color: var(--header-color); 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.85em; 
            border-bottom: 1px solid #334155; 
            display: block; 
            margin: 25px 0 10px 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📋 Setlist Archive</h1>
        <a href="Setlist.html" class="back-btn">← BACK</a>
    </div>

    <div id="archive-container">
        <div id="loading-indicator" style="text-align: center; color: #94a3b8; margin-top: 50px;">
            Loading Setlists...
        </div>
    </div>

    <div id="viewerModal">
        <div class="modal-header">
            <span id="modalTitle" style="font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%;">Song Title</span>
            <button onclick="closeViewer()" style="background:var(--danger); color:white; border:none; padding:6px 12px; border-radius:5px; font-weight:bold;">CLOSE</button>
        </div>
        <div id="contentContainer"></div>
    </div>

    <script>
        const GET_LIB_URL = "https://script.google.com/macros/s/AKfycbyabmsybyBb52Jj3-e5eNX31I_HBVIuZD_xF2WFyKjQWW3TdPNnP_NPDbQctpRnY8VT/exec"; 
        const ARCHIVE_URL = "https://script.google.com/macros/s/AKfycbw11UhydEjyfPDlr5s43nddQn0rHHbRF4AIYtfNnnm3kmjkErPZm5rwCjEc18MUTVje/exec"; 

        let libraryCache = {}; 
        let archiveCache = [];

        function parseChords(text) {
            if (!text) return "No content found.";
            const lines = text.split('\n');
            let output = "";

            lines.forEach(line => {
                line = line.trimEnd();
                if (line.startsWith('{')) {
                    const tag = line.match(/:(.*)}/)?.[1]?.trim() || "SECTION";
                    output += `<span class="section-tag">${tag}</span>`;
                } 
                else if (line.includes('[')) {
                    let lyricLine = "";
                    let chordLine = "";
                    const parts = line.split(/\[(.*?)\]/);
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 1) {
                            chordLine += `<span class="chord-wrap" style="left: ${lyricLine.length}ch">${parts[i]}</span>`;
                        } else {
                            lyricLine += parts[i];
                        }
                    }
                    output += `<div class="chord-line">${chordLine}${lyricLine || " "}</div>`;
                } 
                else {
                    output += `<div class="chord-line">${line || " "}</div>`;
                }
            });
            return output;
        }

        async function init() {
            try {
                const libResp = await fetch(GET_LIB_URL);
                const libData = await libResp.json();
                libData.forEach(s => {
                    libraryCache[(s.title || s.Title || "").trim()] = (s.content || s.Content || "").replace(/\\n/g, '\n');
                });
                loadArchive();
            } catch (e) {
                document.getElementById('archive-container').innerHTML = "Sync error.";
            }
        }

        async function loadArchive() {
            const container = document.getElementById('archive-container');
            try {
                const resp = await fetch(`${ARCHIVE_URL}?getSetlist=true`);
                archiveCache = await resp.json();
                
                if (!archiveCache || archiveCache.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Empty.</p>";
                    return;
                }

                container.innerHTML = "";
                const grouped = {};
                archiveCache.forEach(item => {
                    const sn = item.serviceName || "Unnamed";
                    if (!grouped[sn]) grouped[sn] = [];
                    grouped[sn].push(item);
                });

                for (const sName in grouped) {
                    const block = document.createElement('div');
                    block.className = 'service-block';
                    block.innerHTML = `
                        <div class="service-title">
                            <span>🗓️ ${sName}</span>
                            <div style="display:flex; gap:5px;">
                                <button class="view-btn" style="background:#10b981; color:#064e3b; border:none;" onclick="openAll('${sName.replace(/'/g, "\\'")}')">OPEN ALL</button>
                                <button class="view-btn" style="color:#ef4444; border-color:#ef4444; background:none;" onclick="deleteService('${sName.replace(/'/g, "\\'")}')">DEL</button>
                            </div>
                        </div>`;

                    const cats = {};
                    grouped[sName].forEach(song => {
                        const cat = song.category || "General";
                        if (!cats[cat]) cats[cat] = [];
                        cats[cat].push(song);
                    });

                    for (const c in cats) {
                        const cDiv = document.createElement('div');
                        cDiv.style.marginBottom = "10px";
                        cDiv.innerHTML = `<div style="color:var(--accent); font-size:10px; text-transform:uppercase; margin-bottom:5px;">${c}</div>`;
                        cats[c].forEach(song => {
                            const row = document.createElement('div');
                            row.className = 'song-row';
                            row.innerHTML = `
                                <span>${song.title}</span>
                                <button class="view-btn" onclick="openSingle('${song.title.replace(/'/g, "\\'")}')">VIEW</button>
                            `;
                            cDiv.appendChild(row);
                        });
                        block.appendChild(cDiv);
                    }
                    container.appendChild(block);
                }
            } catch (e) { container.innerHTML = "Load error."; }
        }

        function openSingle(title) {
            const raw = libraryCache[title] || "Not in library.";
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('contentContainer').innerHTML = parseChords(raw);
            document.getElementById('viewerModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function openAll(sName) {
            const songs = archiveCache.filter(i => i.serviceName === sName);
            let html = "";
            songs.forEach(s => {
                html += `<div style="border-top: 1px solid #334155; padding: 20px 0; margin-top: 20px;">
                            <h2 style="margin:0; color:white;">${s.title}</h2>
                            ${parseChords(libraryCache[s.title])}
                         </div>`;
            });
            document.getElementById('modalTitle').innerText = sName;
            document.getElementById('contentContainer').innerHTML = html;
            document.getElementById('viewerModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeViewer() {
            document.getElementById('viewerModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function deleteService(sName) {
            if(!confirm("Delete setlist?")) return;
            try {
                await fetch(ARCHIVE_URL, {
                    method: "POST", mode: "no-cors",
                    body: JSON.stringify({ action: "deleteSetlist", serviceName: sName })
                });
                setTimeout(loadArchive, 800);
            } catch(e) { alert("Error."); }
        }

        window.onload = init;
    </script>
</body>
</html>
