<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Setlist Archive | Full Manager</title>
    <!-- Include html2pdf.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --accent: #10b981; --service-header: #4f46e5; --danger: #ef4444;
            --chord-color: #fbbf24; --header-color: #fb923c; --sub-text: #94a3b8;
            --communion-purple: #a78bfa;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); padding: 10px; max-width: 800px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; padding-bottom: 15px; margin-bottom: 20px; }
        
        .service-block { margin-bottom: 25px; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 1px solid #334155; }
        .service-header-row { background: rgba(79, 70, 229, 0.1); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .service-name { font-size: 18px; font-weight: 700; color: #fff; }

        .song-list-container { padding: 10px 0; }
        .song-item { display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .cat-badge { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; margin-right: 15px; min-width: 85px; text-align: center; letter-spacing: 0.5px; }
        .cat-intro { background: #334155; color: #cbd5e1; }
        .cat-praise { background: rgba(16, 185, 129, 0.2); color: var(--accent); }
        .cat-worship { background: rgba(251, 191, 36, 0.2); color: var(--chord-color); }
        .cat-ministerial { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .cat-communion { background: rgba(167, 139, 250, 0.2); color: var(--communion-purple); }
        .cat-victory { background: rgba(167, 139, 250, 0.2); color: #a78bfa; } 
        .cat-closing { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .song-title-text { font-size: 15px; font-weight: 500; color: var(--text-main); }

        .controls { display: flex; gap: 8px; }
        .btn { padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; text-decoration: none; display: inline-block; }
        .btn-view { background: var(--accent); color: #064e3b; }
        .btn-pdf { background: #f1f5f9; color: #0f172a; } /* PDF Button Style */
        .btn-edit { background: #334155; color: #fff; }
        .btn-danger { background: var(--danger); color: white; }

        .full-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 10px 15px; background: #111827; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; }
        #contentContainer { flex-grow: 1; overflow-y: auto; padding: 20px; }

        .chord-line { line-height: 2.4; font-family: 'Consolas', monospace; font-size: 16px; white-space: pre; position: relative; margin-top: 1.2em; }
        .chord-wrap { position: absolute; top: -1.1em; color: var(--chord-color); font-weight: bold; }
        .section-tag { color: var(--header-color); font-weight: bold; display: block; margin: 15px 0 5px 0; border-bottom: 1px solid #334155; }
        
        .loading-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #000; padding: 10px 25px; border-radius: 30px; font-weight: bold; z-index: 4000; }
        
        /* Styles used specifically for PDF output to ensure readability on white paper */
        .pdf-export-mode { background: white !important; color: black !important; }
        .pdf-export-mode .chord-wrap { color: #b45309 !important; }
        .pdf-export-mode .section-tag { color: #4338ca !important; border-bottom: 1px solid #ddd !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.2rem;">📋 Setlist Archive</h1>
        <a href="Setlist.html" class="btn btn-edit">← BACK</a>
    </div>

    <div id="archive-container">
        <div style="text-align: center; color: var(--sub-text); margin-top: 50px;">Loading archive...</div>
    </div>

    <!-- Modal for Previewing -->
    <div id="viewerModal" class="full-modal">
        <div class="modal-nav">
            <div id="modalTitle" style="font-weight:bold;">Setlist</div>
            <button onclick="closeModal()" class="btn btn-danger">CLOSE</button>
        </div>
        <div id="contentContainer"></div>
    </div>

    <!-- Hidden Container for PDF generation -->
    <div id="pdf-template" style="display:none;"></div>

    <script>
        const ARCHIVE_URL = "https://script.google.com/macros/s/AKfycbw11UhydEjyfPDlr5s43nddQn0rHHbRF4AIYtfNnnm3kmjkErPZm5rwCjEc18MUTVje/exec"; 
        const LIB_URL = "https://script.google.com/macros/s/AKfycbyabmsybyBb52Jj3-e5eNX31I_HBVIuZD_xF2WFyKjQWW3TdPNnP_NPDbQctpRnY8VT/exec";

        const flowCategories = ["Intro", "Praise", "Worship", "Ministerial", "Communion", "Victory", "Closing"];
        let archiveCache = [];
        let libraryCache = {};

        async function init() {
            try {
                const libResp = await fetch(LIB_URL);
                const libData = await libResp.json();
                libData.forEach(s => { libraryCache[s.title || s.Title] = s.content || s.Content; });
                loadArchive();
            } catch (e) { console.error(e); }
        }

        async function loadArchive() {
            try {
                const resp = await fetch(`${ARCHIVE_URL}?getSetlist=true`);
                archiveCache = await resp.json();
                renderArchive();
            } catch (e) { document.getElementById('archive-container').innerText = "Sync failed."; }
        }

        function renderArchive() {
            const container = document.getElementById('archive-container');
            container.innerHTML = "";
            const groups = {};
            
            archiveCache.forEach(item => {
                if (!groups[item.serviceName]) groups[item.serviceName] = [];
                groups[item.serviceName].push(item);
            });

            Object.keys(groups).sort().reverse().forEach(sName => {
                const block = document.createElement('div');
                block.className = 'service-block';
                
                let listHtml = "";
                flowCategories.forEach(cat => {
                    const catSongs = groups[sName].filter(s => s.category === cat);
                    catSongs.forEach(s => {
                        listHtml += `
                            <div class="song-item">
                                <span class="cat-badge cat-${cat.toLowerCase()}">${cat}</span>
                                <span class="song-title-text">${s.title}</span>
                            </div>`;
                    });
                });

                block.innerHTML = `
                    <div class="service-header-row">
                        <span class="service-name">🗓️ ${sName}</span>
                        <div class="controls">
                            <button class="btn btn-view" onclick="openPreviewAll('${sName.replace(/'/g, "\\'")}')">CHORDS</button>
                            <button class="btn btn-pdf" onclick="exportToPDF('${sName.replace(/'/g, "\\'")}')">PDF</button>
                            <button class="btn btn-edit" onclick="enterEditMode('${sName.replace(/'/g, "\\'")}')">EDIT</button>
                        </div>
                    </div>
                    <div class="song-list-container">${listHtml || '<div style="padding:20px; color:var(--sub-text); text-align:center;">Empty</div>'}</div>
                `;
                container.appendChild(block);
            });
        }

        // --- PDF EXPORT LOGIC ---
        // --- UPDATED PDF EXPORT LOGIC ---
function exportToPDF(sName) {
    showToast("Generating PDF...");
    
    const songs = archiveCache.filter(i => i.serviceName === sName);
    
    // Create a dedicated container for PDF content with specific styling
    let pdfHtml = `<div class="pdf-export-mode" style="background: white; color: black; padding: 0; margin: 0;">`;
    
    // Header for the Setlist
    pdfHtml += `<h1 style="text-align:center; padding: 20px; border-bottom: 2px solid #000; margin-bottom: 0;">${sName}</h1>`;
    
    flowCategories.forEach(cat => {
        songs.filter(s => s.category === cat).forEach((s) => {
            // "page-break-before: always" ensures every song starts on a new page
            pdfHtml += `
                <div style="page-break-before: always; padding: 40px; min-height: 100%;">
                    <div style="display:inline-block; font-size:10px; font-weight:bold; padding:2px 8px; border:1px solid #000; border-radius:4px; text-transform:uppercase; margin-bottom: 10px;">${cat}</div>
                    <h2 style="margin: 0 0 20px 0; font-size: 24px; border-bottom: 1px solid #eee;">${s.title}</h2>
                    <div style="font-size: 14px; line-height: 1.6;"> 
                        ${parseChords(libraryCache[s.title] || "[Lyrics not found]")}
                    </div>
                </div>`;
        });
    });
    pdfHtml += `</div>`;

    const element = document.getElementById('pdf-template');
    element.innerHTML = pdfHtml;
    element.style.display = 'block';

    const opt = {
        margin:       0, // Margins handled by inner padding for better control
        filename:     `Setlist_${sName.replace(/\s+/g, '_')}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { 
            scale: 2, 
            useCORS: true,
            letterRendering: true 
        },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
        // Use 'always' to respect the page-break-before style
        pagebreak:    { mode: ['avoid-all', 'css', 'legacy'], before: '.page-break-always' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        element.style.display = 'none';
        hideToast();
    });
}

        function openPreviewAll(sName) {
            const songs = archiveCache.filter(i => i.serviceName === sName);
            let html = `<h2 style="color:var(--accent); text-align:center; margin-bottom:30px;">${sName}</h2>`;
            flowCategories.forEach(cat => {
                songs.filter(s => s.category === cat).forEach(s => {
                    html += `
                        <div style="margin-top:40px; border-top:1px solid #334155; padding-top:20px; page-break-inside: avoid;">
                            <div class="cat-badge cat-${cat.toLowerCase()}">${cat}</div>
                            <h3 style="margin:10px 0 15px 0; color:#fff;">${s.title}</h3>
                            ${parseChords(libraryCache[s.title] || "[Lyrics not found]")}
                        </div>`;
                });
            });
            document.getElementById('modalTitle').innerText = "Full Setlist View";
            document.getElementById('contentContainer').innerHTML = html;
            document.getElementById('viewerModal').style.display = 'flex';
        }

        function parseChords(text) {
            if (!text) return "";
            return text.split('\n').map(line => {
                if (line.startsWith('{')) return `<span class="section-tag">${line.match(/:(.*)}/)?.[1] || "SECTION"}</span>`;
                if (line.includes('[')) {
                    let lyric = "", chords = "";
                    line.split(/\[(.*?)\]/).forEach((part, i) => {
                        if (i % 2 === 1) chords += `<span class="chord-wrap" style="left:${lyric.length}ch">${part}</span>`;
                        else lyric += part;
                    });
                    return `<div class="chord-line">${chords}${lyric}</div>`;
                }
                return `<div class="chord-line">${line || " "}</div>`;
            }).join('');
        }

        function showToast(m) { 
            const t = document.createElement('div'); 
            t.id="toast"; 
            t.className="loading-toast"; 
            t.innerText=m; 
            document.body.appendChild(t); 
        }
        function hideToast() { const t=document.getElementById("toast"); if(t) t.remove(); }
        function closeModal() { document.getElementById('viewerModal').style.display = 'none'; }
        
        window.onload = init;
    </script>
</body>
</html>
