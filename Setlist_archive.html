<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>Setlist Archive | Premium Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0b0f19; 
            --card-bg: #141b2d; 
            --border: #242f47; 
            --text-main: #f1f5f9;
            --accent: #10b981; 
            --service-header: #6366f1; 
            --danger: #f43f5e;
            --chord-color: #f59e0b; 
            --header-color: #ed8936; 
            --sub-text: #94a3b8;
            --communion-purple: #a78bfa;
            --btn-bg: #1e293b;
        }
        
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 20px; 
            max-width: 850px; 
            margin: auto; 
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 20px; 
            margin-bottom: 24px; 
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .search-container { margin-bottom: 24px; width: 100%; }
        
        .archive-search-input {
            width: 100%; 
            padding: 14px 18px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            background: var(--card-bg); 
            color: var(--text-main); 
            font-size: 15px; 
            outline: none;
            box-sizing: border-box; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .archive-search-input:focus { 
            border-color: var(--service-header); 
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2), 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .service-block { 
            margin-bottom: 28px; 
            background: var(--card-bg); 
            border-radius: 16px; 
            overflow: hidden; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }
        
        .service-header-row { 
            background: rgba(99, 102, 241, 0.08); 
            padding: 18px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .service-name { font-size: 17px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }

        .song-group-wrapper {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            transition: background-color 0.2s ease;
        }
        .song-group-wrapper:hover {
            background: rgba(255, 255, 255, 0.01);
        }

        .song-item { 
            display: flex; 
            align-items: center; 
            padding: 14px 24px; 
            justify-content: space-between; 
            flex-wrap: wrap;
            gap: 12px;
        }
        .song-info { display: flex; align-items: center; flex-grow: 1; min-width: 250px; }
        .song-title-text { font-weight: 600; font-size: 15px; color: #f8fafc; }

        .key-transpose-row {
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.4);
            border-top: 1px dashed var(--border);
        }

        .key-row-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .key-meta-left {
            font-size: 12px;
            color: var(--sub-text);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .orig-key-badge {
            background: rgba(245, 158, 11, 0.15);
            color: var(--chord-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .key-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 6px;
        }

        @media (max-width: 640px) {
            .key-grid { grid-template-columns: repeat(6, 1fr); }
        }

        .key-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .key-btn:hover {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .key-btn.active-target {
            background: var(--accent);
            color: #042f1a;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }

        .cat-badge { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            padding: 5px 12px; 
            border-radius: 6px; 
            margin-right: 16px; 
            width: 95px; 
            text-align: center; 
            letter-spacing: 0.05em;
            display: inline-block;
        }
        .cat-intro { background: #334155; color: #cbd5e1; }
        .cat-praise { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .cat-worship { background: rgba(245, 158, 11, 0.15); color: var(--chord-color); }
        .cat-ministerial { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .cat-communion { background: rgba(167, 139, 250, 0.15); color: var(--communion-purple); }
        .cat-victory { background: rgba(244, 63, 94, 0.15); color: #f43f5e; } 
        .cat-closing { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        .btn { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            padding: 9px 16px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            text-transform: uppercase; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .btn-view { background: var(--accent); color: #042f1a; }
        .btn-view:hover { background: #059669; transform: translateY(-1px); }
        .btn-pdf { background: #e2e8f0; color: #0f172a; }
        .btn-pdf:hover { background: #cbd5e1; transform: translateY(-1px); }
        .btn-edit { background: #242f47; color: #fff; border: 1px solid rgba(255,255,255,0.05); }
        .btn-edit:hover { background: #313f5c; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #e11d48; }

        .remove-btn { 
            color: #64748b; 
            background: none; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            padding: 6px; 
            border-radius: 6px;
            transition: all 0.2s; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .remove-btn:hover { color: var(--danger); background: rgba(244,63,94,0.1); }
        
        .full-modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 2000; flex-direction: column; }
        .modal-nav { padding: 16px 24px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #contentContainer { flex-grow: 1; overflow-y: auto; padding: 32px 24px; }

        .chord-editor-textarea {
            width: 100%;
            height: 60vh;
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-sizing: border-box;
            resize: none;
            line-height: 1.5;
            outline: none;
        }
        .chord-editor-textarea:focus {
            border-color: var(--chord-color);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        .loading-toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #042f1a; padding: 14px 32px; border-radius: 40px; font-weight: bold; z-index: 4000; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4); }
        
        .edit-controls { display: flex; gap: 8px; align-items: center; }
        .move-btn { background: #242f47; color: #94a3b8; border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .move-btn:hover { background: var(--service-header); color: white; }

        .form-select, .form-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            background: #0f172a;
            color: white;
            border: 1px solid var(--border);
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }
        .form-input { color: #0f172a; background: #fff; font-weight: 500; }
        .form-input:focus { border-color: var(--service-header); }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-box-archive"></i> Setlist Archive</h1>
        <a href="index.html" class="btn btn-edit"><i class="fa-solid fa-arrow-left"></i> BACK</a>
    </div>

    <div class="search-container">
        <input type="text" id="archiveSearchInput" class="archive-search-input" placeholder="🔍 Search setlists by date or layout name..." oninput="renderArchive()">
    </div>

    <div id="archive-container">
        <div style="text-align: center; color: var(--sub-text); margin-top: 50px;"><i class="fa-solid fa-spinner fa-spin"></i> Loading archive elements...</div>
    </div>

    <div id="viewerModal" class="full-modal">
        <div class="modal-nav">
            <div id="modalTitle" style="font-weight:700; font-size:18px;">Setlist Preview</div>
            <button onclick="closeModal()" class="btn btn-danger"><i class="fa-solid fa-xmark"></i> CLOSE</button>
        </div>
        <div id="contentContainer"></div>
    </div>

    <div id="chordEditorModal" class="full-modal">
        <div class="modal-nav">
            <div id="chordEditorTitle" style="font-weight:700; font-size:18px; color: var(--chord-color);">Edit Song Chords Blueprint</div>
            <div style="display:flex; gap:8px;">
                <button id="chordEditorSaveBtn" class="btn btn-view"><i class="fa-solid fa-cloud-arrow-up"></i> SAVE CHANGES</button>
                <button onclick="closeChordEditorModal()" class="btn btn-danger"><i class="fa-solid fa-xmark"></i> CANCEL</button>
            </div>
        </div>
        <div style="padding: 24px; box-sizing: border-box; flex-grow: 1; display: flex; flex-direction: column; gap: 12px;">
            <div style="font-size: 13px; color: var(--sub-text);">
                <i class="fa-solid fa-circle-info"></i> Edit raw contents directly. Chords must be wrapped in standard brackets like <b>[G]</b> or <b>[D#m]</b> inline with the text.
            </div>
            <textarea id="chordEditorTextarea" class="chord-editor-textarea" spellcheck="false"></textarea>
        </div>
    </div>

    <div id="pdf-template" style="display:none;"></div>

    <script>
        const ARCHIVE_URL = "https://script.google.com/macros/s/AKfycbw11UhydEjyfPDlr5s43nddQn0rHHbRF4AIYtfNnnm3kmjkErPZm5rwCjEc18MUTVje/exec"; 
        const LIB_URL = "https://script.google.com/macros/s/AKfycbyabmsybyBb52Jj3-e5eNX31I_HBVIuZD_xF2WFyKjQWW3TdPNnP_NPDbQctpRnY8VT/exec";

        const flowCategories = ["Intro", "Praise", "Worship", "Ministerial", "Communion", "Victory", "Closing"];
        
        const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        const flatMap = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };
        
        let archiveCache = [];
        let libraryCache = {};
        let editingService = null;

        async function init() {
            try {
                const libResp = await fetch(LIB_URL);
                const libData = await libResp.json();
                
                libData.forEach(s => { 
                    const rawTitle = s.title || s.Title || "Untitled";
                    const rawContent = s.content || s.Content || "";
                    libraryCache[rawTitle.toString().trim().toLowerCase()] = rawContent.toString(); 
                });
                loadArchive();
            } catch (e) { console.error(e); }
        }

        async function loadArchive() {
            try {
                const resp = await fetch(`${ARCHIVE_URL}?getSetlist=true`);
                archiveCache = await resp.json();
                renderArchive();
            } catch (e) { document.getElementById('archive-container').innerText = "Sync failed."; }
        }

        function detectOriginalKey(content) {
            if (!content) return "Unknown";
            const match = content.match(/\[([A-G][#b]?)(.*?)\]/);
            if (match && match[1]) {
                return flatMap[match[1]] || match[1];
            }
            return "N/A";
        }

        function renderArchive() {
            const container = document.getElementById('archive-container');
            if (!container) return;

            const scrollPos = window.scrollY;
            container.innerHTML = "";
            
            const suggestionHtml = `<datalist id="song-suggestions">${getSuggestionsList()}</datalist>`;
            container.innerHTML = suggestionHtml;

            const searchQuery = document.getElementById('archiveSearchInput').value.toLowerCase().trim();

            const orderOfAppearance = [];
            const groups = {};

            archiveCache.forEach(item => {
                const name = item.serviceName;
                if (!groups[name]) {
                    groups[name] = [];
                    orderOfAppearance.push(name);
                }
                groups[name].push(item);
            });

            const orderedKeys = orderOfAppearance.reverse();
            const filteredKeys = orderedKeys.filter(sName => sName.toLowerCase().includes(searchQuery));

            if (filteredKeys.length === 0) {
                container.innerHTML += `<div style="text-align: center; color: var(--sub-text); margin-top: 50px;">No matching setlists found.</div>`;
                return;
            }

            filteredKeys.forEach(sName => {
                const isEditing = editingService === sName;
                const sId = sName.replace(/[^a-zA-Z0-9]/g, ''); 
                const block = document.createElement('div');
                block.className = 'service-block';
                
                let listHtml = "";
                flowCategories.forEach(cat => {
                    const catSongs = groups[sName].filter(s => s.category === cat);
                    catSongs.forEach((s, idx) => {
                        const searchKey = s.title.trim().toLowerCase();
                        const songContent = libraryCache[searchKey] || "";
                        const origKey = detectOriginalKey(songContent);
                        const uniqueIdPrefix = `transpose-${sId}-${cat}-${idx}`;

                        listHtml += `
                            <div class="song-group-wrapper">
                                <div class="song-item">
                                    <div class="song-info">
                                        <span class="cat-badge cat-${cat.toLowerCase()}">${cat}</span>
                                        <span class="song-title-text">${s.title}</span>
                                    </div>
                                    <div class="edit-controls">
                                        ${isEditing ? `
                                            <button class="move-btn" style="background: rgba(245,158,11,0.1); color: var(--chord-color); border-color: rgba(245,158,11,0.2);" title="Edit Raw Text Chords" onclick="openChordTextEditor('${s.title.replace(/'/g, "\\'")}')"><i class="fa-solid fa-file-pen"></i> EDIT CHORDS</button>
                                            <button class="move-btn" title="Move Up" onclick="moveSong('${sName.replace(/'/g, "\\'")}', '${cat}', ${idx}, -1)"><i class="fa-solid fa-chevron-up"></i></button>
                                            <button class="move-btn" title="Move Down" onclick="moveSong('${sName.replace(/'/g, "\\'")}', '${cat}', ${idx}, 1)"><i class="fa-solid fa-chevron-down"></i></button>
                                            <button class="remove-btn" title="Remove Song" onclick="removeSongLocally('${sName.replace(/'/g, "\\'")}', '${cat}', '${s.title.replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash-can"></i></button>
                                        ` : ''}
                                    </div>
                                </div>
                                ${isEditing && origKey !== "N/A" && origKey !== "Unknown" ? `
                                    <div class="key-transpose-row">
                                        <div class="key-row-meta">
                                            <span class="key-meta-left"><i class="fa-solid fa-sliders"></i> SELECT TARGET KEY:</span>
                                            <span class="orig-key-badge" id="badge-${uniqueIdPrefix}">Current Key: ${origKey}</span>
                                        </div>
                                        <div class="key-grid">
                                            ${notes.map(note => {
                                                return `<button class="key-btn ${note === origKey ? 'active-target' : ''}" 
                                                    onclick="executeDirectKeyShift('${s.title.replace(/'/g, "\\'")}', '${origKey}', '${note}', this)"
                                                    onmouseover="previewStepDistance('${origKey}', '${note}', 'badge-${uniqueIdPrefix}')"
                                                    onmouseout="resetStepDistance('${origKey}', 'badge-${uniqueIdPrefix}')">
                                                    ${note}
                                                </button>`;
                                            }).join('')}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>`;
                    });
                });

                block.innerHTML = `
                    <div class="service-header-row">
                        <span class="service-name"><i class="fa-regular fa-calendar-days" style="color:var(--service-header);"></i> ${sName}</span>
                        <div class="controls" style="display:flex; gap:8px;">
                            ${isEditing ? 
                                `<button class="btn btn-view" onclick="showAddForm('${sId}')"><i class="fa-solid fa-plus"></i> ADD SONG</button>
                                 <button class="btn btn-danger" onclick="deleteEntireSetlist('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-trash"></i> DELETE ALL</button>
                                 <button class="btn btn-edit" onclick="toggleEditMode(null)">DONE</button>` :
                                `<button class="btn btn-view" onclick="openPreviewAll('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-music"></i> CHORDS</button>
                                 <button class="btn btn-pdf" onclick="exportToPDF('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-file-pdf"></i> PDF</button>
                                 <button class="btn btn-edit" onclick="toggleEditMode('${sName.replace(/'/g, "\\'")}')"><i class="fa-solid fa-pen-to-square"></i> EDIT</button>`
                            }
                        </div>
                    </div>

                    <div id="add-form-${sId}" style="display:none; padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border);">
                        <div style="display: flex; gap: 12px; flex-direction: column;">
                            <select id="cat-select-${sId}" class="form-select">
                                ${flowCategories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                            <input type="text" id="title-input-${sId}" class="form-input" list="song-suggestions" placeholder="Type Song Title...">
                            <div style="display:flex; gap:8px;">
                                <button class="btn btn-view" style="flex:1;" onclick="addSongLocally('${sName.replace(/'/g, "\\'")}', '${sId}')">INSERT INTO LIST</button>
                                <button class="btn btn-danger" onclick="cancelAdd('${sId}')">CANCEL</button>
                            </div>
                        </div>
                    </div>
                    <div class="song-list-container">${listHtml || '<div style="padding:24px; color:var(--sub-text); text-align:center; font-style:italic;">No songs arranged in this setlist yet.</div>'}</div>
                `;
                container.appendChild(block);
            });

            window.scrollTo(0, scrollPos);
        }

        function openChordTextEditor(songTitle) {
            const searchKey = songTitle.trim().toLowerCase();
            const rawContent = libraryCache[searchKey] || "";
            
            document.getElementById("chordEditorTitle").innerHTML = `<i class="fa-solid fa-file-pen"></i> Editing: ${songTitle}`;
            document.getElementById("chordEditorTextarea").value = rawContent;
            
            document.getElementById("chordEditorSaveBtn").onclick = function() {
                saveChordTextModifications(songTitle);
            };
            
            document.getElementById("chordEditorModal").style.display = "flex";
        }

        function closeChordEditorModal() {
            document.getElementById("chordEditorModal").style.display = "none";
        }

        async function saveChordTextModifications(songTitle) {
            const updatedContent = document.getElementById("chordEditorTextarea").value;
            const searchKey = songTitle.trim().toLowerCase();

            showToast("Saving updated chords text...");
            try {
                const payload = {
                    action: "updateSong",
                    title: songTitle,
                    content: updatedContent
                };

                await fetch(LIB_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                libraryCache[searchKey] = updatedContent;
                closeChordEditorModal();
                alert(`Successfully saved layout modifications for "${songTitle}"!`);
                renderArchive();
            } catch (e) {
                console.error(e);
                alert("Saved locally to cache window.");
                libraryCache[searchKey] = updatedContent;
                closeChordEditorModal();
                renderArchive();
            } finally {
                hideToast();
            }
        }

        function previewStepDistance(origKey, targetKey, badgeId) {
            const currentIdx = notes.indexOf(origKey);
            const targetIdx = notes.indexOf(targetKey);
            if (currentIdx === -1 || targetIdx === -1) return;
            
            let diff = targetIdx - currentIdx;
            if (diff > 6) diff -= 12;
            if (diff < -6) diff += 12;
            
            const badge = document.getElementById(badgeId);
            if (badge) {
                badge.innerText = `Shift: ${diff > 0 ? '+' + diff : diff} Semitones (To Key ${targetKey})`;
                badge.style.color = "var(--accent)";
                badge.style.background = "rgba(16, 185, 129, 0.15)";
            }
        }

        function resetStepDistance(origKey, badgeId) {
            const badge = document.getElementById(badgeId);
            if (badge) {
                badge.innerText = `Current Key: ${origKey}`;
                badge.style.color = "var(--chord-color)";
                badge.style.background = "rgba(245, 158, 11, 0.15)";
            }
        }

        function transpose(chord, steps) {
            return chord.replace(/[A-G][#b]?/g, m => {
                let root = flatMap[m] || m;
                let idx = notes.indexOf(root);
                return idx === -1 ? m : notes[(idx + steps + 12) % 12];
            });
        }

        async function executeDirectKeyShift(songTitle, origKey, targetKey, clickedBtn) {
            if (origKey === targetKey) return alert("Song is already set to Key " + targetKey);
            
            const currentIdx = notes.indexOf(origKey);
            const targetIdx = notes.indexOf(targetKey);
            if (currentIdx === -1 || targetIdx === -1) return;

            let steps = targetIdx - currentIdx;
            if (steps > 6) steps -= 12;
            if (steps < -6) steps += 12;

            const searchKey = songTitle.trim().toLowerCase();
            const originalContent = libraryCache[searchKey];

            if (!originalContent) {
                return alert("Error: Original content blueprint map missing from workspace cache.");
            }

            const transposedContent = originalContent.replace(/\[(.*?)\]/g, (match, chord) => {
                return "[" + transpose(chord, steps) + "]";
            });

            if (!confirm(`Permanently transpose "${songTitle}" from Key [${origKey}] to Key [${targetKey}]?`)) return;

            showToast(`Transposing database elements to Key ${targetKey}...`);
            try {
                const payload = {
                    action: "updateSong",
                    title: songTitle,
                    content: transposedContent
                };

                await fetch(LIB_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                libraryCache[searchKey] = transposedContent;
                alert(`Successfully altered layout formatting! "${songTitle}" is now configured in Key [${targetKey}].`);
                renderArchive();
            } catch (error) {
                console.error(error);
                alert("Operation registered over database architecture maps.");
                location.reload();
            } finally {
                hideToast();
            }
        }

        function cancelAdd(sId) {
            const form = document.getElementById(`add-form-${sId}`);
            const input = document.getElementById(`title-input-${sId}`);
            if (form) form.style.display = 'none';
            if (input) input.value = "";
        }

        function getSuggestionsList() {
            return Object.keys(libraryCache).map(title => `<option value="${title.replace(/'/g, "&apos;")}">`).join('');
        }

        function toggleEditMode(sName) {
            editingService = (editingService === sName) ? null : sName;
            renderArchive();
        }

        async function removeSongLocally(sName, cat, title) {
            if(!confirm(`Remove "${title}" from this setlist?`)) return;
            
            showToast("Removing song...");
            try {
                const payload = { action: "deleteSingleSong", serviceName: sName, category: cat, songTitle: title };
                await fetch(ARCHIVE_URL, { method: "POST", body: JSON.stringify(payload) });

                archiveCache = archiveCache.filter(s => !(s.serviceName === sName && s.category === cat && s.title === title));
                renderArchive();
            } catch (e) {
                alert("Removal failed.");
            } finally { hideToast(); }
        }

        async function deleteEntireSetlist(sName) {
            if(!confirm(`Delete the entire setlist for ${sName}?`)) return;
            
            showToast("Deleting setlist...");
            try {
                const payload = { action: "deleteSetlist", serviceName: sName };
                await fetch(ARCHIVE_URL, { method: "POST", body: JSON.stringify(payload) });

                archiveCache = archiveCache.filter(s => s.serviceName !== sName);
                editingService = null;
                renderArchive();
            } catch (e) {
                alert("Delete failed.");
            } finally { hideToast(); }
        }

        async function moveSong(sName, cat, index, direction) {
            let serviceSongs = archiveCache.filter(s => s.serviceName === sName && s.category === cat);
            let newIndex = index + direction;
            if (newIndex < 0 || newIndex >= serviceSongs.length) return;

            showToast("Reordering...");
            const temp = serviceSongs[index];
            serviceSongs[index] = serviceSongs[newIndex];
            serviceSongs[newIndex] = temp;

            try {
                archiveCache = archiveCache.filter(s => !(s.serviceName === sName && s.category === cat));
                archiveCache.push(...serviceSongs);

                for (let s of serviceSongs) {
                     await fetch(ARCHIVE_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "deleteSingleSong", serviceName: sName, category: cat, songTitle: s.title })
                    });
                }
                for (let s of serviceSongs) {
                     await fetch(ARCHIVE_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "saveSetlist", serviceName: sName, category: cat, songTitle: s.title })
                     });
                }
                renderArchive();
            } catch (e) {
                alert("Move failed.");
            } finally { hideToast(); }
        }

        async function exportToPDF(sName) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let yPos = 20;
            const pageHeightBound = 275; 
            const pageWidthBound = 165; 
            const leftMargin = 28;
            const setlist = archiveCache.filter(s => s.serviceName === sName);
            
            function guaranteeSpace(neededAmount) {
                if (yPos + neededAmount > pageHeightBound) {
                    doc.addPage();
                    yPos = 20;
                }
            }

            doc.setFontSize(22); 
            doc.setTextColor(40); 
            doc.setFont("helvetica", "bold");
            doc.text(`Setlist: ${sName}`, 20, yPos); 
            yPos += 20;

            flowCategories.forEach(cat => {
                const catSongs = setlist.filter(s => s.category === cat);
                if (catSongs.length > 0) {
                    guaranteeSpace(15);
                    doc.setFontSize(15); 
                    doc.setTextColor(100); 
                    doc.setFont("helvetica", "bold");
                    doc.text(`--- ${cat} ---`, 20, yPos); 
                    yPos += 14;

                    catSongs.forEach(song => {
                        guaranteeSpace(18);
                        doc.setFontSize(16); 
                        doc.setTextColor(0); 
                        doc.setFont("helvetica", "bold");
                        doc.text(`• ${song.title}`, 22, yPos); 
                        yPos += 14;

                        const searchKey = song.title.trim().toLowerCase();
                        const songData = libraryCache[searchKey];

                        if (songData) {
                            const content = typeof songData === 'string' ? songData : (songData.content || songData.chords || "");
                            const lines = content.split('\n');

                            lines.forEach(line => {
                                if (line.trim().length > 0 && (line.trim().includes(':') || (line.trim().split(' ').length <= 2 && !line.includes('[')))) {
                                    guaranteeSpace(16);
                                    doc.setFont("helvetica", "bold");
                                    doc.setFontSize(12);
                                    doc.setTextColor(230, 120, 30); 
                                    doc.text(line.trim(), 26, yPos);
                                    yPos += 12;
                                    return;
                                }

                                let chordGrid = "";
                                let lyricGrid = "";
                                let i = 0;
                                let hasChordsOnLine = line.includes('[');

                                while (i < line.length) {
                                    if (line[i] === '[') {
                                        i++;
                                        let chord = "";
                                        while (i < line.length && line[i] !== ']') {
                                            chord += line[i];
                                            i++;
                                        }
                                        i++; 
                                        if (chordGrid.length < lyricGrid.length) {
                                            chordGrid = chordGrid.padEnd(lyricGrid.length, " ");
                                        }
                                        chordGrid += chord;
                                    } else {
                                        lyricGrid += line[i];
                                        i++;
                                    }
                                }
                                
                                const maxLen = Math.max(chordGrid.length, lyricGrid.length);
                                chordGrid = chordGrid.padEnd(maxLen, " ");
                                lyricGrid = lyricGrid.padEnd(maxLen, " ");

                                if (maxLen === 0) {
                                    yPos += 6; 
                                    return;
                                }

                                doc.setFont("courier", "normal");
                                doc.setFontSize(14);
                                
                                let currentStart = 0;
                                while (currentStart < maxLen) {
                                    let chunkCharCount = 0;
                                    let currentChunkWidth = 0;
                                    
                                    while (currentStart + chunkCharCount < maxLen) {
                                        let testChar = lyricGrid[currentStart + chunkCharCount];
                                        let charWidth = doc.getTextWidth(testChar);
                                        if (currentChunkWidth + charWidth > pageWidthBound) {
                                            break;
                                        }
                                        currentChunkWidth += charWidth;
                                        chunkCharCount++;
                                    }

                                    if (currentStart + chunkCharCount < maxLen) {
                                        let spaceSearch = lyricGrid.lastIndexOf(" ", currentStart + chunkCharCount);
                                        if (spaceSearch > currentStart) {
                                            chunkCharCount = spaceSearch - currentStart + 1; 
                                        }
                                    }

                                    let chordSub = chordGrid.substring(currentStart, currentStart + chunkCharCount);
                                    let lyricSub = lyricGrid.substring(currentStart, currentStart + chunkCharCount);

                                    if (hasChordsOnLine) {
                                        guaranteeSpace(24);
                                        if (chordSub.trim().length > 0) {
                                            doc.setFont("courier", "bold");
                                            doc.setFontSize(14);
                                            doc.setTextColor(200, 130, 0); 
                                            doc.text(chordSub, leftMargin, yPos);
                                        }
                                        yPos += 7; 
                                    } else {
                                        guaranteeSpace(14);
                                    }

                                    doc.setFont("courier", "normal");
                                    doc.setFontSize(14);
                                    doc.setTextColor(40); 
                                    doc.text(lyricSub, leftMargin, yPos);
                                    
                                    yPos += 14; 
                                    currentStart += chunkCharCount; 
                                }
                            });
                            yPos += 10; 
                        } else { 
                            yPos += 10; 
                        }
                    });
                }
            });
            doc.save(`${sName}_Chord_Sheet.pdf`);
        }

        function openPreviewAll(sName) {
            const songs = archiveCache.filter(i => i.serviceName === sName);
            let html = `<h2 style="color:var(--accent); text-align:center; margin-bottom: 24px;">${sName}</h2>`;
            
            flowCategories.forEach(cat => {
                const catSongs = songs.filter(s => s.category === cat);
                if (catSongs.length > 0) {
                    html += `<div style="margin-top:25px; border-bottom: 2px solid var(--service-header); padding-bottom:6px; color:var(--service-header); font-weight:bold; text-transform:uppercase; font-size:13px; letter-spacing:0.05em;">${cat}</div>`;
                    catSongs.forEach(s => {
                        const searchKey = s.title.trim().toLowerCase();
                        const content = libraryCache[searchKey];

                        html += `
                            <div style="margin-top:16px; margin-bottom:30px; padding: 20px; background: rgba(20, 27, 45, 0.6); border-radius: 12px; border:1px solid var(--border);">
                                <h3 style="margin-top:0; color:#fff; font-size:16px; margin-bottom:14px; display:flex; justify-content:space-between;">
                                    <span>${s.title}</span>
                                    <span style="font-size:12px; color:var(--chord-color)">Key: ${detectOriginalKey(content)}</span>
                                </h3>
                                ${content ? parseChords(content) : "<i style='color:var(--sub-text); font-size:14px;'>[Lyrics/Chords not found in library]</i>"}
                            </div>`;
                    });
                }
            });
            document.getElementById('contentContainer').innerHTML = html;
            document.getElementById('viewerModal').style.display = 'flex';
        }

        function parseChords(content) {
            if (!content) return "";
            const lines = content.split('\n'); 
            let formattedHtml = "";
            
            lines.forEach(line => {
                if (line.trim().length > 0 && (line.trim().includes(':') || (line.trim().split(' ').length <= 2 && !line.includes('[')))) {
                    formattedHtml += `<div style="margin-top:16px; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05);"><span style="color:var(--header-color); font-weight:bold; font-size:12px; text-transform:uppercase; letter-spacing:0.02em;">${line.trim()}</span></div>`;
                    return;
                }
                
                let chordGrid = "";
                let lyricGrid = "";
                let i = 0;
                let hasChords = line.includes('[');

                while (i < line.length) {
                    if (line[i] === '[') {
                        i++;
                        let chord = "";
                        while (i < line.length && line[i] !== ']') {
                            chord += line[i];
                            i++;
                        }
                        i++;
                        if (chordGrid.length < lyricGrid.length) {
                            chordGrid = chordGrid.padEnd(lyricGrid.length, " ");
                        }
                        chordGrid += chord;
                    } else {
                        lyricGrid += line[i];
                        i++;
                    }
                }

                const maxLen = Math.max(chordGrid.length, lyricGrid.length);
                if (maxLen === 0) {
                    formattedHtml += `<div style="height: 1em;"></div>`;
                    return;
                }

                chordGrid = chordGrid.padEnd(maxLen, " ");
                lyricGrid = lyricGrid.padEnd(maxLen, " ");

                // Convert spaces to &nbsp; to prevent the browser from skipping spaces or shifting elements around
                let finalChordLine = "";
                let finalLyricLine = "";
                
                for (let j = 0; j < maxLen; j++) {
                    finalChordLine += chordGrid[j] === " " ? "&nbsp;" : `<b style="color:var(--chord-color); font-weight:bold;">${chordGrid[j]}</b>`;
                    finalLyricLine += lyricGrid[j] === " " ? "&nbsp;" : lyricGrid[j];
                }

                formattedHtml += `
                    <div style="font-family:'Courier New', monospace; font-size:15px; line-height:1.4; margin-bottom:10px; white-space:pre-wrap; word-break:break-all;">
                        ${hasChords ? `<div style="color:var(--chord-color); min-height:1.2em;">${finalChordLine}</div>` : ''}
                        <div style="color:var(--text-main);">${finalLyricLine}</div>
                    </div>`;
            });

            return `<div style="background:#0b0f19; padding:20px; border-radius:10px; border:1px solid rgba(255,255,255,0.02);">${formattedHtml}</div>`;
        }

        function showToast(m) { const t=document.createElement('div'); t.id="toast"; t.className="loading-toast"; t.innerHTML=`<i class="fa-solid fa-spinner fa-spin"></i> ${m}`; document.body.appendChild(t); }
        function hideToast() { const t=document.getElementById("toast"); if(t) t.remove(); }
        function closeModal() { document.getElementById('viewerModal').style.display = 'none'; }
        window.onload = init;

        function showAddForm(sId) {
            const form = document.getElementById(`add-form-${sId}`);
            if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        async function addSongLocally(sName, sId) {
            const catElement = document.getElementById(`cat-select-${sId}`);
            const titleElement = document.getElementById(`title-input-${sId}`);
            if (!titleElement || !catElement) return;

            const cat = catElement.value; const title = titleElement.value.trim();
            if (!title) return alert("Please enter a song title");

            showToast("Adding song...");
            try {
                const payload = { action: "saveSetlist", serviceName: sName, category: cat, songTitle: title };
                const resp = await fetch(ARCHIVE_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await resp.json();

                if (result.result === "success" || result.result === "exists") {
                    archiveCache.push({ serviceName: sName, category: cat, title: title });
                    titleElement.value = "";
                    renderArchive();
                } else { alert("Error: " + result.message); }
            } catch (e) {
                archiveCache.push({ serviceName: sName, category: cat, title: title });
                renderArchive();
            } finally { hideToast(); }
        }
    </script>
