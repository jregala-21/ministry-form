<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAM / VIA Scheduler Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --bg-workspace: #090d16;
            --bg-control: #111827;
            --bg-input: #1f2937;
            --border-ui: #374151;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --accent-glow: #38bdf8;
            --accent-success: #4ade80;
            --accent-purple: #a78bfa;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-workspace);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            body {
                padding: 24px;
                height: 100vh;
                overflow: hidden;
            }
        }

        header {
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-ui);
            padding-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 640px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #f9fafb, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .studio-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            flex-grow: 1;
        }

        @media (min-width: 1024px) {
            .studio-container {
                flex-direction: row;
                height: calc(100vh - 100px);
                gap: 24px;
                overflow: visible;
            }
        }

        /* NAVIGATION TABS */
        .tab-navigation {
            display: flex;
            border-bottom: 1px solid var(--border-ui);
            margin-bottom: 16px;
            gap: 4px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn.active {
            color: var(--accent-glow);
            border-bottom-color: var(--accent-glow);
            background: rgba(56, 189, 248, 0.05);
        }

        /* CONTROL PANEL */
        .control-panel {
            width: 100%;
            background-color: var(--bg-control);
            border: 1px solid var(--border-ui);
            border-radius: 14px;
            padding: 16px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        @media (min-width: 1024px) {
            .control-panel {
                width: 42%;
                min-width: 380px;
                padding: 24px;
                overflow-y: auto;
                gap: 20px;
            }
        }

        .form-section {
            background: rgba(9, 13, 22, 0.5);
            border: 1px solid var(--border-ui);
            border-radius: 10px;
            padding: 14px;
        }

        .form-section h3 {
            margin: 0 0 12px 0;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent-glow);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }

        .input-group:last-child { margin-bottom: 0; }

        .service-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .service-section-label {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent-glow);
        }

        .service-section-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border-ui);
            border-radius: 999px;
            background: transparent;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            cursor: pointer;
            font-size: 14px;
        }

        .service-section-toggle.closed {
            transform: rotate(180deg);
        }

        .service-section-body.closed {
            display: none;
        }

        .service-select-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .service-select-row label {
            font-size: 13px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .service-select-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-glow);
            cursor: pointer;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], input[type="month"] {
            background-color: var(--bg-input);
            border: 1px solid var(--border-ui);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--accent-glow);
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-glow);
            cursor: pointer;
        }

        /* ACCORDION CARDS */
        .week-card {
            background: var(--bg-input);
            border: 1px solid var(--border-ui);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
        }
        
        .week-card-header {
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--accent-glow);
            user-select: none;
        }

        .week-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .week-card-body {
            padding: 14px;
            display: none;
            border-top: 1px solid var(--border-ui);
        }
        
        .week-card-body.open { display: block; }
        
        .service-split {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 480px) {
            .service-split {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
        }
        
        .service-split h4 { 
            margin: 0 0 10px 0; 
            font-size: 11px; 
            color: var(--text-muted); 
            border-bottom: 1px solid var(--border-ui); 
            padding-bottom: 5px;
        }

        .theme-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .theme-btn {
            background: var(--bg-input);
            border: 1px solid var(--border-ui);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .theme-btn.active {
            border-color: var(--accent-glow);
            background: rgba(56, 189, 248, 0.15);
            color: var(--accent-glow);
        }

        .action-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .select-all-container {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(56, 189, 248, 0.1);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-ui);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-row { display: flex; gap: 10px; width: 100%; }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download { background-color: transparent; border: 1px solid var(--border-ui); color: var(--text-main); }
        .btn-download:hover { background-color: var(--bg-input); }
        .btn-save { background-color: var(--accent-glow); color: #090d16; }
        .btn-save:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* CANVAS PREVIEW PANEL */
        .preview-panel {
            width: 100%;
            background-color: rgba(17, 24, 39, 0.4);
            border: 1px solid var(--border-ui);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            box-sizing: border-box;
            position: relative;
            gap: 24px;
            overflow: auto;
        }

        @media (min-width: 1024px) {
            .preview-panel {
                width: 58%;
                padding: 20px;
                overflow-y: auto;
            }
        }

        /* STANDARD POSTER DESIGN SETUP */
        .poster-canvas {
            width: 100%;
            max-width: 400px;
            min-height: 520px;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            padding: 36px 28px 24px 28px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .batch-canvas-instance { margin: 12px auto; display: block; }

        /* CREATIVE GRADIENT MATRIX */
        .theme-worship { background: linear-gradient(135deg, #1e1b4b, #311042); color: #f8fafc; }
        .theme-dark { background: linear-gradient(135deg, #0f172a, #1e293b); color: #f8fafc; }
        .theme-light { background: linear-gradient(135deg, #f8fafc, #e2e8f0); color: #0f172a; }
        .theme-gold { background: linear-gradient(135deg, #111, #2d2310); color: #fef08a; }
        .theme-sunset { background: linear-gradient(135deg, #4c0519, #7c2d12); color: #ffedd5; }
        .theme-emerald { background: linear-gradient(135deg, #022c22, #064e3b); color: #ccfbf1; }

        .poster-header { text-align: center; margin-bottom: 24px; }

        .poster-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 6px 0;
            line-height: 1.2;
        }
        
        .poster-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 4px 0 0 0;
            opacity: 0.9;
        }

        .theme-light .poster-title { color: #0f172a; }
        .theme-worship .poster-title { color: #c084fc; text-shadow: 0 0 15px rgba(192,132,252,0.3); }
        .theme-gold .poster-title { color: #facc15; text-shadow: 0 0 15px rgba(250,204,21,0.3); }
        .theme-sunset .poster-title { color: #fb923c; }
        .theme-emerald .poster-title { color: #2dd4bf; }

        .poster-date {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            font-weight: 700;
        }

        /* EXTENDED SERVICE GRID LAYOUT */
        .services-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            flex-grow: 1;
            align-items: stretch; /* Stretches columns down to the footer */
            margin-bottom: 20px;
        }
        
        .services-monthly-layout {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex-grow: 1;
            width: 100%;
            margin-bottom: 20px;
        }

        .service-column {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 10px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            height: 100%; /* Spans full dynamic workspace block height */
            box-sizing: border-box;
        }

        .theme-light .service-column { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(0, 0, 0, 0.06); }

        .service-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            text-align: center;
            margin: 0 0 14px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .theme-light .service-title { border-bottom-color: rgba(0,0,0,0.12); }
        .theme-gold .service-title { color: #fef08a; }
        .theme-sunset .service-title { color: #ffedd5; }
        .theme-emerald .service-title { color: #ccfbf1; }

        .roster-list { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex-grow: 1; 
            justify-content: space-around; /* Distributes assignments down cleanly */
        }
        
        .roster-row { display: flex; flex-direction: column; }
        
        .roster-role {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            opacity: 0.6;
            font-weight: 700;
            margin-bottom: 2px;
        }
        .theme-light .roster-role { opacity: 0.7; color: #4b5563; }

        .roster-name {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word;
            min-height: 24px;
        }

        .poster-monthly-row {
            display: grid;
            grid-template-columns: 100px 1fr 1fr;
            gap: 12px;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 14px;
            border-radius: 8px;
        }
        .theme-light .poster-monthly-row { background: rgba(0, 0, 0, 0.02); border-color: rgba(0, 0, 0, 0.05); }
        
        .poster-monthly-date {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent-glow);
            text-transform: uppercase;
        }
        .theme-light .poster-monthly-date { color: inherit; font-weight: 800; }

        .poster-footer {
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-top: auto;
            padding-top: 12px;
            text-transform: uppercase;
            font-weight: 600;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        .theme-light .poster-footer { border-top-color: rgba(0, 0, 0, 0.03); }

        .status-hud {
            position: absolute;
            bottom: 16px;
            left: 16px;
            right: 16px;
            background-color: var(--bg-control);
            border: 1px solid var(--border-ui);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .tab-content { display: none; }
        .tab-content.active-content { display: flex; flex-direction: column; gap: 16px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>JAM / VIA Scheduler Workspace</h1>
        </div>
        <div style="display:flex; align-items:center; gap:12px; justify-content: space-between;">
            <button onclick="window.location.href='index.html'" style="background: var(--bg-input); border: 1px solid var(--border-ui); color: var(--text-main); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px;">
                🏠 Home
            </button>
            <div style="font-size: 12px; color: var(--text-muted);">Workspace Root</div>
        </div>
    </header>

    <div class="studio-container">
        <div class="control-panel">
            <div class="input-group">
                <label for="schedMonth">Target Month Compilation</label>
                <input type="month" id="schedMonth" onchange="handleMonthChange()">
            </div>

            <div class="tab-navigation">
                <button class="tab-btn active" id="tabBand" onclick="switchMainTab('band')">Band Roster</button>
                <button class="tab-btn" id="tabServices" onclick="switchMainTab('services')">Sunday Services</button>
            </div>

            <div class="form-section">
                <h3>Batch Visual Theme</h3>
                <div class="theme-selector">
                    <button class="theme-btn active" onclick="switchBatchTheme('worship', this)">Deep Worship</button>
                    <button class="theme-btn" onclick="switchBatchTheme('dark', this)">Modern Dark</button>
                    <button class="theme-btn" onclick="switchBatchTheme('light', this)">Minimalist Light</button>
                    <button class="theme-btn" onclick="switchBatchTheme('gold', this)">Elegant Gold</button>
                    <button class="theme-btn" onclick="switchBatchTheme('sunset', this)">Sunset Glow</button>
                    <button class="theme-btn" onclick="switchBatchTheme('emerald', this)">Emerald Velvet</button>
                </div>
            </div>

            <!-- TAB 1: BAND SCHEDULER SYSTEM -->
            <div id="contentBand" class="tab-content active-content">
                <div id="monthlyFormsContainer"></div>
                <div class="action-block">
                    <label class="select-all-container">
                        <input type="checkbox" id="selectAllCheckbox" checked onchange="toggleAllWeeks(this)">
                        Select All / Deselect All Weeks
                    </label>
                    <div class="btn-row">
                        <button class="btn btn-download" onclick="downloadSelectedPosters('band')">📥 Download Selected</button>
                    </div>
                    <button id="syncBatchBtn" class="btn btn-save" onclick="sendSelectedToAnnouncementPage('band')">🚀 Send Selected to Announcement</button>
                </div>
            </div>

            <!-- TAB 2: SUNDAY SERVICES & BACKUPS SCHEDULER -->
            <div id="contentServices" class="tab-content">
                <div id="servicesFormsContainer" style="display:flex; flex-direction:column; gap:12px;"></div>
                <div class="action-block">
                    <div class="btn-row">
                        <button class="btn btn-download" onclick="selectAllServiceDates(true)">☑️ Select All Dates</button>
                        <button class="btn btn-download" onclick="selectAllServiceDates(false)">⬜ Deselect All Dates</button>
                    </div>
                    <div class="btn-row">
                        <button class="btn btn-download" onclick="downloadSinglePoster('servicesMonthlyPoster')">📥 Download Leaders</button>
                        <button class="btn btn-download" onclick="downloadSelectedPosters('backups')">📥 Download Backups</button>
                    </div>
                    <button id="syncServicesBtn" class="btn btn-save" onclick="sendSelectedToAnnouncementPage('services')">🚀 Send to Announcement</button>
                </div>
            </div>
        </div>

        <div class="preview-panel" id="batchPreviewContainer">
            <div class="status-hud" id="statusHudBatch">
                <div class="hud-meta"><span id="batchHudMsg">Preparing operations...</span></div>
            </div>
        </div>
    </div>

<script>
    const MEMBER_API = "https://script.google.com/macros/s/AKfycbz7xG5gki0Jr8TidIbKKpT8YM52XDxTK_6JN2XcX7xESn8ABgdp98E_Q9WS2D8geKfB/exec";
    let memberDirectory = [];
    let activeTab = 'band';
    let batchSundays = [];
    let currentBatchTheme = 'theme-worship';

    const instruments = [
        { id: 'keys', label: 'Keyboardist' },
        { id: 'drums', label: 'Drums' },
        { id: 'bass', label: 'Bassist' },
        { id: 'eguitar', label: 'Electric Guitar' },
        { id: 'aguitar', label: 'Acoustic Guitar' }
    ];

    async function loadMemberDirectory() {
        try {
            const response = await fetch(MEMBER_API);
            memberDirectory = await response.json();
            buildMemberSuggestions();
        } catch(err) {
            console.error("Failed loading member directory", err);
            memberDirectory = [];
        }
    }

    function buildMemberSuggestions() {
        const datalist = document.getElementById("memberSuggestions");
        datalist.innerHTML = "";
        memberDirectory.forEach(member => {
            const option = document.createElement("option");
            option.value = member.name;
            option.label = `${member.name} (${member.ministry})`;
            datalist.appendChild(option);
        });
    }

    window.addEventListener('DOMContentLoaded', async () => {
        const d = new Date();
        const monthStr = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
        document.getElementById('schedMonth').value = monthStr;
        await loadMemberDirectory();
        handleMonthChange();
    });

    function switchMainTab(tabName) {
        activeTab = tabName;
        document.getElementById('tabBand').classList.toggle('active', tabName === 'band');
        document.getElementById('tabServices').classList.toggle('active', tabName === 'services');
        document.getElementById('contentBand').classList.toggle('active-content', tabName === 'band');
        document.getElementById('contentServices').classList.toggle('active-content', tabName === 'services');
        renderPreviews();
    }

    function handleMonthChange() {
        calculateSundays();
        generateBandForms();
        generateServicesForms();
        renderPreviews();
    }

    function calculateSundays() {
        const monthVal = document.getElementById('schedMonth').value;
        if(!monthVal) return;
        const [year, month] = monthVal.split('-');
        const daysInMonth = new Date(year, month, 0).getDate();
        
        batchSundays = [];
        for(let i=1; i<=daysInMonth; i++) {
            let d = new Date(year, month-1, i);
            if(d.getDay() === 0) batchSundays.push(d);
        }
    }

    function toggleAccordion(id) {
        const body = document.getElementById(`week-body-${id}`);
        if(body) body.classList.toggle('open');
    }

    function toggleAllWeeks(masterCheckbox) {
        document.querySelectorAll('.week-checkbox').forEach(cb => {
            cb.checked = masterCheckbox.checked;
        });
    }

    function handleSingleCheckboxChange() {
        const total = document.querySelectorAll('.week-checkbox').length;
        const checked = document.querySelectorAll('.week-checkbox:checked').length;
        const master = document.getElementById('selectAllCheckbox');
        if(master) master.checked = (total === checked);
    }

    function generateBandForms() {
        const formsContainer = document.getElementById('monthlyFormsContainer');
        formsContainer.innerHTML = '';
        if(document.getElementById('selectAllCheckbox')) {
            document.getElementById('selectAllCheckbox').checked = true;
        }

        batchSundays.forEach((sunday, idx) => {
            let formHtml = `
                <div class="week-card">
                    <div class="week-card-header" onclick="toggleAccordion(${idx})">
                        <div class="week-header-left" onclick="event.stopPropagation()">
                            <input type="checkbox" class="week-checkbox" data-idx="${idx}" checked onchange="handleSingleCheckboxChange()">
                            <span>Week ${idx + 1}: ${sunday.toLocaleDateString('en-US', {month: 'short', day: 'numeric'})}</span>
                        </div>
                        <span>▼</span>
                    </div>
                    <div class="week-card-body ${idx === 0 ? 'open' : ''}" id="week-body-${idx}">
                        <div class="service-split">
                            <div>
                                <h4>1st Service</h4>`;
            instruments.forEach(inst => {
                formHtml += `<div class="input-group"><label>${inst.label}</label>
                    <input type="text" list="memberSuggestions" oninput="updateBatchCanvas(${idx}, 's1', '${inst.id}', this.value)"></div>`;
            });
            formHtml += `</div><div><h4>2nd Service</h4>`;
            instruments.forEach(inst => {
                formHtml += `<div class="input-group"><label>${inst.label}</label>
                    <input type="text" list="memberSuggestions" oninput="updateBatchCanvas(${idx}, 's2', '${inst.id}', this.value)"></div>`;
            });
            formHtml += `</div></div></div></div>`;
            formsContainer.innerHTML += formHtml;
        });
    }

    function generateServicesForms() {
        const container = document.getElementById('servicesFormsContainer');
        container.innerHTML = '';

        batchSundays.forEach((sunday, idx) => {
            const dateLabel = sunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            let html = `
                <div class="form-section">
                    <div class="service-section-header" onclick="toggleServiceSection(${idx})">
                        <span class="service-section-label">${dateLabel}</span>
                        <button type="button" class="service-section-toggle" id="service-section-toggle-${idx}" aria-label="Toggle date inputs">▼</button>
                    </div>
                    <div class="service-section-body open" id="service-section-body-${idx}">
                        <div class="service-select-row">
                            <label for="select-service-${idx}" onclick="event.stopPropagation()">
                                <input type="checkbox" id="select-service-${idx}" class="service-date-checkbox" data-idx="${idx}" checked onchange="syncServiceData(${idx})">
                                Select this date for poster generation
                            </label>
                        </div>
                        <div class="input-group">
                        <div class="toggle-group">
                            <input type="checkbox" id="allow-dup-${idx}" checked onchange="toggleBackupVisibility(${idx}); syncServiceData(${idx})">
                            <label for="allow-dup-${idx}" style="text-transform:none; cursor:pointer;">Allow same backups across services</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Praise & Worship (Main)</label>
                        <input type="text" list="memberSuggestions" id="input-pw-${idx}" oninput="syncServiceData(${idx})">
                    </div>
                    <div class="input-group">
                        <div class="toggle-group">
                            <input type="checkbox" id="toggle-vic-${idx}" onchange="syncServiceData(${idx})">
                            <label for="toggle-vic-${idx}" style="text-transform:none; cursor:pointer;">Independent Victory Worker</label>
                        </div>
                        <input type="text" list="memberSuggestions" id="input-vic-${idx}" oninput="syncServiceData(${idx})" disabled style="opacity:0.5; margin-top:6px;">
                    </div>
                    
                    <!-- 1ST SERVICE BACKUPS -->
                    <div style="border-top: 1px dashed var(--border-ui); margin: 12px 0; padding-top: 8px;">
                        <h4 id="title-s1-${idx}" style="margin: 0 0 10px 0; font-size: 11px; color: var(--accent-glow); text-transform: uppercase;">Shared Backups (1st & 2nd Service)</h4>
                    </div>
                    <div class="input-group"><label>Backup 1</label><input type="text" list="memberSuggestions" id="input-pw-b1-${idx}" oninput="validateBackup('pw', ${idx}, 'input-pw-b1-${idx}'); syncServiceData(${idx})"></div>
                    <div class="input-group"><label>Backup 2</label><input type="text" list="memberSuggestions" id="input-pw-b2-${idx}" oninput="validateBackup('pw', ${idx}, 'input-pw-b2-${idx}'); syncServiceData(${idx})"></div>
                    <div class="input-group"><label>Backup 3</label><input type="text" list="memberSuggestions" id="input-pw-b3-${idx}" oninput="validateBackup('pw', ${idx}, 'input-pw-b3-${idx}'); syncServiceData(${idx})"></div>
                    <div class="input-group"><label>Backup 4</label><input type="text" list="memberSuggestions" id="input-pw-b4-${idx}" oninput="validateBackup('pw', ${idx}, 'input-pw-b4-${idx}'); syncServiceData(${idx})"></div>

                    <!-- 2ND SERVICE BACKUPS (CONDITIONAL MANUAL SLOTS) -->
                    <div id="container-s2-${idx}" style="display:none;">
                        <div style="border-top: 1px dashed var(--border-ui); margin: 12px 0; padding-top: 8px;">
                            <h4 style="margin: 0 0 10px 0; font-size: 11px; color: var(--accent-purple); text-transform: uppercase;">2nd Service Backups</h4>
                        </div>
                        <div class="input-group"><label>Backup 1</label><input type="text" list="memberSuggestions" id="input-vic-b1-${idx}" oninput="validateBackup('vic', ${idx}, 'input-vic-b1-${idx}'); syncServiceData(${idx})"></div>
                        <div class="input-group"><label>Backup 2</label><input type="text" list="memberSuggestions" id="input-vic-b2-${idx}" oninput="validateBackup('vic', ${idx}, 'input-vic-b2-${idx}'); syncServiceData(${idx})"></div>
                        <div class="input-group"><label>Backup 3</label><input type="text" list="memberSuggestions" id="input-vic-b3-${idx}" oninput="validateBackup('vic', ${idx}, 'input-vic-b3-${idx}'); syncServiceData(${idx})"></div>
                        <div class="input-group"><label>Backup 4</label><input type="text" list="memberSuggestions" id="input-vic-b4-${idx}" oninput="validateBackup('vic', ${idx}, 'input-vic-b4-${idx}'); syncServiceData(${idx})"></div>
                    </div>
                </div>
            `;
            container.innerHTML += html;
        });

        batchSundays.forEach((_, idx) => toggleBackupVisibility(idx));
    }

    function toggleServiceSection(idx) {
        const body = document.getElementById(`service-section-body-${idx}`);
        const button = document.getElementById(`service-section-toggle-${idx}`);
        if (!body || !button) return;
        const isClosed = body.classList.toggle('closed');
        button.classList.toggle('closed', isClosed);
    }

    function selectAllServiceDates(value) {
        document.querySelectorAll('.service-date-checkbox').forEach(cb => {
            cb.checked = value;
            const idx = parseInt(cb.dataset.idx, 10);
            if (!Number.isNaN(idx)) syncServiceData(idx);
        });
    }

    function toggleBackupVisibility(idx) {
        const isChecked = document.getElementById(`allow-dup-${idx}`).checked;
        const s2Container = document.getElementById(`container-s2-${idx}`);
        const s1Title = document.getElementById(`title-s1-${idx}`);
        
        if (isChecked) {
            s2Container.style.display = 'none';
            if (s1Title) s1Title.innerText = "Shared Backups (1st & 2nd Service)";
        } else {
            s2Container.style.display = 'block';
            if (s1Title) s1Title.innerText = "1st Service Backups";
        }
    }

    function syncServiceData(idx) {
        const pwVal = document.getElementById(`input-pw-${idx}`).value.trim() || "Unassigned";
        const vicToggle = document.getElementById(`toggle-vic-${idx}`).checked;
        const vicInput = document.getElementById(`input-vic-${idx}`);
        const allowDup = document.getElementById(`allow-dup-${idx}`).checked;
        
        let finalVicVal = pwVal;
        if(vicToggle) {
            vicInput.disabled = false;
            vicInput.style.opacity = "1";
            finalVicVal = vicInput.value.trim() || "Unassigned";
        } else {
            vicInput.disabled = true;
            vicInput.style.opacity = "0.5";
        }

        const previewPw = document.getElementById(`render-pw-${idx}`);
        const previewVic = document.getElementById(`render-vic-${idx}`);
        if(previewPw) previewPw.innerText = pwVal;
        if(previewVic) previewVic.innerText = finalVicVal;

        for(let b = 1; b <= 4; b++) {
            const s1InEl = document.getElementById(`input-pw-b${b}-${idx}`);
            const s1RenderEl = document.getElementById(`b${idx}-pw-b${b}`);
            const s2RenderEl = document.getElementById(`b${idx}-vic-b${b}`);
            
            const s1Value = s1InEl ? (s1InEl.value.trim() || 'Unassigned') : 'Unassigned';
            if (s1RenderEl) s1RenderEl.innerText = s1Value;

            if (allowDup) {
                if (s2RenderEl) s2RenderEl.innerText = s1Value;
            } else {
                const s2InEl = document.getElementById(`input-vic-b${b}-${idx}`);
                if (s2RenderEl) s2RenderEl.innerText = s2InEl ? (s2InEl.value.trim() || 'Unassigned') : 'Unassigned';
            }
        }
    }

    function validateBackup(serviceKey, idx, backupId) {
        const backupEl = document.getElementById(backupId);
        if(!backupEl) return;
        const val = backupEl.value.trim();
        if(!val) return;

        for(let b = 1; b <= 4; b++) {
            const otherId = `${serviceKey === 'pw' ? 'input-pw-b' : 'input-vic-b'}${b}-${idx}`;
            if(otherId === backupId) continue;
            const otherEl = document.getElementById(otherId);
            if(otherEl && otherEl.value.trim() === val){
                alert('Backup names must be unique within the same service.');
                backupEl.value = '';
                return;
            }
        }

        const allowDup = document.getElementById(`allow-dup-${idx}`).checked;
        // Cross-service backup duplicates are allowed, so no conflict check is needed here.
        if (!allowDup && serviceKey === 'pw') {
            // no-op: allow same person on pw and vic backup slots across services
        } else if (!allowDup && serviceKey === 'vic') {
            // no-op: allow same person on vic and pw backup slots across services
        }
    }

    function renderPreviews() {
        const previewContainer = document.getElementById('batchPreviewContainer');
        const huds = previewContainer.querySelectorAll('.status-hud');
        previewContainer.innerHTML = '';
        huds.forEach(hud => previewContainer.appendChild(hud));

        const monthVal = document.getElementById('schedMonth').value;
        if(!monthVal) return;
        const [year, month] = monthVal.split('-');
        const dateObj = new Date(year, month - 1, 1);
        const displayMonthCaps = dateObj.toLocaleDateString('en-US', { month: 'long' }).toUpperCase();

        if (activeTab === 'band') {
            batchSundays.forEach((sunday, idx) => {
                const dateStr = sunday.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                let canvasHtml = `
                <div id="batchCanvas-${idx}" class="poster-canvas ${currentBatchTheme} batch-canvas-instance">
                    <div class="poster-header">
                        <div class="poster-title">JAM ASSIGNED</div>
                        <div class="poster-date">${dateStr}</div>
                    </div>
                    <div class="services-layout">
                        <div class="service-column">
                            <div class="service-title">1st Service</div>
                            <div class="roster-list">`;
                instruments.forEach(inst => {
                    canvasHtml += `<div class="roster-row"><span class="roster-role">${inst.label}</span><span id="b${idx}-s1-${inst.id}" class="roster-name">Unassigned</span></div>`;
                });
                canvasHtml += `</div></div><div class="service-column"><div class="service-title">2nd Service</div><div class="roster-list">`;
                instruments.forEach(inst => {
                    canvasHtml += `<div class="roster-row"><span class="roster-role">${inst.label}</span><span id="b${idx}-s2-${inst.id}" class="roster-name">Unassigned</span></div>`;
                });
                canvasHtml += `</div></div></div><div class="poster-footer">JAM SCHEDULE MINISTRY</div></div>`;
                previewContainer.insertAdjacentHTML('beforeend', canvasHtml);
            });
        } else {
            // Summary Leaders Poster
            let servicesHtml = `
            <div id="servicesMonthlyPoster" class="poster-canvas ${currentBatchTheme} batch-canvas-instance" style="justify-content: flex-start;">
                <div class="poster-header" style="margin-bottom:20px;">
                    <div class="poster-title" style="font-size:22px; letter-spacing:1px; line-height:1.3;">SUNDAY WORSHIP<br>LEADERS ASSIGNED</div>
                    <div class="poster-subtitle" style="font-size:15px; margin-top:8px;">MONTH OF ${displayMonthCaps}</div>
                </div>
                <div class="services-monthly-layout">
                    <div class="poster-monthly-row" style="background:transparent; border:none; padding:2px 14px; font-weight:800; opacity:0.5;">
                        <div class="roster-role">Date</div>
                        <div class="roster-role">Praise & Worship</div>
                        <div class="roster-role">Victory</div>
                    </div>`;
            
            batchSundays.forEach((sunday, idx) => {
                const dayLabel = sunday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                servicesHtml += `
                    <div class="poster-monthly-row">
                        <div class="poster-monthly-date">${dayLabel}</div>
                        <div class="roster-name" id="render-pw-${idx}" style="min-height:auto; font-size:13px; font-weight:700;">Unassigned</div>
                        <div class="roster-name" id="render-vic-${idx}" style="min-height:auto; font-size:13px; font-weight:700;">Unassigned</div>
                    </div>
                `;
            });

            servicesHtml += `</div><div class="poster-footer" style="margin-top:auto;">VIA SCHEDULE MINISTRY</div></div>`;
            previewContainer.insertAdjacentHTML('beforeend', servicesHtml);
            
            // Individual dedicated Date Posters for Backups
            batchSundays.forEach((sunday, idx) => {
                const dateStr = sunday.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
                let backupCanvasHtml = `
                <div id="servicesBackupPoster-${idx}" class="poster-canvas ${currentBatchTheme} batch-canvas-instance unique-backup-poster">
                    <div class="poster-header">
                        <div class="poster-title" style="font-size:21px;">SUNDAY BACKUPS</div>
                        <div class="poster-date">${dateStr}</div>
                    </div>
                    <div class="services-layout">
                        <div class="service-column">
                            <div class="service-title">1st Service</div>
                            <div class="roster-list">
                                <div class="roster-row"><span class="roster-role">Backup 1</span><span id="b${idx}-pw-b1" class="roster-name">Unassigned</span></div>
                                <div class="roster-row"><span class="roster-role">Backup 2</span><span id="b${idx}-pw-b2" class="roster-name">Unassigned</span></div>
                                <div class="roster-row"><span class="roster-role">Backup 3</span><span id="b${idx}-pw-b3" class="roster-name">Unassigned</span></div>
                                <div class="roster-row"><span class="roster-role">Backup 4</span><span id="b${idx}-pw-b4" class="roster-name">Unassigned</span></div>
                            </div>
                        </div>
                        <div class="service-column">
                            <div class="service-title">2nd Service</div>
                            <div class="roster-list">
                                <div class="roster-row"><span class="roster-role">Backup 1</span><span id="b${idx}-vic-b1" class="roster-name">Unassigned</span></div>
                                <div class="roster-row"><span class="roster-role">Backup 2</span><span id="b${idx}-vic-b2" class="roster-name">Unassigned</span></div>
                                <div class="roster-row"><span class="roster-role">Backup 3</span><span id="b${idx}-vic-b3" class="roster-name">Unassigned</span></div>
                                <div class="roster-row"><span class="roster-role">Backup 4</span><span id="b${idx}-vic-b4" class="roster-name">Unassigned</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="poster-footer">VIA SCHEDULE BACKUPS</div>
                </div>`;
                previewContainer.insertAdjacentHTML('beforeend', backupCanvasHtml);
            });
            
            batchSundays.forEach((_, idx) => syncServiceData(idx));
        }
    }

    function updateBatchCanvas(weekIdx, service, instId, value) {
        const el = document.getElementById(`b${weekIdx}-${service}-${instId}`);
        if(el) el.innerText = value.trim() || "Unassigned";
    }

    function switchBatchTheme(themeName, btnNode) {
        currentBatchTheme = `theme-${themeName}`;
        document.querySelectorAll('.batch-canvas-instance').forEach(canvas => {
            canvas.className = `poster-canvas batch-canvas-instance ${currentBatchTheme}`;
        });
        const parent = btnNode.closest('.theme-selector');
        parent.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btnNode.classList.add('active');
    }

    function getSelectedServiceIndices() {
        return Array.from(document.querySelectorAll('.service-date-checkbox:checked'))
            .map(cb => parseInt(cb.dataset.idx, 10))
            .filter(idx => !Number.isNaN(idx));
    }

    async function downloadSelectedPosters(mode) {
        if(mode === 'band') {
            const checkedBoxes = Array.from(document.querySelectorAll('.week-checkbox:checked'));
            if (checkedBoxes.length === 0) return alert("Please select at least one week to download.");
            for (let i = 0; i < checkedBoxes.length; i++) {
                const idx = parseInt(checkedBoxes[i].getAttribute('data-idx'));
                const canvas = document.getElementById(`batchCanvas-${idx}`);
                const rawDate = batchSundays[idx].toISOString().split('T')[0];
                await executeDownload(canvas, `Schedule_Poster_${rawDate}.png`);
            }
        } else if (mode === 'backups') {
            const selectedIndices = getSelectedServiceIndices();
            if (selectedIndices.length === 0) return alert("Please select at least one service date to download backups.");
            for (const idx of selectedIndices) {
                const canvas = document.getElementById(`servicesBackupPoster-${idx}`);
                if(canvas) {
                    const rawDate = batchSundays[idx].toISOString().split('T')[0];
                    await executeDownload(canvas, `Sunday_Backups_${rawDate}.png`);
                }
            }
        }
    }

    async function downloadSinglePoster(elementId) {
        const canvas = document.getElementById(elementId);
        const targetMonth = document.getElementById('schedMonth').value;
        if(!canvas) return alert('Poster element definition target lost.');
        await executeDownload(canvas, `Sunday_Leaders_${targetMonth}.png`);
    }

    async function executeDownload(canvasElement, fileName) {
        const rendered = await html2canvas(canvasElement, { scale: 2, useCORS: true, logging: false });
        const link = document.createElement('a');
        link.download = fileName;
        link.href = rendered.toDataURL('image/png');
        link.click();
    }

    async function sendSelectedToAnnouncementPage(type) {
        const syncBtn = type === 'band' ? document.getElementById('syncBatchBtn') : document.getElementById('syncServicesBtn');
        const hud = document.getElementById('statusHudBatch');
        const hudMsg = document.getElementById('batchHudMsg');

        let compiledText = "";
        let imagesArray = [];

        syncBtn.disabled = true;
        hud.style.display = 'flex';
        hudMsg.innerText = "Processing canvas asset bundles...";

        try {
            if (type === 'band') {
                const checkedBoxes = Array.from(document.querySelectorAll('.week-checkbox:checked'));
                if (checkedBoxes.length === 0) {
                    syncBtn.disabled = false;
                    hud.style.display = 'none';
                    return alert("Select target sheets.");
                }

                compiledText = `*JAM MINISTRY TEAM SCHEDULE*\n\n`;
                for (let i = 0; i < checkedBoxes.length; i++) {
                    const idx = parseInt(checkedBoxes[i].getAttribute('data-idx'));
                    const canvas = document.getElementById(`batchCanvas-${idx}`);
                    const rawDate = batchSundays[idx].toISOString().split('T')[0];
                    const displayDate = batchSundays[idx].toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
                    
                    compiledText += `*${displayDate.toUpperCase()}*\n(See attached poster)\n\n`;
                    const base64Data = (await html2canvas(canvas, { scale: 2, useCORS: true, logging: false })).toDataURL('image/png').split(",")[1];
                    imagesArray.push({ fileName: `Schedule_Poster_${rawDate}.png`, fileType: "image/png", fileContent: base64Data });
                }
            } else {
                const canvas = document.getElementById('servicesMonthlyPoster');
                const targetMonth = document.getElementById('schedMonth').value;
                const selectedIndices = getSelectedServiceIndices();
                compiledText = `*SUNDAY WORSHIP LEADERS & BACKUPS BUNDLE*\n\nSchedules for ${targetMonth}:\n\n`;
                
                const base64Data = (await html2canvas(canvas, { scale: 2, useCORS: true, logging: false })).toDataURL('image/png').split(",")[1];
                imagesArray.push({ fileName: `Sunday_Leaders_${targetMonth}.png`, fileType: "image/png", fileContent: base64Data });

                for (const idx of selectedIndices) {
                    const bCanvas = document.getElementById(`servicesBackupPoster-${idx}`);
                    if(!bCanvas) continue;
                    const rawDate = batchSundays[idx].toISOString().split('T')[0];
                    const bData = (await html2canvas(bCanvas, { scale: 2, useCORS: true, logging: false })).toDataURL('image/png').split(",")[1];
                    imagesArray.push({ fileName: `Sunday_Backups_${rawDate}.png`, fileType: "image/png", fileContent: bData });
                }
            }

            compiledText += `_Generated via Workspace System Engine_`;
            localStorage.setItem("autoLineupCaption", compiledText);
            localStorage.setItem("autoLineupPdfBatch", JSON.stringify(imagesArray));
            localStorage.setItem("autoAnnouncementMode", "true");

            hudMsg.innerHTML = "🔗 <span style='color:var(--accent-success);font-weight:bold;'>Synced! Navigating now...</span>";
            setTimeout(() => { window.location.href = "announcement.html"; }, 1000);

        } catch (err) {
            alert("Canvas pipeline generation error.");
            syncBtn.disabled = false;
            hud.style.display = 'none';
        }
    }
</script>
