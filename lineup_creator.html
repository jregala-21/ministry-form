<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Lineup Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --success: #059669;
            --cloud: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #4f46e5, #6d28d9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 40px 20px;
            box-sizing: border-box;
        }

        .card {
            background: white; padding: 40px; border-radius: 20px;
            width: 100%; max-width: 850px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }

        label {
            font-size: 11px; font-weight: bold;
            color: var(--primary); text-transform: uppercase; margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%; padding: 10px; border: 2px solid #f0f0f0;
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
            font-family: inherit; transition: 0.3s;
            resize: none;
            overflow: hidden;
        }

        /* This ensures that if the text is long, you see the end of it when not focused */
        input:not(:focus) {
            text-overflow: ellipsis;
        }

        .link-input {
            margin-top: 5px; font-size: 12px;
            border-color: #e0e7ff; color: var(--primary-dark);
        }

        textarea { min-height: 42px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #f9f9ff; }

        .highlight-input { border: 2px solid var(--primary); background: #f0f4ff; font-weight: bold; }

        .btn-container { 
            display: flex; gap: 10px; margin-top: 30px; 
            justify-content: center; flex-wrap: wrap;
        }

        button {
            padding: 12px 20px; border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer; transition: 0.2s;
            font-size: 14px; display: flex; align-items: center; gap: 8px;
            color: white;
        }

        .btn-copy { background: var(--primary); }
        .btn-pdf { background: var(--success); }
        .btn-save { background: var(--cloud); }
        .btn-clear { background: #f3f4f6; color: #4b5563; }
        
        button:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .back-link {
            display: block; text-align: center; margin-top: 30px;
            text-decoration: none; color: #cbd5e1; font-size: 14px;
        }

        @media (max-width: 650px) {
            .main-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .btn-container button { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📝 Service Lineup Creator</h2>
    <p class="subtitle">Separate items with commas. Save to sync with Google Sheets.</p>

    <div class="main-grid">
        <div class="input-group">
            <label>📅 Service Date</label>
            <input type="text" id="serviceDate" class="highlight-input" placeholder="Oct 27, 2024">
        </div>
        <div class="input-group">
            <label>🎤 Worship Leader</label>
            <input type="text" id="leaderName" class="highlight-input" placeholder="Name...">
        </div>

        <div class="input-group full-width">
            <label>📖 Theme Verse</label>
            <textarea id="verse" placeholder="Reference and text..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group full-width">
            <label>🎵 Intro Song</label>
            <textarea id="intro" placeholder="Song Titles..." oninput="autoGrow(this)"></textarea>
            <textarea id="intro_link" class="link-input" placeholder="Song Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>🙌 Praise Songs</label>
            <textarea id="praise" placeholder="Titles..." oninput="autoGrow(this)"></textarea>
            <textarea id="praise_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>🙏 Worship Songs</label>
            <textarea id="worship" placeholder="Titles..." oninput="autoGrow(this)"></textarea>
            <textarea id="worship_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>🎤 Ministerial / Communion</label>
            <textarea id="ministerial" placeholder="Titles..." oninput="autoGrow(this)"></textarea>
            <textarea id="ministerial_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>🏆 Victory Song</label>
            <textarea id="victory" placeholder="Titles..." oninput="autoGrow(this)"></textarea>
            <textarea id="victory_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group full-width">
            <label>🚪 Closing Songs</label>
            <textarea id="closing" placeholder="Titles..." oninput="autoGrow(this)"></textarea>
            <textarea id="closing_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-clear" onclick="clearForm()">🗑️ Clear</button>
        <button class="btn-copy" onclick="copyLineup()">📋 Copy</button>
        <button class="btn-pdf" onclick="downloadPDF()">📥 PDF</button>
        <button class="btn-save" onclick="saveLineup()" id="saveBtn">☁️ Save to Cloud</button>
    </div>

    <a href="index.html" class="back-link">← Back to Main Menu</a>
</div>

<script>
    const { jsPDF } = window.jspdf;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNwfpSFDHB5Gs9Vs8h1UKOznsnDdxU_UREmDGQWDgPo3F9Ryl99mo6pg3nXfNVoKxw/exec";

    function autoGrow(element) {
        element.style.height = "5px";
        element.style.height = (element.scrollHeight) + "px";
    }

    function splitComma(str) {
        if (!str) return [];
        return str.split(',').map(item => item.trim()).filter(item => item !== "");
    }

    function getFormValues() {
        const getValue = (id) => document.getElementById(id).value.trim();
        return {
            date: getValue('serviceDate'),
            leader: getValue('leaderName'),
            verse: getValue('verse'),
            intro: { title: getValue('intro'), link: getValue('intro_link') },
            praise: { title: getValue('praise'), link: getValue('praise_link') },
            worship: { title: getValue('worship'), link: getValue('worship_link') },
            ministerial: { title: getValue('ministerial'), link: getValue('ministerial_link') },
            victory: { title: getValue('victory'), link: getValue('victory_link') },
            closing: { title: getValue('closing'), link: getValue('closing_link') }
        };
    }

    async function saveLineup() {
        const data = getFormValues();
        const btn = document.getElementById('saveBtn');
        if (!data.date || !data.leader) return alert("Date and Leader are required.");

        btn.innerText = "SAVING..."; btn.disabled = true;

        try {
            const payload = { action: "saveLineup", ...data };
            await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            alert("Lineup saved to Google Sheets! ✅");
        } catch (e) {
            alert("Save failed. Check your Apps Script.");
        } finally {
            btn.innerText = "☁️ Save to Cloud"; btn.disabled = false;
        }
    }

    function downloadPDF() {
        const data = getFormValues();
        if (!data.date || !data.leader) return alert("Please provide Service Date and Leader.");
        
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold");
        doc.setFontSize(22);
        doc.setTextColor(79, 70, 229);
        doc.text("SERVICE LINEUP", 20, 25);
        
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Date: ${data.date}`, 190, 20, { align: "right" });
        doc.text(`Leader: ${data.leader}`, 190, 27, { align: "right" });
        
        doc.setDrawColor(220);
        doc.line(20, 32, 190, 32);

        let y = 45;
        const renderItems = (label, obj) => {
            if (!obj.title) return;
            const titles = splitComma(obj.title);
            const links = splitComma(obj.link);
            doc.setFontSize(10); doc.setTextColor(150); doc.text(label.toUpperCase(), 20, y);
            y += 7; 
            titles.forEach((t, i) => {
                doc.setFontSize(11); doc.setTextColor(0);
                doc.text(`• ${t}`, 25, y);
                if (links[i]) {
                    y += 5; doc.setFontSize(8); doc.setTextColor(79, 70, 229);
                    doc.text(`  Link: ${links[i]}`, 25, y);
                    y += 2;
                }
                y += 7;
            });
            y += 5;
        };

        if(data.verse) {
            doc.setFontSize(10); doc.setTextColor(150); doc.text("THEME VERSE", 20, y);
            y += 7; doc.setFontSize(10); doc.setTextColor(0);
            const splitVerse = doc.splitTextToSize(data.verse, 170);
            doc.text(splitVerse, 20, y); y += (splitVerse.length * 7) + 10;
        }

        renderItems("Intro", data.intro);
        renderItems("Praise", data.praise);
        renderItems("Worship", data.worship);
        renderItems("Ministerial", data.ministerial);
        renderItems("Victory", data.victory);
        renderItems("Closing", data.closing);
        
        doc.save(`Lineup_${data.date}.pdf`);
    }

    function copyLineup() {
        const data = getFormValues();
        let text = `✨ *SERVICE LINEUP* ✨\n📅 Date: ${data.date}\n🎤 Leader: ${data.leader}\n────────────────────\n\n`;
        if (data.verse) text += `📖 *Theme Verse:*\n${data.verse}\n\n`;
        
        const appendHelper = (label, obj) => {
            if (!obj.title) return "";
            let res = `${label}\n`;
            const titles = splitComma(obj.title);
            const links = splitComma(obj.link);
            titles.forEach((t, i) => {
                res += `- ${t}\n`;
                if (links[i]) res += `  🔗 ${links[i]}\n`;
                res += `\n`;
            });
            return res;
        };

        text += appendHelper("🎵 *Intro Song:*", data.intro);
        text += appendHelper("🙌 *Praise Songs:*", data.praise);
        text += appendHelper("🙏 *Worship Songs:*", data.worship);
        text += appendHelper("🎤 *Ministerial:*", data.ministerial);
        text += appendHelper("🏆 *Victory Song:*", data.victory);
        text += appendHelper("🚪 *Closing Songs:*", data.closing);

        navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard! ✅"));
    }

    function clearForm() {
        if(confirm("Clear all entries?")) {
            document.querySelectorAll('input, textarea').forEach(el => {
                el.value = '';
                if(el.tagName === 'TEXTAREA' || el.classList.contains('link-input')) {
                     el.style.height = "42px";
                }
            });
        }
    }
</script>
</body>
</html>
