<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Lineup Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --success: #059669;
            --cloud: #8b5cf6;
            --bg-gradient: linear-gradient(135deg, #4f46e5, #6d28d9);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; margin: 0; padding: 40px 20px;
            box-sizing: border-box;
        }

        .card {
            background: white; padding: 40px; border-radius: 20px;
            width: 100%; max-width: 850px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; color: #333; margin-bottom: 10px; font-size: 28px; }
        p.subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; position: relative; }

        label {
            font-size: 11px; font-weight: bold;
            color: var(--primary); text-transform: uppercase; margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        input, textarea {
            width: 100%; padding: 10px; border: 2px solid #f0f0f0;
            border-radius: 8px; font-size: 14px; box-sizing: border-box;
            font-family: inherit; transition: 0.3s;
            resize: none;
        }

        .link-input { margin-top: 5px; font-size: 12px; border-color: #e0e7ff; color: var(--primary-dark); }
        textarea { min-height: 42px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #f9f9ff; }
        .highlight-input { border: 2px solid var(--primary); background: #f0f4ff; font-weight: bold; }

        .suggestion-box {
            position: absolute;
            top: 65px; left: 0; right: 0;
            background: white; border: 1px solid #ddd;
            border-radius: 8px; max-height: 200px;
            overflow-y: auto; z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
        }

        .suggestion-item {
            padding: 10px 15px; cursor: pointer; font-size: 14px;
            border-bottom: 1px solid #f8f8f8; color: #444;
        }

        .suggestion-item:hover { background: #f0f4ff; color: var(--primary); font-weight: 500; }

        .btn-container { display: flex; gap: 10px; margin-top: 30px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 8px; color: white; }
        .btn-copy { background: var(--primary); }
        .btn-pdf { background: var(--success); }
        .btn-save { background: var(--cloud); }
        .btn-clear { background: #f3f4f6; color: #4b5563; }
        button:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .back-link { display: block; text-align: center; margin-top: 30px; text-decoration: none; color: #cbd5e1; font-size: 14px; }

        /* Modal Layout Styles */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .custom-modal-overlay.modal-active { opacity: 1; pointer-events: auto; }
        .custom-modal-box {
            background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); text-align: center;
            transform: scale(0.9); transition: transform 0.2s ease;
        }
        .custom-modal-overlay.modal-active .custom-modal-box { transform: scale(1); }
        .custom-modal-text { font-size: 16px; color: #333; margin-bottom: 24px; line-height: 1.5; font-weight: 500; }
        .custom-modal-actions { display: flex; gap: 12px; justify-content: center; }
        .custom-modal-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .custom-modal-btn-primary { background: var(--primary); color: white; }
        .custom-modal-btn-secondary { background: #e5e7eb; color: #4b5563; }
        .custom-modal-btn:hover { opacity: 0.9; }

        @media (max-width: 650px) {
            .main-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>📝 Service Lineup Creator</h2>
    <p class="subtitle">Suggestions appear as you type. Separate items with commas.</p>

    <div class="main-grid">
        <div class="input-group">
            <label>Service Date</label>
            <input type="text" id="serviceDate" class="highlight-input" placeholder="Oct 27, 2024">
        </div>
        <div class="input-group">
            <label>Worship Leader</label>
            <input type="text" id="leaderName" class="highlight-input" placeholder="Name...">
        </div>

        <div class="input-group full-width">
            <label>Theme Verse</label>
            <textarea id="verse" placeholder="Reference and text..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group full-width">
            <label>Intro Song</label>
            <textarea id="intro" placeholder="Song Titles..." oninput="handleSongInput(this)"></textarea>
            <div id="intro-suggestions" class="suggestion-box"></div>
            <textarea id="intro_link" class="link-input" placeholder="Song Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>Praise Songs</label>
            <textarea id="praise" placeholder="Titles..." oninput="handleSongInput(this)"></textarea>
            <div id="praise-suggestions" class="suggestion-box"></div>
            <textarea id="praise_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>Worship Songs</label>
            <textarea id="worship" placeholder="Titles..." oninput="handleSongInput(this)"></textarea>
            <div id="worship-suggestions" class="suggestion-box"></div>
            <textarea id="worship_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>Ministerial / Communion</label>
            <textarea id="ministerial" placeholder="Titles..." oninput="handleSongInput(this)"></textarea>
            <div id="ministerial-suggestions" class="suggestion-box"></div>
            <textarea id="ministerial_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group">
            <label>Victory Song</label>
            <textarea id="victory" placeholder="Titles..." oninput="handleSongInput(this)"></textarea>
            <div id="victory-suggestions" class="suggestion-box"></div>
            <textarea id="victory_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>

        <div class="input-group full-width">
            <label>Closing Songs</label>
            <textarea id="closing" placeholder="Titles..." oninput="handleSongInput(this)"></textarea>
            <div id="closing-suggestions" class="suggestion-box"></div>
            <textarea id="closing_link" class="link-input" placeholder="Links..." oninput="autoGrow(this)"></textarea>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-clear" onclick="clearForm()">🗑️ Clear</button>
        <button class="btn-copy" onclick="copyLineup()">📋 Copy</button>
        <button class="btn-pdf" onclick="downloadPDF()">📥 PDF</button>
        <button class="btn-save" onclick="saveLineup()" id="saveBtn">☁️ Save to Cloud / Send to Email</button>
    </div>

    <a href="index.html" class="back-link">← Back to Main Menu</a>
</div>

<!-- Custom Layout Modal Layer -->
<div id="customModal" class="custom-modal-overlay">
    <div class="custom-modal-box">
        <div id="customModalText" class="custom-modal-text"></div>
        <div id="customModalActions" class="custom-modal-actions"></div>
    </div>
</div>

<script>
    const { jsPDF } = window.jspdf;
    
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyNwfpSFDHB5Gs9Vs8h1UKOznsnDdxU_UREmDGQWDgPo3F9Ryl99mo6pg3nXfNVoKxw/exec";
    const GET_URL = "https://script.google.com/macros/s/AKfycbyabmsybyBb52Jj3-e5eNX31I_HBVIuZD_xF2WFyKjQWW3TdPNnP_NPDbQctpRnY8VT/exec";

    let libraryData = [];

    window.onload = fetchLibrary;

    // Custom non-blocking Promise alert wrapper
    function alert(message) {
        return new Promise((resolve) => {
            const overlay = document.getElementById('customModal');
            const textContainer = document.getElementById('customModalText');
            const actionsContainer = document.getElementById('customModalActions');
            
            textContainer.innerText = message;
            actionsContainer.innerHTML = '';
            
            const okBtn = document.createElement('button');
            okBtn.className = 'custom-modal-btn custom-modal-btn-primary';
            okBtn.innerText = 'OK';
            okBtn.onclick = () => {
                overlay.classList.remove('modal-active');
                resolve();
            };
            
            actionsContainer.appendChild(okBtn);
            overlay.classList.add('modal-active');
        });
    }

    // Custom non-blocking Promise confirm wrapper
    function confirm(message) {
        return new Promise((resolve) => {
            const overlay = document.getElementById('customModal');
            const textContainer = document.getElementById('customModalText');
            const actionsContainer = document.getElementById('customModalActions');
            
            textContainer.innerText = message;
            actionsContainer.innerHTML = '';
            
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'custom-modal-btn custom-modal-btn-secondary';
            cancelBtn.innerText = 'Cancel';
            cancelBtn.onclick = () => {
                overlay.classList.remove('modal-active');
                resolve(false);
            };
            
            const confirmBtn = document.createElement('button');
            confirmBtn.className = 'custom-modal-btn custom-modal-btn-primary';
            confirmBtn.innerText = 'Confirm';
            confirmBtn.onclick = () => {
                overlay.classList.remove('modal-active');
                resolve(true);
            };
            
            actionsContainer.appendChild(cancelBtn);
            actionsContainer.appendChild(confirmBtn);
            overlay.classList.add('modal-active');
        });
    }

    async function fetchLibrary() {
        try {
            const response = await fetch(GET_URL);
            libraryData = await response.json();
            console.log("Library synced.");
        } catch (e) {
            console.warn("Using local fallback if available.");
        }
    }

    function handleSongInput(element) {
        autoGrow(element);
        const boxId = element.id + '-suggestions';
        const box = document.getElementById(boxId);
        const fullText = element.value;
        
        const parts = fullText.split(',');
        const currentQuery = parts[parts.length - 1].trim().toLowerCase();

        if (currentQuery.length < 2) {
            box.style.display = 'none';
            return;
        }

        const matches = libraryData.filter(s => s.title.toLowerCase().includes(currentQuery));

        if (matches.length > 0) {
            box.innerHTML = '';
            matches.forEach(song => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerText = song.title;
                item.onclick = () => {
                    parts[parts.length - 1] = (parts.length > 1 ? ' ' : '') + song.title;
                    element.value = parts.join(',') + ', ';
                    box.style.display = 'none';
                    autoGrow(element);
                    element.focus();
                };
                box.appendChild(item);
            });
            box.style.display = 'block';
        } else {
            box.style.display = 'none';
        }
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.input-group')) {
            document.querySelectorAll('.suggestion-box').forEach(b => b.style.display = 'none');
        }
    });

    function autoGrow(element) {
        element.style.height = "5px";
        element.style.height = (element.scrollHeight) + "px";
    }

    function splitComma(str) {
        if (!str) return [];
        return str.split(',').map(item => item.trim()).filter(item => item !== "");
    }

    function generateSafeCaptionText(data) {
        let text = `*=== SERVICE LINEUP ===*\n[Date]: ${data.date}\n[Leader]: ${data.leader}\n----------------------------------\n\n`;
        if (data.verse) text += `*Theme Verse:*\n${data.verse}\n\n`;
        
        const appendHelper = (label, obj) => {
            if (!obj.title) return "";
            let res = `*${label}:*\n`;
            const titles = splitComma(obj.title); 
            const links = splitComma(obj.link);
            
            titles.forEach((t, i) => { 
                res += `- ${t}\n`; 
                if (links[i]) res += `  Link: ${links[i]}\n`; 
            });
            return res + `\n`;
        };

        text += appendHelper("Intro Song", data.intro);
        text += appendHelper("Praise Songs", data.praise);
        text += appendHelper("Worship Songs", data.worship);
        text += appendHelper("Ministerial", data.ministerial);
        text += appendHelper("Victory Song", data.victory);
        text += appendHelper("Closing Songs", data.closing);
        return text.trim();
    }

    function getFormValues() {
        const getValue = (id) => document.getElementById(id).value.trim();
        return {
            date: getValue('serviceDate'),
            leader: getValue('leaderName'),
            verse: getValue('verse'),
            intro: { title: getValue('intro'), link: getValue('intro_link') },
            praise: { title: getValue('praise'), link: getValue('praise_link') },
            worship: { title: getValue('worship'), link: getValue('worship_link') },
            ministerial: { title: getValue('ministerial'), link: getValue('ministerial_link') },
            victory: { title: getValue('victory'), link: getValue('victory_link') },
            closing: { title: getValue('closing'), link: getValue('closing_link') }
        };
    }

    async function saveLineup() {
        const data = getFormValues();
        const btn = document.getElementById('saveBtn');
        if (!data.date || !data.leader) {
            await alert("Date and Leader are required.");
            return;
        }
        btn.innerText = "SAVING..."; btn.disabled = true;
        try {
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "saveLineup", ...data }) });
            
            const text = generateSafeCaptionText(data);

            const doc = new jsPDF();
            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(79, 70, 229);
            doc.text("SERVICE LINEUP", 20, 25);
            doc.setFontSize(10); doc.setTextColor(100);
            doc.text(`Date: ${data.date}`, 190, 20, { align: "right" });
            doc.text(`Leader: ${data.leader}`, 190, 27, { align: "right" });
            doc.line(20, 32, 190, 32);
            let y = 45;
            const renderItems = (label, obj) => {
                if (!obj.title) return;
                const titles = splitComma(obj.title);
                const links = splitComma(obj.link);
                doc.setFontSize(10); doc.setTextColor(150); doc.text(label.toUpperCase(), 20, y);
                y += 7; 
                titles.forEach((t, i) => {
                    doc.setFontSize(11); doc.setTextColor(0); doc.text(`• ${t}`, 25, y);
                    if (links[i]) { y += 5; doc.setFontSize(8); doc.setTextColor(79, 70, 229); doc.text(`   Link: ${links[i]}`, 25, y); y += 2; }
                    y += 7;
                });
                y += 5;
            };
            if(data.verse) {
                doc.setFontSize(10); doc.setTextColor(150); doc.text("THEME VERSE", 20, y);
                y += 7; doc.setFontSize(10); doc.setTextColor(0);
                const splitVerse = doc.splitTextToSize(data.verse, 170);
                doc.text(splitVerse, 20, y); y += (splitVerse.length * 7) + 10;
            }
            renderItems("Intro", data.intro); renderItems("Praise", data.praise); renderItems("Worship", data.worship);
            renderItems("Ministerial", data.ministerial); renderItems("Victory", data.victory); renderItems("Closing", data.closing);
            
            const pdfBase64 = doc.output('datauristring').split(',')[1];

            // Setup cache transfer objects
            localStorage.setItem("autoLineupCaption", text);
            localStorage.setItem("autoLineupPdf", JSON.stringify({
                fileName: `Lineup_${data.date.replace(/[^a-zA-Z0-9]/g, "_")}.pdf`,
                fileType: "application/pdf",
                fileContent: pdfBase64
            }));

            // Bypasses login.html checking mechanism when loading announcement layout
            sessionStorage.setItem("bypassPassword", "true");

            await alert("Lineup saved! Redirecting to Announcements... ✅");
            window.location.href = "announcement.html";
        } catch (e) { 
            console.error(e);
            await alert("Save failed."); 
        } finally { 
            btn.innerText = "☁️ Save to Cloud"; btn.disabled = false; 
        }
    }

    async function downloadPDF() {
        const data = getFormValues();
        if (!data.date || !data.leader) {
            await alert("Please provide Service Date and Leader.");
            return;
        }
        const doc = new jsPDF();
        doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(79, 70, 229);
        doc.text("SERVICE LINEUP", 20, 25);
        doc.setFontSize(10); doc.setTextColor(100);
        doc.text(`Date: ${data.date}`, 190, 20, { align: "right" });
        doc.text(`Leader: ${data.leader}`, 190, 27, { align: "right" });
        doc.line(20, 32, 190, 32);
        let y = 45;
        const renderItems = (label, obj) => {
            if (!obj.title) return;
            const titles = splitComma(obj.title);
            const links = splitComma(obj.link);
            doc.setFontSize(10); doc.setTextColor(150); doc.text(label.toUpperCase(), 20, y);
            y += 7; 
            titles.forEach((t, i) => {
                doc.setFontSize(11); doc.setTextColor(0); doc.text(`• ${t}`, 25, y);
                if (links[i]) { y += 5; doc.setFontSize(8); doc.setTextColor(79, 70, 229); doc.text(`   Link: ${links[i]}`, 25, y); y += 2; }
                y += 7;
            });
            y += 5;
        };
        if(data.verse) {
            doc.setFontSize(10); doc.setTextColor(150); doc.text("THEME VERSE", 20, y);
            y += 7; doc.setFontSize(10); doc.setTextColor(0);
            const splitVerse = doc.splitTextToSize(data.verse, 170);
            doc.text(splitVerse, 20, y); y += (splitVerse.length * 7) + 10;
        }
        renderItems("Intro", data.intro); renderItems("Praise", data.praise); renderItems("Worship", data.worship);
        renderItems("Ministerial", data.ministerial); renderItems("Victory", data.victory); renderItems("Closing", data.closing);
        doc.save(`Lineup_${data.date}.pdf`);
    }

    async function copyLineup() {
        const data = getFormValues();
        const text = generateSafeCaptionText(data);
        navigator.clipboard.writeText(text).then(async () => {
            await alert("Copied! ✅");
        });
    }

    async function clearForm() {
        const isConfirmed = await confirm("Clear all?");
        if (isConfirmed) {
            document.querySelectorAll('input, textarea').forEach(el => {
                el.value = '';
                el.style.height = "42px";
            });
        }
    }
</script>
</body>
</html>
