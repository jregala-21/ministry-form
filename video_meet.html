<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://8x8.vc/external_api.js"></script>


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministry Video Meet</title>
    <style>
        body { margin: 0; background: #202124; font-family: sans-serif; color: white; height: 100vh; }
        
        /* Login Screen */
        #login-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
        }
        .login-card { background: #3c4043; padding: 40px; border-radius: 8px; text-align: center; }
        input { padding: 12px; width: 250px; border-radius: 4px; border: none; margin-bottom: 10px; }
        button { padding: 12px 24px; background: #8ab4f8; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* Meeting UI */
        #meeting-ui { display: none; flex-direction: column; height: 100%; }
        .video-grid { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        video { background: #000; width: 80%; max-width: 800px; border-radius: 12px; transform: scaleX(-1); }
        
        .controls { height: 80px; display: flex; justify-content: center; align-items: center; gap: 20px; background: #202124; }
        .control-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #3c4043; color: white; font-size: 20px; cursor: pointer; }
        .btn-hangup { background: #ea4335; width: 70px; border-radius: 35px; }

        .video-wrapper {
        position: relative;
        width: 80%;
        max-width: 800px;
        display: flex;
        justify-content: center;
    }

    .name-tag {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 5px 12px;
        border-radius: 4px;
        font-size: 14px;
        font-weight: 500;
        z-index: 10;
    }

    video { 
        background: #000; 
        width: 100%; 
        border-radius: 12px; 
        transform: scaleX(-1); /* Mirror effect */
    }

    .meeting-info { width: 200px; padding-left: 20px; font-size: 14px; color: #9aa0a6; }

    /* Container for buttons */
.button-group { 
    display: flex; 
    gap: 15px; 
    align-items: center; 
}

    /* Cleaned up CSS */
    #meeting-ui { display: none; flex-direction: column; height: 100vh; background: #202124; }
    .video-grid { flex-grow: 1; overflow: hidden; background: #000; }
    
    .controls { 
        height: 80px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        padding: 0 20px; 
        background: #202124; 
    }

    .control-btn { 
        width: 48px; 
        height: 48px; 
        border-radius: 50%; 
        border: 1px solid #5f6368; 
        background: #3c4043; 
        color: white; 
        font-size: 22px; 
        cursor: pointer; 
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }

    .control-btn:hover { background: #4a4e52; }
    .meeting-info { width: 200px; font-size: 14px; color: #9aa0a6; }
    </style>
</head>
<body>

    <div id="login-screen">
    <div class="login-card">
        <h2>Join Meeting</h2>
        <p>Enter your registered email to enter</p>
        <input type="email" id="userEmail" placeholder="email@example.com"><br>
        <button onclick="verifyEmail()">JOIN NOW</button>
        
        <!-- New Homepage Link -->
        <div style="margin-top: 20px;">
            <a href="index.html" style="color: #8ab4f8; text-decoration: none; font-size: 14px;">← Back to Homepage</a>
        </div>
        
        <p id="msg"></p>
    </div>
</div>

    <div id="meeting-ui">
    <div class="video-grid">
        <div id="meet-container" style="width:100%; height:100%;"></div>
    </div>
    
    <div class="controls">
        <div class="meeting-info" id="display-time"></div>
        
        <!-- Inside the <div class="button-group"> -->
<div class="button-group">
    <button class="control-btn" onclick="takeScreenshot()" title="Take Screenshot">📸</button>
    <!-- New Invite Button -->
    <button class="control-btn" onclick="copyInviteLink()" title="Copy Invite Link">🔗</button>
</div>
        
        <div style="width: 200px;"></div>
    </div>
</div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7xG5gki0Jr8TidIbKKpT8YM52XDxTK_6JN2XcX7xESn8ABgdp98E_Q9WS2D8geKfB/exec";
let api = null; // Global variable to control the meeting

async function verifyEmail() {
    const email = document.getElementById('userEmail').value;
    const msg = document.getElementById('msg');
    
    if(!email) return alert("Enter email");
    msg.innerText = "Checking registry...";

    try {
        const resp = await fetch(SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "checkAccess", email: email })
        });
        const result = await resp.text();

        if (result === "AUTHORIZED") {
            const memberResp = await fetch(SCRIPT_URL);
            const members = await memberResp.json();
            const user = members.find(m => m.email.toLowerCase().trim() === email.toLowerCase().trim());
            
            const displayName = user ? user.name : "Guest";
            startMeeting(displayName);
        } else {
            msg.innerText = "❌ Email not found in Ministry Registry.";
        }
    } catch (e) {
        msg.innerText = "Error connecting to server.";
        console.error(e);
    }
}

function startMeeting(userName) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('meeting-ui').style.display = 'flex';
    
    // Clear your "local" video placeholder to ensure a fresh container
    document.querySelector('.video-grid').innerHTML = '<div id="meet-container" style="width:100%; height:100%;"></div>';
    
    // YOUR JAAS DETAILS
    const APP_ID = "vpaas-magic-cookie-d9dd4038ca054df78413e65aacc3e5a7"; 
    const domain = "8x8.vc"; 
    
    const options = {
        roomName: APP_ID + "/MinistryConference_Room1", 
        width: '100%',
        height: '100%',
        parentNode: document.querySelector('#meet-container'),
        userInfo: {
            displayName: userName
        },
        interfaceConfigOverwrite: {
            // Ensures Jitsi handles the core meeting controls
            TOOLBAR_BUTTONS: ['microphone', 'camera', 'hangup', 'desktop', 'tileview', 'chat', 'raisehand']
        }
    };
    
    // Initialize the Jitsi API
    api = new JitsiMeetExternalAPI(domain, options);

    // --- NEW: Handle the Hangup Event ---
    api.addEventListener('videoConferenceLeft', () => {
        console.log("User left the conference. Cleaning up...");
        
        // 1. Remove the Jitsi iframe and free up browser memory
        api.dispose();
        api = null;

        // 2. Switch UI back to the Login Screen
        document.getElementById('meeting-ui').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        
        // 3. Reset the login form for the next join
        document.getElementById('userEmail').value = "";
        document.getElementById('msg').innerText = "You have left the meeting.";
        
        // 4. Reset the video grid so it's ready for a new session later
        document.querySelector('.video-grid').innerHTML = '<div id="meet-container" style="width:100%; height:100%;"></div>';
    });
}

// Updated control functions to talk to Jitsi
function toggleCam() { if(api) api.executeCommand('toggleVideo'); }
function toggleMic() { if(api) api.executeCommand('toggleAudio'); }

async function takeScreenshot() {
    try {
        const captureStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        const video = document.createElement("video");
        video.srcObject = captureStream;
        video.onloadedmetadata = () => {
            video.play();
            const canvas = document.createElement("canvas");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext("2d").drawImage(video, 0, 0);
            const link = document.createElement("a");
            link.href = canvas.toDataURL("image/png");
            link.download = `Meeting_${new Date().getTime()}.png`;
            link.click();
            captureStream.getTracks().forEach(track => track.stop());
        };
    } catch (err) { alert("Screenshot cancelled."); }
}

function copyInviteLink() {
    // Get the current URL of this webpage
    const inviteUrl = window.location.href;

    // Copy it to the clipboard
    navigator.clipboard.writeText(inviteUrl).then(() => {
        alert("Invite link copied to clipboard! You can now send it to others.");
    }).catch(err => {
        console.error('Failed to copy: ', err);
        // Fallback for older browsers
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = inviteUrl;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        alert("Invite link copied!");
    });
}
    </script>
</body>
</html>
