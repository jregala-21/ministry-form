<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Service Flow Manager</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #10b981;
            --chord-yellow: #fbbf24;
            --header-orange: #fb923c;
            --communion-purple: #a78bfa; /* New color for Communion */
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Centered Main Container --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* --- Navigation Link --- */
        .nav-header {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 10px;
        }

        .home-link {
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .home-link:hover {
            color: var(--accent);
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .service-input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            background: #111827; 
            border: 1px solid #334155; 
            border-radius: 10px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        
        .btn { padding: 12px 15px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; transition: 0.2s; touch-action: manipulation; }
        .btn-primary { background: var(--primary); color: white; width: 100%; margin-top: 5px; font-size: 16px; }
        .btn-secondary { background: #334155; color: white; width: 100%; margin-top: 10px; font-size: 14px; text-decoration: none; text-align: center; display: block; box-sizing: border-box; }
        
        .category-block {
            margin-bottom: 25px;
            background: rgba(30, 41, 59, 0.4);
            padding: 15px;
            border-radius: 12px;
        }

        .section-header { 
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--accent); 
            font-weight: 800; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        /* Specific color for Communion header */
        .category-communion .section-header span {
            color: var(--communion-purple);
        }
        
        .song-slot { 
            background: var(--card-bg); 
            padding: 14px; 
            border-radius: 10px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer; 
        }
        .song-title-link { flex-grow: 1; font-size: 15px; font-weight: 500; }
        
        /* --- Chord Viewer --- */
        #chordModal { 
            position: fixed; 
            inset: 0; 
            background: var(--bg); 
            color: var(--text-main); 
            display: none; 
            flex-direction: column; 
            z-index: 2000; 
        }

        .modal-toolbar { 
            padding: 15px; 
            background: #111827; 
            border-bottom: 1px solid #334155; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
        }

        #modalText { 
            flex-grow: 1; 
            overflow: auto; 
            padding: 30px 20px; 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 16px; 
            line-height: 2.4; 
        }

        .chord-line { position: relative; margin-top: 1.3em; white-space: pre; min-width: fit-content; }
        .chord-wrap { position: absolute; top: -1.2em; color: var(--chord-yellow); font-weight: bold; }
        .section-tag { color: var(--header-orange); font-weight: bold; text-transform: uppercase; font-size: 0.85em; border-bottom: 1px solid #334155; display: block; margin: 25px 0 10px 0; }

        /* --- Overlays --- */
        #selectorOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 3000; justify-content: center; align-items: flex-start; padding-top: 50px; }
        .selector-box { background: white; color: #1e293b; width: 90%; max-width: 450px; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; max-height: 80vh; }
        .modal-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 16px; }

        .status-msg { font-size: 12px; text-align: center; display: block; margin-top: 8px; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <div class="nav-header">
            <a href="index.html" class="home-link">🏠 Back to Home</a>
        </div>

        <div class="header-section">
            <h2 style="margin:0">📋 Setlist Creator</h2>
            <span id="loadStatus" class="status-msg">Connecting to Library...</span>
            
            <div style="margin-top:20px;">
                <input type="text" id="serviceNameInput" class="service-input" placeholder="Service Name (e.g. Sunday Service)">
                <button class="btn btn-primary" id="saveBtn" onclick="saveServicePlan()">SAVE TO CLOUD</button>
                <a href="Setlist_archive.html" class="btn btn-secondary">VIEW ARCHIVED SETLISTS</a>
            </div>
        </div>

        <div id="flow-container"></div>
    </div>

    <div id="chordModal">
        <div class="modal-toolbar">
            <strong id="modalTitle" style="font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%;">Song Title</strong>
            <button class="btn" style="background:#ef4444; color:white; padding: 8px 15px;" onclick="closeChords()">CLOSE</button>
        </div>
        <div id="modalText"></div>
    </div>

    <div id="selectorOverlay" onclick="this.style.display='none'">
        <div class="selector-box" onclick="event.stopPropagation()">
            <div style="padding:15px; background:#f1f5f9; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
                <span>Select Song</span>
                <span style="cursor:pointer; font-size:24px;" onclick="document.getElementById('selectorOverlay').style.display='none'">×</span>
            </div>
            <div style="padding:10px;">
                <input type="text" id="libSearch" class="service-input" placeholder="Search songs..." oninput="filterLibrary()" style="color:black; border:1px solid #ccc; margin-bottom:0;">
            </div>
            <div id="libraryList" style="flex-grow:1; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        const GET_URL = "https://script.google.com/macros/s/AKfycbyabmsybyBb52Jj3-e5eNX31I_HBVIuZD_xF2WFyKjQWW3TdPNnP_NPDbQctpRnY8VT/exec"; 
        const POST_URL = "https://script.google.com/macros/s/AKfycbykKHze1guBdWU5HTjfYiQatZGq1i8YQv21nxZJXl6cn9P8Vb3iDbNOpNKACFVTPvI3/exec"; 
        
        // Updated categories with Communion after Ministerial
        const flowCategories = ["Intro", "Praise", "Worship", "Ministerial", "Communion", "Victory", "Closing"];
        let fullLibrary = [];
        let activeCategory = '';

        window.onload = () => {
            const container = document.getElementById('flow-container');
            flowCategories.forEach(cat => {
                container.innerHTML += `
                    <div class="category-block category-${cat.toLowerCase()}">
                        <div class="section-header">
                            <span>${cat}</span>
                            <button onclick="openSelector('${cat}')" style="color:inherit; background:rgba(255,255,255,0.05); padding:5px 10px; border-radius:5px; border:none; cursor:pointer; font-weight:bold;">+ Add Song</button>
                        </div>
                        <div id="list-${cat}"></div>
                    </div>`;
            });
            fetchLibrary();
        };

        async function fetchLibrary() {
            const status = document.getElementById('loadStatus');
            try {
                const resp = await fetch(GET_URL);
                const data = await resp.json();
                fullLibrary = data.map(s => ({
                    title: (s.title || s.Title || "Untitled").trim(),
                    content: (s.content || s.Content || "").replace(/\\n/g, '\n')
                }));
                status.innerText = `✅ ${fullLibrary.length} Songs Ready`;
            } catch(e) { status.innerText = "❌ Library Sync Failed"; }
        }

        function parseChords(text) {
            if (!text) return "No content.";
            const lines = text.split('\n');
            let output = "";
            lines.forEach(line => {
                line = line.trimEnd();
                if (line.startsWith('{')) {
                    const tag = line.match(/:(.*)}/)?.[1]?.trim() || "SECTION";
                    output += `<span class="section-tag">${tag}</span>`;
                } else if (line.includes('[')) {
                    let lyricLine = ""; let chordLine = "";
                    const parts = line.split(/\[(.*?)\]/);
                    for (let i = 0; i < parts.length; i++) {
                        if (i % 2 === 1) chordLine += `<span class="chord-wrap" style="left: ${lyricLine.length}ch">${parts[i]}</span>`;
                        else lyricLine += parts[i];
                    }
                    output += `<div class="chord-line">${chordLine}${lyricLine || " "}</div>`;
                } else {
                    output += `<div class="chord-line">${line || " "}</div>`;
                }
            });
            return output;
        }

        function renderLibrary(songs) {
            const container = document.getElementById('libraryList');
            container.innerHTML = "";
            songs.slice(0, 50).forEach(song => {
                const div = document.createElement('div');
                div.className = 'modal-item';
                div.innerText = song.title;
                div.onclick = () => { addSongToSet(song); document.getElementById('selectorOverlay').style.display = 'none'; };
                container.appendChild(div);
            });
        }

        function filterLibrary() {
            const term = document.getElementById('libSearch').value.toLowerCase();
            renderLibrary(fullLibrary.filter(s => s.title.toLowerCase().includes(term)));
        }

        function openSelector(cat) {
            activeCategory = cat;
            document.getElementById('selectorOverlay').style.display = 'flex';
            document.getElementById('libSearch').value = "";
            renderLibrary(fullLibrary);
        }

        function addSongToSet(song) {
            const container = document.getElementById(`list-${activeCategory}`);
            const div = document.createElement('div');
            div.className = 'song-slot';
            div.onclick = () => viewSong(song.title, song.content); 
            div.innerHTML = `
                <span class="song-title-link">${song.title}</span>
                <button class="btn" style="background:none; color:#ef4444; padding:5px; font-size:20px;" onclick="event.stopPropagation(); this.parentElement.remove()">×</button>`;
            container.appendChild(div);
        }

        function viewSong(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerHTML = parseChords(content);
            document.getElementById('chordModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeChords() { 
            document.getElementById('chordModal').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
        }

        async function saveServicePlan() {
            const name = document.getElementById('serviceNameInput').value;
            if(!name) return alert("Please enter a Service Name.");
            
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = "SAVING...";
            btn.disabled = true;

            const items = [];
            flowCategories.forEach(cat => {
                document.querySelectorAll(`#list-${cat} .song-slot .song-title-link`).forEach(slot => {
                    items.push({ category: cat, title: slot.innerText });
                });
            });

            if (items.length === 0) {
                alert("Please add songs to your setlist.");
                btn.innerText = originalText;
                btn.disabled = false;
                return;
            }

            try {
                await fetch(POST_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "saveSetlist", serviceName: name, items: items })
                });
                alert("Setlist Saved!");
            } catch (e) {
                alert("Error saving. Try again.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
