<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement Sender</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #141b2d;
            --border: #242f47;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --accent-hover: #6366f1;
            --success: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px;
            width: 100%; 
            max-width: 550px; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h3 { 
            margin: 0;
            color: #ffffff; 
            font-size: 22px; 
            font-weight: 700;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-nav {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-home {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-home:hover {
            background: #334155;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
        }
        .btn-logout:hover {
            background: var(--danger-hover);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label.section-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            display: block;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            background: #0f172a;
            color: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            resize: vertical;
            outline: none;
            font-family: monospace, inherit;
            transition: border-color 0.2s;
        }
        textarea:focus { 
            border-color: var(--accent); 
        }

        input[type="file"], input[type="datetime-local"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="file"] {
            color: var(--text-muted);
        }
        input[type="datetime-local"]:focus {
            border-color: var(--warning);
        }

        .schedule-panel {
            background: rgba(30, 41, 59, 0.4);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }
        .schedule-toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .schedule-fields {
            margin-top: 12px;
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .schedule-fields.visible {
            display: block;
        }

        .scroller-box {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            padding: 12px;
            text-align: left;
        }

        .category-header {
            font-size: 12px;
            font-weight: 700;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 14px 0 8px 0;
            display: inline-block;
            letter-spacing: 0.05em;
        }
        .category-header:first-of-type {
            margin-top: 0;
        }

        .directory-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .directory-table td {
            padding: 8px 4px;
            font-size: 14px;
            color: #ffffff;
            vertical-align: middle;
            border-bottom: 1px solid rgba(36, 47, 71, 0.3);
        }

        .directory-table tr:last-child td {
            border-bottom: none;
        }

        .col-check {
            width: 30px;
            text-align: left;
        }

        .col-name {
            font-weight: 500;
            text-align: left;
        }

        .directory-table input[type="checkbox"], 
        .schedule-toggle-container input[type="checkbox"],
        .global-select-bar input,
        .ministry-select-grid input {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            margin: 0;
        }

        .global-select-bar {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
        }
        .global-select-bar input {
            margin-right: 10px;
        }

        .ministry-select-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .ministry-select-item {
            background: #1a2333;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
        }
        .ministry-select-item label {
            margin-left: 8px;
            cursor: pointer;
            user-select: none;
            color: var(--text-main);
        }

        .send-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: var(--accent-hover);
        }
        .send-btn.scheduled-mode {
            background: var(--warning);
        }
        .send-btn.scheduled-mode:hover {
            background: #d97706;
        }
        .send-btn:disabled {
            background: #1e293b;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-weight: 500;
            font-size: 14px;
        }

        /* Modal Layout Styles */
        .custom-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center;
            z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .custom-modal-overlay.modal-active { opacity: 1; pointer-events: auto; }
        .custom-modal-box {
            background: var(--card-bg); padding: 25px; border-radius: 16px; width: 90%; max-width: 380px;
            border: 1px solid var(--border); text-align: center;
            transform: scale(0.92); transition: transform 0.2s ease;
        }
        .custom-modal-overlay.modal-active .custom-modal-box { transform: scale(1); }
        .custom-modal-text { font-size: 15px; color: var(--text-main); margin-bottom: 22px; line-height: 1.5; font-weight: 500; }
        .custom-modal-actions { display: flex; gap: 10px; justify-content: center; }
        .custom-modal-btn { padding: 9px 18px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 13px; transition: opacity 0.2s; }
        .custom-modal-btn-primary { background: var(--accent); color: white; }
        .custom-modal-btn-secondary { background: #1e293b; color: var(--text-main); border: 1px solid var(--border); }
        .custom-modal-btn:hover { opacity: 0.9; }

        @media (max-width: 650px) {
            .ministry-select-grid { grid-template-columns: 1fr; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h3>🔒 Announcement</h3>
        <div class="nav-buttons">
            <a href="index.html" class="btn-nav btn-home">Home</a>
            <button onclick="handleLogout()" class="btn-nav btn-logout">Logout</button>
        </div>
    </div>

    <div class="input-group">
        <label class="section-label">Message Caption:</label>
        <textarea id="caption" placeholder="Enter message caption here..."></textarea>
    </div>

    <div class="input-group">
        <label class="section-label">File Attachments:</label>
        <input type="file" id="fileInput" multiple>
        <div id="fileListPreview" style="margin-top:8px; text-align:left; font-size:13px; color:var(--text-muted);"></div>
    </div>

    <div class="input-group">
        <label class="section-label">Select Recipients:</label>
        
        <div class="global-select-bar">
            <input type="checkbox" id="selectAllBox" onchange="toggleSelectAll(this)">
            <label for="selectAllBox" style="cursor:pointer; user-select:none;">Select All Members</label>
        </div>

        <!-- Ministry Fast Checklists -->
        <div class="ministry-select-grid">
            <div class="ministry-select-item">
                <input type="checkbox" id="chk-jam" onchange="toggleMinistryGroup('JAM', this)">
                <label for="chk-jam">JAM Ministry</label>
            </div>
            <div class="ministry-select-item">
                <input type="checkbox" id="chk-via" onchange="toggleMinistryGroup('VIA', this)">
                <label for="chk-via">VIA Ministry</label>
            </div>
            <div class="ministry-select-item">
                <input type="checkbox" id="chk-man" onchange="toggleMinistryGroup('MAN', this)">
                <label for="chk-man">MAN Ministry</label>
            </div>
            <div class="ministry-select-item">
                <input type="checkbox" id="chk-team" onchange="toggleMinistryGroup('TEAM', this)">
                <label for="chk-team">TEAM Ministry</label>
            </div>
        </div>

        <div id="emailContainer" class="scroller-box">
            <span style="color: var(--text-muted); font-size:14px;">Loading members...</span>
        </div>
    </div>

    <div class="schedule-panel">
        <div class="schedule-toggle-container" onclick="toggleScheduleView()">
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="isScheduled" style="pointer-events: none;">
                <label style="cursor:pointer; font-weight: 600; font-size: 14px; user-select:none;">📅 Schedule this announcement</label>
            </div>
            <span id="angleIndicator" style="color: var(--text-muted); font-size: 12px;">▶</span>
        </div>
        <div id="scheduleFields" class="schedule-fields">
            <label class="section-label" style="color: var(--warning); margin-top: 10px;">Dispatch Date & Time:</label>
            <input type="datetime-local" id="scheduledTimestamp">
        </div>
    </div>

    <button id="sendBtn" class="send-btn" onclick="processAnnouncementDispatch()">Send Announcement</button>
    <p id="status"></p>
</div>

<!-- Custom Layout Modal Layer -->
<div id="customModal" class="custom-modal-overlay">
    <div class="custom-modal-box">
        <div id="customModalText" class="custom-modal-text"></div>
        <div id="customModalActions" class="custom-modal-actions"></div>
    </div>
</div>

<script>
    if (sessionStorage.getItem("bypassPassword") === "true") {
        sessionStorage.setItem("isAllowed", "true");
        sessionStorage.removeItem("bypassPassword");
    } else {
        if (sessionStorage.getItem("isAllowed") !== "true") {
            window.location.href = "login.html";
        }
    }

    const GET_EMAILS_URL = "https://script.google.com/macros/s/AKfycbz7xG5gki0Jr8TidIbKKpT8YM52XDxTK_6JN2XcX7xESn8ABgdp98E_Q9WS2D8geKfB/exec"; 
    const SEND_EMAILS_URL = "https://script.google.com/macros/s/AKfycbxCmeDGNmRD0Z_FJm6LM897IC-oN0DGuh_R-kLz-49pseLEAL4ftx8tzwtvtBaGNT1dEA/exec";

    let emailList = [];
    let autoLoadedPdf = null;

    // Custom non-blocking Promise alert wrapper
    function alert(message) {
        return new Promise((resolve) => {
            const overlay = document.getElementById('customModal');
            const textContainer = document.getElementById('customModalText');
            const actionsContainer = document.getElementById('customModalActions');
            
            textContainer.innerText = message;
            actionsContainer.innerHTML = '';
            
            const okBtn = document.createElement('button');
            okBtn.className = 'custom-modal-btn custom-modal-btn-primary';
            okBtn.innerText = 'OK';
            okBtn.onclick = () => {
                overlay.classList.remove('modal-active');
                resolve();
            };
            
            actionsContainer.appendChild(okBtn);
            overlay.classList.add('modal-active');
        });
    }

    function handleLogout() {
        sessionStorage.removeItem("isAllowed");
        window.location.href = "login.html";
    }

    function toggleScheduleView() {
        const checkbox = document.getElementById("isScheduled");
        checkbox.checked = !checkbox.checked;
        handleScheduleCheckbox(checkbox);
    }

    function handleScheduleCheckbox(cb) {
        const fields = document.getElementById("scheduleFields");
        const angle = document.getElementById("angleIndicator");
        const sendBtn = document.getElementById("sendBtn");

        if (cb.checked) {
            fields.classList.add("visible");
            angle.innerText = "▼";
            sendBtn.innerText = "📅 Queue Scheduled Announcement";
            sendBtn.classList.add("scheduled-mode");
            
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            document.getElementById("scheduledTimestamp").value = `${year}-${month}-${day}T${hours}:${minutes}`;
        } else {
            fields.classList.remove("visible");
            angle.innerText = "▶";
            sendBtn.innerText = "Send Announcement";
            sendBtn.classList.remove("scheduled-mode");
        }
    }

    async function loadEmailsFromSheet() {
        try {
            const response = await fetch(GET_EMAILS_URL);
            emailList = await response.json();

            renderEmailList();

            const isAutoMode = localStorage.getItem("autoAnnouncementMode") === "true";
            if (isAutoMode) {
                document.getElementById("selectAllBox").checked = true;
                document.querySelectorAll(".emailCheck").forEach(cb => {
                    cb.checked = true;
                });
                // Synced master ministry boxes state if select all mode triggered automatically
                document.getElementById("chk-jam").checked = true;
                document.getElementById("chk-via").checked = true;
                document.getElementById("chk-man").checked = true;
                document.getElementById("chk-team").checked = true;
                
                localStorage.removeItem("autoAnnouncementMode");
            }
        } catch (error) {
            console.error("Error fetching emails:", error);
            document.getElementById("emailContainer").innerText = "❌ Failed to load members.";
        }
    }

    function renderEmailList() {
        const container = document.getElementById("emailContainer");
        container.innerHTML = "";

        if (emailList.length === 0) {
            container.innerText = "No members found.";
            return;
        }

        const groups = { "JAM": [], "VIA": [], "MAN": [], "TEAM": [], "DANCE": [], "OTHERS": [] };

        emailList.forEach((item, index) => {
            const min = (item.ministry || "").toUpperCase().trim();
            if (groups[min]) { groups[min].push({ item, index }); } 
            else { groups[min] = [{ item, index }]; }
        });

        Object.keys(groups).forEach(category => {
            const listInGroup = groups[category];
            if (listInGroup.length === 0) return;

            const headerDiv = document.createElement("div");
            headerDiv.className = "category-header";
            headerDiv.innerText = category;
            container.appendChild(headerDiv);

            const table = document.createElement("table");
            table.className = "directory-table";
            
            let tableRowsHtml = "";
            listInGroup.forEach(({ item, index }) => {
                tableRowsHtml += `
                    <tr>
                        <td class="col-check">
                            <input type="checkbox" class="emailCheck" value="${item.email}" data-index="${index}" data-ministry="${category}">
                        </td>
                        <td class="col-name">${item.name}</td>
                    </tr>
                `;
            });
            
            table.innerHTML = tableRowsHtml;
            container.appendChild(table);
        });
    }

    function toggleSelectAll(master) {
        const checkboxes = document.querySelectorAll(".emailCheck");
        checkboxes.forEach(cb => { cb.checked = master.checked; });
        
        // Match the ministry fast-check boxes to the Select All checkbox value
        document.getElementById("chk-jam").checked = master.checked;
        document.getElementById("chk-via").checked = master.checked;
        document.getElementById("chk-man").checked = master.checked;
        document.getElementById("chk-team").checked = master.checked;
    }

    function toggleMinistryGroup(ministryName, master) {
        const checkboxes = document.querySelectorAll(`.emailCheck[data-ministry="${ministryName}"]`);
        checkboxes.forEach(cb => { cb.checked = master.checked; });
        
        // Handle global select state evaluation logic smoothly
        const allBoxes = document.querySelectorAll(".emailCheck");
        const allChecked = Array.from(allBoxes).every(cb => cb.checked);
        document.getElementById("selectAllBox").checked = allChecked;
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function processAnnouncementDispatch() {
        const isScheduled = document.getElementById("isScheduled").checked;
        if (isScheduled) {
            executeScheduleCommit();
        } else {
            sendAnnouncementInstant();
        }
    }

    async function executeScheduleCommit() {
        const caption = document.getElementById("caption").value;
        const fileInput = document.getElementById("fileInput");
        const targetTime = document.getElementById("scheduledTimestamp").value;
        const status = document.getElementById("status");
        const sendBtn = document.getElementById("sendBtn");

        const selected = Array.from(document.querySelectorAll(".emailCheck:checked")).map(cb => cb.value);

        sendBtn.disabled = true;

        if (selected.length === 0) {
            sendBtn.disabled = false;
            await alert("Please select at least one recipient.");
            return;
        }
        if (!caption) {
            sendBtn.disabled = false;
            await alert("Please enter a caption.");
            return;
        }
        if (!targetTime) {
            sendBtn.disabled = false;
            await alert("Please select a valid date and time.");
            return;
        }

        status.style.color = "var(--warning)";
        status.innerText = "⏳ Saving schedule to Google Sheets...";

        let attachments = [];
        if (fileInput.files.length > 0) {
            for (let file of fileInput.files) {
                const base64Data = await getBase64(file);
                attachments.push({
                    fileName: file.name,
                    fileType: file.type,
                    fileContent: base64Data.split(",")[1]
                });
            }
        } else if (autoLoadedPdf) {
            if (Array.isArray(autoLoadedPdf)) {
                attachments.push(...autoLoadedPdf);
            } else {
                attachments.push(autoLoadedPdf);
            }
        }

        const uniqueId = "SCH-" + Date.now() + "-" + Math.random().toString(36).substr(2, 9);

        const schedulePayload = {
            action: "registerSchedule",
            scheduleId: uniqueId, 
            recipients: selected, 
            message: caption,
            scheduledTime: targetTime, 
            attachments: attachments
        };

        try {
            const response = await fetch(SEND_EMAILS_URL, {
                method: "POST",
                body: JSON.stringify(schedulePayload)
            });
            
            const responseText = await response.text();
            
            if (responseText.includes("SUCCESS_SCHEDULED")) {
                status.innerText = "📅 Success! Announcement schedule locked and saved to cloud.";
                status.style.color = "var(--success)";
                resetFormState();
            } else {
                throw new Error(responseText);
            }
        } catch (error) {
            console.error(error);
            status.innerText = "❌ Connection failed: " + error.message;
            status.style.color = "var(--danger)";
            sendBtn.disabled = false;
        }
    }

    async function sendAnnouncementInstant() {
        const caption = document.getElementById("caption").value;
        const fileInput = document.getElementById("fileInput");
        const status = document.getElementById("status");
        const sendBtn = document.getElementById("sendBtn");

        const selected = Array.from(document.querySelectorAll(".emailCheck:checked")).map(cb => cb.value);

        sendBtn.disabled = true;

        if (selected.length === 0) {
            sendBtn.disabled = false;
            await alert("Please select at least one recipient.");
            return;
        }
        if (!caption) {
            sendBtn.disabled = false;
            await alert("Please enter a caption.");
            return;
        }

        status.style.color = "var(--text-muted)";
        status.innerText = "⏳ Sending...";

        let attachments = [];
        if (fileInput.files.length > 0) {
            for (let file of fileInput.files) {
                const base64Data = await getBase64(file);
                attachments.push({
                    fileName: file.name,
                    fileType: file.type,
                    fileContent: base64Data.split(",")[1]
                });
            }
        } else if (autoLoadedPdf) {
            if (Array.isArray(autoLoadedPdf)) {
                attachments.push(...autoLoadedPdf);
            } else {
                attachments.push(autoLoadedPdf);
            }
        }

        let successCount = 0;
        for (let i = 0; i < selected.length; i++) {
            const currentEmail = selected[i];
            status.innerText = `⏳ Sending to recipient ${i + 1} of ${selected.length}...`;

            const payload = {
                recipient: currentEmail,
                message: caption,
                attachments: attachments
            };

            try {
                const response = await fetch(SEND_EMAILS_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const resText = await response.text();
                if(resText === "SUCCESS") successCount++;
            } catch (error) {
                console.error(`Error sending announcement`, error);
            }
        }

        status.innerText = `✅ Finished! Successfully sent to ${successCount} members.`;
        status.style.color = "var(--success)";
        resetFormState();
    }

    function resetFormState() {
        document.getElementById("caption").value = "";
        const fileInput = document.getElementById("fileInput");
        fileInput.value = "";
        autoLoadedPdf = null;
        const note = document.getElementById("pdfStagedNote");
        if (note) note.remove();
        fileInput.style.borderColor = "var(--border)";

        document.querySelectorAll(".emailCheck").forEach(cb => cb.checked = false);
        document.getElementById("selectAllBox").checked = false;
        
        // Reset ministry checkbox views
        document.getElementById("chk-jam").checked = false;
        document.getElementById("chk-via").checked = false;
        document.getElementById("chk-man").checked = false;
        document.getElementById("chk-team").checked = false;
        
        const scheduleCheckbox = document.getElementById("isScheduled");
        if(scheduleCheckbox.checked) {
            scheduleCheckbox.checked = false;
            handleScheduleCheckbox(scheduleCheckbox);
        }
        
        document.getElementById("sendBtn").disabled = false;
    }

    window.addEventListener('DOMContentLoaded', () => {
        const savedCaption = localStorage.getItem("autoLineupCaption");

        if (savedCaption) {
            document.getElementById("caption").value = savedCaption;
            localStorage.removeItem("autoLineupCaption");
        }
        const savedPdfBatch = localStorage.getItem("autoLineupPdfBatch");
        const savedPdf = localStorage.getItem("autoLineupPdf");

        if (savedPdfBatch) {
            autoLoadedPdf = JSON.parse(savedPdfBatch);
            localStorage.removeItem("autoLineupPdfBatch");

            const fileInput = document.getElementById("fileInput");
            fileInput.style.borderColor = "var(--success)";

            const note = document.createElement("div");
            note.id = "pdfStagedNote";
            note.style.color = "var(--success)";
            note.style.fontSize = "13px";
            note.style.marginTop = "6px";
            note.style.fontWeight = "600";
            note.style.textAlign = "left";
            note.innerHTML = `📎 ${autoLoadedPdf.length} poster(s) automatically attached`;

            fileInput.parentNode.appendChild(note);

        } else if (savedPdf) {
            autoLoadedPdf = [JSON.parse(savedPdf)];
            localStorage.removeItem("autoLineupPdf");

            const fileInput = document.getElementById("fileInput");
            fileInput.style.borderColor = "var(--success)";

            const note = document.createElement("div");
            note.id = "pdfStagedNote";
            note.style.color = "var(--success)";
            note.style.fontSize = "13px";
            note.style.marginTop = "6px";
            note.style.fontWeight = "600";
            note.style.textAlign = "left";
            note.innerHTML = `📎 1 poster automatically attached`;

            fileInput.parentNode.appendChild(note);
        }
    });

    document.getElementById("fileInput").addEventListener("change", function() {
        const preview = document.getElementById("fileListPreview");

        if (this.files.length > 0) {
            autoLoadedPdf = null;
            const note = document.getElementById("pdfStagedNote");
            if (note) note.remove();

            this.style.borderColor = "var(--border)";
            preview.innerHTML = "";

            Array.from(this.files).forEach(file => {
                preview.innerHTML += `
                    <div>📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)</div>
                `;
            });
        } else {
            preview.innerHTML = "";
        }
    });

    loadEmailsFromSheet();
</script>
</body>
</html>
