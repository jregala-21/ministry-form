<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcement Sender</title>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --card-bg: #141b2d;
            --border: #242f47;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #4f46e5;
            --accent-hover: #6366f1;
            --success: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px;
            width: 100%; 
            max-width: 550px; 
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
            margin-top: 20px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h3 { 
            margin: 0;
            color: #ffffff; 
            font-size: 22px; 
            font-weight: 700;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-nav {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        .btn-home {
            background: #1e293b;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-home:hover {
            background: #334155;
        }

        .btn-logout {
            background: var(--danger);
            color: white;
        }
        .btn-logout:hover {
            background: var(--danger-hover);
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label.section-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            display: block;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            background: #0f172a;
            color: #ffffff;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            resize: vertical;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        textarea:focus { 
            border-color: var(--accent); 
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .scroller-box {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 320px;
            overflow-y: auto;
            padding: 12px;
            text-align: left;
        }

        .category-header {
            font-size: 12px;
            font-weight: 700;
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 14px 0 8px 0;
            display: inline-block;
            letter-spacing: 0.05em;
        }
        .category-header:first-of-type {
            margin-top: 0;
        }

        .directory-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .directory-table td {
            padding: 6px 4px;
            font-size: 14px;
            color: #ffffff;
            vertical-align: middle;
            border-bottom: 1px solid rgba(36, 47, 71, 0.3);
        }

        .directory-table tr:last-child td {
            border-bottom: none;
        }

        .col-check {
            width: 30px;
            text-align: left;
        }

        .col-name {
            font-weight: 500;
            text-align: left;
            padding-right: 10px;
        }

        .col-email {
            color: var(--text-muted);
            text-align: left;
            font-size: 13px;
        }

        .directory-table input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
            cursor: pointer;
            margin: 0;
            display: block;
        }

        .global-select-bar {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
        }
        .global-select-bar input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            accent-color: var(--accent);
        }

        .send-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .send-btn:hover {
            background: var(--accent-hover);
        }
        .send-btn:disabled {
            background: #1e293b;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-weight: 500;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-actions">
        <h3>🔒 Announcement</h3>
        <div class="nav-buttons">
            <a href="index.html" class="btn-nav btn-home">Home</a>
            <button onclick="handleLogout()" class="btn-nav btn-logout">Logout</button>
        </div>
    </div>

    <div class="input-group">
        <label class="section-label">Message Caption:</label>
        <textarea id="caption" placeholder="Enter message caption here..."></textarea>
    </div>

    <div class="input-group">
        <label class="section-label">File Attachment:</label>
        <input type="file" id="fileInput">
    </div>

    <div class="input-group">
        <label class="section-label">Select Recipients:</label>
        
        <div class="global-select-bar">
            <input type="checkbox" id="selectAllBox" onchange="toggleSelectAll(this)">
            <label for="selectAllBox" style="cursor:pointer; user-select:none;">Select All</label>
        </div>

        <div id="emailContainer" class="scroller-box">
            <span style="color: var(--text-muted); font-size:14px;">Loading emails...</span>
        </div>
    </div>

    <button id="sendBtn" class="send-btn" onclick="sendAnnouncement()">Send Announcement</button>
    <p id="status"></p>
</div>

<script>
    // --- SECURITY ACCESS CONTROL CHECK ---
    if (sessionStorage.getItem("isAllowed") !== "true") {
        window.location.href = "login.html";
    }

    const GET_EMAILS_URL = "https://script.google.com/macros/s/AKfycbz7xG5gki0Jr8TidIbKKpT8YM52XDxTK_6JN2XcX7xESn8ABgdp98E_Q9WS2D8geKfB/exec"; 
    const SEND_EMAILS_URL = "https://script.google.com/macros/s/AKfycbxCmeDGNmRD0Z_FJm6LM897IC-oN0DGuh_R-kLz-49pseLEAL4ftx8tzwtvtBaGNT1dEA/exec";

    let emailList = [];

    function handleLogout() {
        sessionStorage.removeItem("isAllowed");
        window.location.href = "login.html";
    }

    async function loadEmailsFromSheet() {
        try {
            const response = await fetch(GET_EMAILS_URL);
            emailList = await response.json();
            renderEmailList();
        } catch (error) {
            console.error("Error fetching emails:", error);
            document.getElementById("emailContainer").innerText = "❌ Failed to load emails.";
        }
    }

    function renderEmailList() {
        const container = document.getElementById("emailContainer");
        container.innerHTML = "";

        if (emailList.length === 0) {
            container.innerText = "No emails found.";
            return;
        }

        const groups = {
            "JAM": [],
            "VIA": [],
            "MAN": [],
            "DANCE": [],
            "OTHERS": []
        };

        emailList.forEach((item, index) => {
            const min = (item.ministry || "").toUpperCase().trim();
            if (groups[min]) {
                groups[min].push({ item, index });
            } else {
                groups[min] = [{ item, index }];
            }
        });

        Object.keys(groups).forEach(category => {
            const listInGroup = groups[category];
            if (listInGroup.length === 0) return;

            const headerDiv = document.createElement("div");
            headerDiv.className = "category-header";
            headerDiv.innerText = category;
            container.appendChild(headerDiv);

            const table = document.createElement("table");
            table.className = "directory-table";
            
            let tableRowsHtml = "";
            listInGroup.forEach(({ item, index }) => {
                tableRowsHtml += `
                    <tr>
                        <td class="col-check">
                            <input type="checkbox" class="emailCheck" value="${item.email}" data-index="${index}" onchange="handleCheckboxChange(this)">
                        </td>
                        <td class="col-name">${item.name}</td>
                        <td class="col-email">(${item.email})</td>
                    </tr>
                `;
            });
            
            table.innerHTML = tableRowsHtml;
            container.appendChild(table);
        });
    }

    function handleCheckboxChange(checkbox) {
    }

    function toggleSelectAll(master) {
        const checkboxes = document.querySelectorAll(".emailCheck");
        checkboxes.forEach(cb => {
            cb.checked = master.checked;
        });
    }

    function getBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    async function sendAnnouncement() {
        const caption = document.getElementById("caption").value;
        const fileInput = document.getElementById("fileInput");
        const status = document.getElementById("status");
        const sendBtn = document.getElementById("sendBtn");

        const selected = Array.from(document.querySelectorAll(".emailCheck:checked")).map(cb => cb.value);

        if (selected.length === 0) {
            alert("Please select at least one recipient.");
            return;
        }
        if (!caption) {
            alert("Please enter a caption.");
            return;
        }

        sendBtn.disabled = true;
        status.style.color = "var(--text-muted)";
        status.innerText = "⏳ Sending...";

        let attachments = [];
        if (fileInput.files.length > 0) {
            for (let file of fileInput.files) {
                const base64Data = await getBase64(file);
                attachments.push({
                    fileName: file.name,
                    fileType: file.type,
                    fileContent: base64Data.split(",")[1]
                });
            }
        }

        let successCount = 0;
        for (let i = 0; i < selected.length; i++) {
            const currentEmail = selected[i];
            status.innerText = `⏳ Sending to ${i + 1} of ${selected.length}...`;

            const payload = {
                recipient: currentEmail,
                message: caption,
                attachments: attachments
            };

            try {
                await fetch(SEND_EMAILS_URL, {
                    method: "POST",
                    mode: "no-cors", 
                    body: JSON.stringify(payload)
                });
                successCount++;
            } catch (error) {
                console.error(`Error sending to ${currentEmail}`, error);
            }
        }

        status.innerText = `✅ Finished! Successfully sent to ${successCount} members.`;
        status.style.color = "var(--success)";

        document.getElementById("caption").value = "";
        fileInput.value = "";
        document.querySelectorAll(".emailCheck").forEach(cb => cb.checked = false);
        document.getElementById("selectAllBox").checked = false;
        sendBtn.disabled = false;
    }

    loadEmailsFromSheet();
</script>

</body>
</html>
