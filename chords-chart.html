<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Library Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --sidebar-width: 320px;
            --primary: #4f46e5;      /* Indigo */
            --primary-hover: #4338ca;
            --success: #10b981;      /* Emerald */
            --danger: #f43f5e;       /* Rose */
            --bg-dark: #0f172a;
            --bg-viewer: #1e293b;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
            color: #f8fafc;
        }

        /* --- Sidebar --- */
        .sidebar-wrapper { display: flex; position: relative; z-index: 100; }
        
        .sidebar {
            width: var(--sidebar-width); background: #ffffff; display: flex; flex-direction: column;
            box-shadow: 4px 0 10px rgba(0,0,0,0.3); color: #334155;
            transition: transform 0.3s ease; flex-shrink: 0; height: 100vh;
        }

        /* --- Toggle Button --- */
        .toggle-btn {
            position: absolute; left: var(--sidebar-width); top: 20px;
            width: 40px; height: 40px; background: var(--primary);
            color: white; border: none; border-radius: 0 6px 6px 0;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 3px 0 5px rgba(0,0,0,0.2);
            z-index: 101;
        }
        .toggle-btn:hover { background: var(--primary-hover); }

        /* --- Sidebar Content --- */
        .sidebar-header { padding: 15px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .home-btn {
            background: var(--success); border: none; border-radius: 4px;
            color: white; font-size: 10px; padding: 6px 12px; cursor: pointer;
            font-weight: 800; text-decoration: none; transition: 0.2s;
        }
        .home-btn:hover { background: #059669; transform: scale(1.05); }

        .search-container { padding: 10px 15px; background: #fff; border-bottom: 1px solid #e2e8f0; }
        .search-input { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 6px; font-size: 14px; box-sizing: border-box; }

        .upload-section { padding: 15px; background: #f8fafc; font-size: 11px; border-bottom: 1px solid #e2e8f0; }
        .upload-section label { color: var(--primary); font-weight: bold; }
        .upload-section input { width: 100%; margin-bottom: 8px; margin-top: 4px; }
        
        .btn-upload { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; 
            transition: 0.2s;
        }
        .btn-upload:hover { background: var(--primary-hover); }

        .song-list { flex-grow: 1; overflow-y: auto; padding: 10px; background: #fff; }
        .song-item { padding: 12px; margin-bottom: 5px; border-radius: 6px; cursor: pointer; border: 1px solid #e2e8f0; color: #1e293b; font-size: 14px; transition: 0.2s; }
        .song-item:hover { background: #f1f5f9; border-color: var(--primary); }
        .song-item.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* --- Main Content --- */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
        
        .toolbar { 
            padding: 10px 15px; background: #fff; color: #1e293b; 
            display: flex; align-items: center; gap: 10px; 
            border-bottom: 1px solid #cbd5e1; flex-wrap: wrap; 
        }

        .viewer-area { 
            flex-grow: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; background: var(--bg-viewer);
        }
        
        #chordDisplay {
            background: white; color: #1e293b;
            padding: 40px; border-radius: 8px;
            white-space: pre;
            font-family: 'Courier New', Courier, monospace; 
            font-size: 15px; line-height: 1.6;
            width: 100%; max-width: 850px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            overflow-x: auto;
        }

        /* Chart Styling */
        .chord { color: var(--primary); font-weight: bold; }
        .label { font-weight: bold; color: var(--danger); text-transform: uppercase; display: block; margin-top: 15px; border-bottom: 1px solid #fee2e2; }

        .player-bar { padding: 15px; background: white; border-top: 1px solid #e2e8f0; width: 100%; box-sizing: border-box; }

        /* --- Responsive Queries --- */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; transform: translateX(-100%); z-index: 200; }
            .sidebar.active { transform: translateX(0); }
            .toggle-btn { left: 0; }
            .sidebar.active + .toggle-btn { left: var(--sidebar-width); }
            #chordDisplay { padding: 20px; font-size: 3.8vw; margin-bottom: 80px; }
            .toolbar { justify-content: center; }
        }

        @media (min-width: 769px) {
            .sidebar.collapsed { margin-left: calc(var(--sidebar-width) * -1); }
            .sidebar.collapsed + .toggle-btn { left: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 style="margin:0; color:var(--primary)">🎵 Library</h3>
                <button class="home-btn" onclick="goHome()">🏠 HOME</button>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search song library...">
            </div>
            <div class="upload-section">
                <label>TITLE</label>
                <input type="text" id="songTitle">
                <label>FILES</label>
                <input type="file" id="pdfFile" accept=".pdf">
                <input type="file" id="audioFile" accept=".mp3">
                <button class="btn-upload" onclick="addNewSong()" id="uploadBtn">🚀 UPLOAD SONG</button>
            </div>
            <div class="song-list" id="songList"></div>
        </div>
        <button class="toggle-btn" onclick="toggleSidebar()" id="tglIcon">▶</button>
    </div>

    <div class="main-content">
        <div class="toolbar" id="toolbar" style="display:none;">
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="font-size:11px; font-weight:bold; color:var(--primary);">TRANSPOSE:</label>
                <select id="transposeSelect" onchange="applyTransposition()" style="padding:6px; border-radius:6px; border:1px solid #cbd5e1; background:#f8fafc; font-weight:bold; cursor:pointer;"></select>
            </div>
            <span id="originalKeyDisplay" style="font-size:11px; color:var(--text-muted); font-style:italic;"></span>
        </div>

        <div class="viewer-area">
            <div id="placeholder" style="text-align:center; margin-top:50px;">
                <h1 style="opacity: 0.05; font-size: 80px; margin: 0;">🎸</h1>
                <p style="color: var(--text-muted);">Select a song to display chords</p>
            </div>
            <pre id="chordDisplay"></pre>
        </div>

        <div class="player-bar">
            <small id="playingTitle" style="color:var(--primary); font-size:10px; font-weight:bold; display:block; margin-bottom:5px; text-transform:uppercase;">Not playing</small>
            <audio id="audioPlayer" controls style="width:100%; height:35px;"></audio>
        </div>
    </div>

<script>
    // [All your existing JavaScript logic remains exactly the same here]
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRsxz074A8laQ4BG0S4ORPpyIWzbqbeMOT-O-JJzdO80tuVk0-9FEDIm2t5fxAfY5YZg/exec";
    
    let myLibrary = [];
    let originalText = "";
    let detectedOriginalKey = "C";
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const flatMap = { 'Db': 'C#', 'Eb': 'D#', 'Gb': 'F#', 'Ab': 'G#', 'Bb': 'A#' };

    function goHome() { window.location.href = "index.html"; }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('tglIcon');
        if (window.innerWidth <= 768) { sidebar.classList.toggle('active'); } 
        else { sidebar.classList.toggle('collapsed'); }
        const isClosed = window.innerWidth <= 768 ? !sidebar.classList.contains('active') : sidebar.classList.contains('collapsed');
        btn.innerText = isClosed ? "▶" : "◀";
    }

    window.onload = loadLibrary;

    async function loadLibrary() {
        try {
            const resp = await fetch(SCRIPT_URL);
            myLibrary = await resp.json();
            renderList(myLibrary);
        } catch(e) { console.error("Load failed", e); }
    }

    function renderList(list) {
        const listContainer = document.getElementById('songList');
        listContainer.innerHTML = '';
        list.forEach(song => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `<strong>${song.title}</strong>`;
            item.onclick = () => {
                selectSong(song, item);
                if (window.innerWidth <= 768) toggleSidebar(); 
            };
            listContainer.appendChild(item);
        });
    }

    async function selectSong(song, element) {
        document.querySelectorAll('.song-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('placeholder').innerHTML = "<p style='color:#94a3b8'>Opening PDF...</p>";
        document.getElementById('chordDisplay').style.display = "none";

        try {
            const fileId = song.pdfUrl.match(/[-\w]{25,}/)[0];
            const resp = await fetch(`${SCRIPT_URL}?getPdf=${fileId}`);
            const json = await resp.json();
            const uint8Array = new Uint8Array(atob(json.data).split("").map(c => c.charCodeAt(0)));

            const pdf = await pdfjsLib.getDocument({data: uint8Array}).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                let lastY = -1;
                textContent.items.sort((a,b) => b.transform[5] - a.transform[5] || a.transform[4] - b.transform[4]);
                textContent.items.forEach(item => {
                    if (lastY !== -1 && Math.abs(lastY - item.transform[5]) > 5) fullText += "\n";
                    fullText += item.str + " ";
                    lastY = item.transform[5];
                });
                fullText += "\n\n";
            }
            originalText = fullText;

            const firstChordMatch = originalText.match(/\b[A-G][#b]?/);
            detectedOriginalKey = firstChordMatch ? (flatMap[firstChordMatch[0]] || firstChordMatch[0]) : "C";
            
            updateKeyDropdown();
            document.getElementById('placeholder').style.display = "none";
            document.getElementById('chordDisplay').style.display = "block";
            document.getElementById('toolbar').style.display = "flex";
            
            applyTransposition();
            if (song.audioUrl) {
                const player = document.getElementById('audioPlayer');
                player.src = song.audioUrl;
                document.getElementById('playingTitle').innerText = "PLAYING: " + song.title;
            }
        } catch (e) { document.getElementById('placeholder').innerText = "Error loading PDF."; }
    }

    function updateKeyDropdown() {
        const select = document.getElementById('transposeSelect');
        const display = document.getElementById('originalKeyDisplay');
        select.innerHTML = '';
        display.innerText = `Original Key: ${detectedOriginalKey}`;
        const startIdx = notes.indexOf(detectedOriginalKey);
        for (let i = 0; i < 12; i++) {
            const opt = document.createElement('option');
            const targetKey = notes[(startIdx + i) % 12];
            opt.value = i;
            opt.text = targetKey + (i === 0 ? " (Orig)" : "");
            select.appendChild(opt);
        }
    }

    function applyTransposition() {
        const steps = parseInt(document.getElementById('transposeSelect').value);
        const display = document.getElementById('chordDisplay');
        const labels = /\b(VERSE|CHORUS|BRIDGE|INTRO|OUTRO|TAG)\b/gi;
        let formatted = originalText.replace(labels, m => `<span class="label">${m}</span>`);
        const chordRegex = /\b([A-G][#b]?(m|maj|min|sus|add|dim|aug|7|9|13)?(\/[A-G][#b]?)?)\b/g;
        display.innerHTML = formatted.replace(chordRegex, match => `<span class="chord">${transpose(match, steps)}</span>`);
    }

    function transpose(chord, steps) {
        return chord.replace(/[A-G][#b]?/g, m => {
            let root = flatMap[m] || m;
            let idx = notes.indexOf(root);
            return idx === -1 ? m : notes[(idx + steps + 12) % 12];
        });
    }

    async function addNewSong() {
        const title = document.getElementById('songTitle').value;
        const pdfFile = document.getElementById('pdfFile').files[0];
        const audioFile = document.getElementById('audioFile').files[0];
        const btn = document.getElementById('uploadBtn');
        if (!title || !pdfFile) return alert("Title and PDF required");
        btn.innerText = "UPLOADING..."; btn.disabled = true;
        const toBase64 = f => new Promise(r => { const rd = new FileReader(); rd.readAsDataURL(f); rd.onload = () => r(rd.result.split(',')[1]); });
        try {
            const payload = { title, pdfBase64: await toBase64(pdfFile), audioBase64: audioFile ? await toBase64(audioFile) : null };
            await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            location.reload();
        } catch (e) { alert("Upload failed"); btn.disabled = false; btn.innerText = "UPLOAD SONG"; }
    }
</script>
</body>
</html>
