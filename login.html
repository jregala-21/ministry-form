<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Access</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #6d28d9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 320px;
        }

        h3 { color: #333; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        input:focus { border-color: #4f46e5; box-shadow: 0 0 5px rgba(79, 70, 229, 0.3); }

        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.2s;
        }

        button:hover { background: #4338ca; }

        #error-msg {
            color: #ef4444;
            font-size: 14px;
            margin-top: 15px;
            display: none;
            font-weight: 500;
        }

        /* Styling for the Back Button */
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-btn:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h3>🔒 Admin Access</h3>
    <input type="password" id="passInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Unlock Library</button>
    <p id="error-msg">❌ Incorrect password!</p>
    
    <a href="index.html" class="back-btn">← Back to Homepage</a>
</div>

<script>
    function checkPassword() {
        const pass = document.getElementById('passInput').value;
        const MASTER_PASS = "JILTAGUIG123"; // <--- Your Password

        if (pass === MASTER_PASS) {
            sessionStorage.setItem("isAllowed", "true");
            window.location.href = "announcement.html"; 
        } else {
            const error = document.getElementById('error-msg');
            error.style.display = 'block';
            document.getElementById('passInput').value = "";
        }
    }

    // Press Enter to submit
    document.getElementById("passInput").addEventListener("keyup", function(event) {
        if (event.key === "Enter") checkPassword();
    });
</script>

</body>
</html>
