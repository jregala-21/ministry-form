<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIL Taguig Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#0f172a">
    <meta name="apple-mobile-web-app-title" content="JIL Portal">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.75);
            --border: rgba(51, 65, 85, 0.8);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Preserved Button Core Colors */
            --via-blue: #4f46e5;
            --via-blue-hover: #4338ca;
            --jam-green: #10b981;
            --jam-green-hover: #059669;
            --man-orange: #f59e0b;
            --man-orange-hover: #d97706;
            --preacher-dark: #374151;
            --preacher-dark-hover: #1f2937;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* --- FULL SCREEN BACKGROUND SLIDESHOW STYLING --- */
        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            overflow: hidden;
            background-color: var(--bg);
        }

        /* Smooth Tint Overlay to ensure text readability */
        .slideshow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle, rgba(15, 23, 42, 0.45) 0%, rgba(15, 23, 42, 0.75) 100%);
            transition: opacity 0.4s ease;
        }

        .slide-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            transform: scale(1.02);
        }

        .slide-img.active {
            opacity: 1;
        }

        /* --- FLOATING TOGGLE VISIBILITY BUTTON --- */
        .view-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.25s ease;
        }

        .view-toggle-btn:hover {
            transform: scale(1.08);
            background: var(--via-blue);
            border-color: #6366f1;
        }

        /* Portal UI Card Container */
        .container {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px; 
            border-radius: 24px;
            width: 100%; 
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            text-align: center;
            box-sizing: border-box;
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        /* State Class to hide the entire Main Menu Panel cleanly */
        .container.hidden-view {
            opacity: 0;
            transform: translateY(15px);
            visibility: hidden;
        }

        /* Lighten the tint slightly when checking out the slideshow full-screen */
        .slideshow-overlay.clear-view {
            opacity: 0.35;
        }

        h2 { 
            margin-top: 0;
            margin-bottom: 25px; 
            color: #fff; 
            font-size: 26px; 
            font-weight: 700;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Main Menu Buttons Base Structure */
        .menu-btn {
            width: 100%; 
            padding: 16px; 
            margin: 8px 0;
            background: rgba(30, 41, 59, 0.6); 
            color: var(--text-main); 
            border: 1px solid var(--border);
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700;
            font-size: 16px; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            box-sizing: border-box;
            text-decoration: none;
        }

        .menu-btn:hover { 
            background: #273549; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
        }

        /* Portal Selection Specific Buttons */
        .btn-portal-selection {
            background: rgba(15, 23, 42, 0.4);
            color: #fff;
            border: 2px solid var(--border);
            padding: 20px;
            font-size: 18px;
        }
        .btn-portal-selection:hover {
            background: rgba(79, 70, 229, 0.15);
            color: #818cf8;
            border-color: #6366f1;
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.25);
        }

        /* Prominent Style for History Button on Home Page */
        .btn-history-home {
            background: var(--man-orange);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
        }
        .btn-history-home:hover {
            background: var(--man-orange-hover);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.25);
        }

        /* Category Colors */
        .btn-via { background: var(--via-blue); color: white; border: none; }
        .btn-via:hover { background: var(--via-blue-hover); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25); }

        .btn-jam { background: var(--jam-green); color: white; border: none; }
        .btn-jam:hover { background: var(--jam-green-hover); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25); }

        /* Secondary MAN layout configurations */
        .btn-man { background: var(--man-orange); color: white; border: none; }
        .btn-man:hover { background: var(--man-orange-hover); box-shadow: 0 8px 20px rgba(245, 158, 11, 0.25); }

        .btn-preacher { background: var(--preacher-dark); color: white; border: none; }
        .btn-preacher:hover { background: var(--preacher-dark-hover); box-shadow: 0 8px 20px rgba(55, 65, 81, 0.25); }

        /* Back Button Style */
        .btn-back {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #fff; }

        /* Submenu Styling */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 20px;
        }

        .submenu.active {
            max-height: 300px; 
            opacity: 1;
            margin: 10px 0;
        }

        .sub-btn {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border);
            color: var(--text-main);
            font-size: 14px;
            padding: 12px;
            justify-content: center;
        }

        .sub-btn:hover { 
            background: var(--card-bg); 
            border-color: #475569;
            color: #fff;
        }

        /* View State Management */
        .portal-section { display: none; }
        .portal-section.active-view { 
            display: block; 
            animation: fadeIn 0.3s ease;
        }

        .footer { margin-top: 35px; font-size: 12px; color: var(--text-muted); letter-spacing: 0.02em; }
        .arrow { font-size: 11px; transition: transform 0.25s ease; display: inline-block; width: 12px; text-align: center; }
        .rotate { transform: rotate(180deg); }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            h2 { font-size: 22px; }
        }
    </style>
</head>
<body>

<button class="view-toggle-btn" id="viewToggleBtn" onclick="toggleMenuInterface()" title="Toggle Slideshow View Only">
    <i class="fa-solid fa-eye-slash" id="toggleIcon"></i>
</button>

<div class="slideshow-container" id="slideshowContainer"></div>
<div class="slideshow-overlay" id="slideshowOverlay"></div>

<div class="container" id="portalContainer">
    <h2>⛪ JIL TAGUIG PORTAL</h2>

    <div id="selectionView" class="portal-section active-view">
        <p style="color: var(--text-muted); margin-bottom: 25px; font-weight: 500; font-size: 14px;">Please select your access gateway:</p>
        
        <button class="menu-btn btn-portal-selection" onclick="switchView('wanmanView')">
            🎵 WAN-MAN PORTAL
        </button>
        
        <button class="menu-btn btn-portal-selection" onclick="switchView('pastorsView')">
            💼 PASTORS / ADMIN PORTAL
        </button>

        <button class="menu-btn btn-history-home" onclick="location.href='album'">
            📖 View JIL Taguig History
        </button>

        <button class="menu-btn btn-history-home" onclick="location.href='announcement'">
            📧 Line Up / Announcement Sender
        </button>
    </div>

    <div id="wanmanView" class="portal-section">
        <button class="btn-back" onclick="switchView('selectionView')">⬅️ Back to Main Menu</button>
        
        <button class="menu-btn btn-via" onclick="toggleMenu('viaMenu', 'viaArrow')">
            ⭐ VIA <span id="viaArrow" class="arrow">▼</span>
        </button>
        <div id="viaMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='lineup_creator'">📝 Lineup Creator</button>
            <button class="menu-btn sub-btn" onclick="location.href='voice_tracks'">🎤 Vocal Key Track</button>
            <button class="menu-btn sub-btn" onclick="location.href='lyrics'">🎤 Lyrics Setlist/Viewer</button>
        </div>

        <button class="menu-btn btn-jam" onclick="toggleMenu('jamMenu', 'jamArrow')">
            🎸 JAM <span id="jamArrow" class="arrow">▼</span>
        </button>
        <div id="jamMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='chords-chart'">🎼 Chords Chart</button>
            <button class="menu-btn sub-btn" onclick="location.href='Setlist'">🎼 Setlist</button>
        </div>

        <button class="menu-btn btn-man" onclick="toggleMenu('manMenu', 'manArrow')">
            🎛️ MAN <span id="manArrow" class="arrow">▼</span>
        </button>
        <div id="manMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='raw_file'">📁 Upload RAW files</button>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">

        <button class="menu-btn" onclick="location.href='video_meet'">📋 Video Conference</button>
        <button class="menu-btn" onclick="location.href='index - Copy'">📋 Ministry Form</button>
        <button class="menu-btn" onclick="location.href='lineup_viewer'">📋 View Saved Lineups</button>
    </div>

    <div id="pastorsView" class="portal-section">
        <button class="btn-back" onclick="switchView('selectionView')">⬅️ Back to Main Menu</button>

        <button class="menu-btn btn-man" onclick="toggleMenu('schedulerMenu', 'schedulerArrow')">
            📅 Scheduler <span id="schedulerArrow" class="arrow">▼</span>
        </button>

        <div id="schedulerMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='schedule_maker'">
                🖥️ Sunday / Midweek Scheduler
            </button>

            <button class="menu-btn sub-btn" onclick="location.href='schedule_wan'">
                🎸 JAM/VIA Scheduler
            </button>
        </div>

        <button class="menu-btn btn-via" onclick="location.href='info'">
            ℹ️ WAN-MAN Information
        </button>

        <button class="menu-btn btn-preacher" onclick="toggleMenu('preachMenu', 'preachArrow')">
            📖 Pastors / Pulpit Ministers <span id="preachArrow" class="arrow">▼</span>
        </button>
        <div id="preachMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='preacher_upload'">📤 Upload Your File / Teaching</button>
        </div>
    </div>

    <div class="footer">
        Digital WAN-MAN Portal &bull; 2026
    </div>
</div>

<script>
    // --- SHOW / HIDE ALL MENU BUTTONS HANDLING ---
    function toggleMenuInterface() {
        const portalContainer = document.getElementById("portalContainer");
        const slideshowOverlay = document.getElementById("slideshowOverlay");
        const toggleIcon = document.getElementById("toggleIcon");

        portalContainer.classList.toggle("hidden-view");
        slideshowOverlay.classList.toggle("clear-view");

        if (portalContainer.classList.contains("hidden-view")) {
            toggleIcon.className = "fa-solid fa-eye"; 
        } else {
            toggleIcon.className = "fa-solid fa-eye-slash"; 
        }
    }


    // --- RANDOMIZED STREAMING IMAGE SCANNER ENGINE ---
    const slideshowContainer = document.getElementById("slideshowContainer");
    const extensions = ['.jpg', '.jpeg', '.png'];
    
    let verifiedImages = [];
    let currentSlideIndex = 0;
    let slideshowTimeoutId = null;
    let slideshowStarted = false;

    function getOrdinalSuffix(n) {
        return n + (n % 10 == 1 && n % 100 != 11 ? 'st' : (n % 10 == 2 && n % 100 != 12 ? 'nd' : (n % 10 == 3 && n % 100 != 13 ? 'rd' : 'th')));
    }

    // Phase 1: Compile all target image path combinations
    let prospectivePaths = [];

    // Compile Anniversary paths (16th to 50th)
    for (let year = 16; year <= 50; year++) {
        const yearWord = getOrdinalSuffix(year);
        for (let imgNum = 1; imgNum <= 30; imgNum++) {
            extensions.forEach(ext => {
                prospectivePaths.push(`JIL/1st-15th/${yearWord}_image${imgNum}${ext}`);
            });
        }
    }

    // Compile old historic legacy profiles (old_image1 to old_image30)
    for (let oldNum = 1; oldNum <= 30; oldNum++) {
        extensions.forEach(ext => {
            prospectivePaths.push(`JIL/1st-15th/old_image${oldNum}${ext}`);
        });
    }

    // CRITICAL: Randomize the scan path array before starting to search!
    // This makes sure the browser discovers images in a completely mixed up order.
    for (let i = prospectivePaths.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = prospectivePaths[i];
        prospectivePaths[i] = prospectivePaths[j];
        prospectivePaths[j] = temp;
    }

    // Phase 2: Asynchronous streaming loop
    function scanAndVerifyFiles(index) {
        if (index >= prospectivePaths.length) {
            return; // Search complete
        }

        const targetUrl = prospectivePaths[index];
        const checkImg = new Image();

        checkImg.onload = function() {
            const slideElement = document.createElement("img");
            slideElement.src = targetUrl;
            slideElement.className = "slide-img";
            slideElement.alt = "JIL Background Asset";
            slideshowContainer.appendChild(slideElement);
            
            // Push discovered images directly into our live playlist array
            verifiedImages.push(slideElement);
            
            // STREAMING RANDOMIZER: Show the absolute first image discovered instantly
            if (!slideshowStarted) {
                slideshowStarted = true;
                slideElement.classList.add("active");
                currentSlideIndex = 0;
            } 
            // Kick off the running slideshow as soon as a second image is discovered
            else if (verifiedImages.length === 2 && !slideshowTimeoutId) {
                scheduleVariableSlide();
            }

            // Continue checking next path item down the randomized configuration chain
            setTimeout(() => scanAndVerifyFiles(index + 1), 10);
        };

        checkImg.onerror = function() {
            // Check next random configuration option
            scanAndVerifyFiles(index + 1);
        };

        checkImg.src = targetUrl;
    }

    // Phase 3: Infinite variable slide transitions
    function transitionSlide() {
        if (verifiedImages.length <= 1) return;

        // Fade out active element frame index
        verifiedImages[currentSlideIndex].classList.remove("active");

        // advance to next index item. If it reaches the end, it wraps around.
        currentSlideIndex = (currentSlideIndex + 1) % verifiedImages.length;

        // Fade in new array image asset
        verifiedImages[currentSlideIndex].classList.add("active");

        scheduleVariableSlide();
    }

    function scheduleVariableSlide() {
        if (slideshowTimeoutId) clearTimeout(slideshowTimeoutId);

        // Dynamic delay range explicitly chosen between 2 and 4 seconds
        const variableDelay = Math.floor(Math.random() * (4000 - 2000 + 1)) + 2000;
        
        slideshowTimeoutId = setTimeout(transitionSlide, variableDelay);
    }

    // Start background random stream checker immediately on page start
    scanAndVerifyFiles(0);


    // --- VIEW AND PORTAL TOGGLE HANDLERS ---
    function switchView(viewId) {
        document.querySelectorAll('.portal-section').forEach(view => {
            view.classList.remove('active-view');
        });
        
        document.querySelectorAll('.submenu').forEach(m => m.classList.remove("active"));
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove("rotate"));

        document.getElementById(viewId).classList.add('active-view');
    }

    function toggleMenu(menuId, arrowId) {
        const menu = document.getElementById(menuId);
        const arrow = document.getElementById(arrowId);
        const isActive = menu.classList.contains("active");

        document.querySelectorAll('.submenu').forEach(m => m.classList.remove("active"));
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove("rotate"));

        if (!isActive) {
            menu.classList.add("active");
            arrow.classList.add("rotate");
        }
    }

    // Register the Service Worker for PWA installation
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered successfully.'))
                .catch(err => console.log('Service Worker registration failed:', err));
        });
    }
</script>
</body>
</html>
