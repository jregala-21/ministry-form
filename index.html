<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIL Taguig Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #6d28d9);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
        }

        .container {
            background: #ffffff; padding: 40px; border-radius: 24px;
            width: 100%; max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { margin-bottom: 30px; color: #1f2937; font-size: 26px; }

        /* Main Menu Buttons */
        .menu-btn {
            width: 100%; padding: 16px; margin: 8px 0;
            background: #f3f4f6; color: #374151; border: none;
            border-radius: 12px; cursor: pointer; font-weight: 700;
            font-size: 16px; transition: 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-sizing: border-box;
            text-decoration: none;
        }

        .menu-btn:hover { background: #e5e7eb; transform: translateY(-2px); }

        /* Portal Selection Specific Buttons */
        .btn-portal-selection {
            background: #ffffff;
            color: #4f46e5;
            border: 2px solid #4f46e5;
            padding: 20px;
            font-size: 18px;
        }
        .btn-portal-selection:hover {
            background: #4f46e5;
            color: #ffffff;
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3);
        }

        /* New Prominent Style for History Button on Home Page */
        .btn-history-home {
            background: #f59e0b;
            color: white;
            padding: 16px;
            font-size: 16px;
        }
        .btn-history-home:hover {
            background: #d97706;
            box-shadow: 0 8px 15px rgba(245, 158, 11, 0.3);
        }

        /* Category Colors */
        .btn-via { background: #4f46e5; color: white; }
        .btn-via:hover { background: #4338ca; box-shadow: 0 8px 15px rgba(79, 70, 229, 0.3); }

        .btn-jam { background: #10b981; color: white; }
        .btn-jam:hover { background: #059669; box-shadow: 0 8px 15px rgba(16, 185, 129, 0.3); }

        /* Secondary MAN layout configurations */
        .btn-man { background: #f59e0b; color: white; }
        .btn-man:hover { background: #d97706; box-shadow: 0 8px 15px rgba(245, 158, 11, 0.3); }

        .btn-preacher { background: #374151; color: white; }
        .btn-preacher:hover { background: #1f2937; box-shadow: 0 8px 15px rgba(55, 65, 81, 0.3); }

        /* Back Button Style */
        .btn-back {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 15px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-back:hover { color: #1f2937; }

        /* Submenu Styling */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease, margin 0.3s ease;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-left: 20px;
        }

        .submenu.active {
            max-height: 300px; 
            opacity: 1;
            margin: 10px 0;
        }

        .sub-btn {
            background: #ffffff;
            border: 2px solid #eef2ff;
            color: #4b5563;
            font-size: 14px;
            padding: 12px;
        }

        .sub-btn:hover { background: #f9fafb; border-color: #d1d5db; }

        /* View State Management */
        .portal-section { display: none; }
        .portal-section.active-view { display: block; }

        .footer { margin-top: 30px; font-size: 12px; color: #9ca3af; }
        .arrow { font-size: 12px; transition: 0.3s; }
        .rotate { transform: rotate(180deg); }
    </style>
</head>
<body>

<div class="container">
    <h2>⛪ JIL TAGUIG PORTAL</h2>

    <div id="selectionView" class="portal-section active-view">
        <p style="color: #6b7280; margin-bottom: 25px; font-weight: 500;">Please select your access gateway:</p>
        
        <button class="menu-btn btn-portal-selection" onclick="switchView('wanmanView')">
            🎵 WAN-MAN PORTAL
        </button>
        
        <button class="menu-btn btn-portal-selection" onclick="switchView('pastorsView')">
            💼 PASTORS / ADMIN PORTAL
        </button>

        <button class="menu-btn btn-history-home" onclick="location.href='Album.html'">
            📖 View JIL Taguig History
        </button>
    </div>

    <div id="wanmanView" class="portal-section">
        <button class="btn-back" onclick="switchView('selectionView')">⬅️ Back to Main Menu</button>
        
        <button class="menu-btn btn-via" onclick="toggleMenu('viaMenu', 'viaArrow')">
            ⭐ VIA <span id="viaArrow" class="arrow">▼</span>
        </button>
        <div id="viaMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='lineup_creator.html'">📝 Lineup Creator</button>
            <button class="menu-btn sub-btn" onclick="location.href='voice_tracks.html'">🎤 Vocal Key Track</button>
            <button class="menu-btn sub-btn" onclick="location.href='lyrics.html'">🎤 Lyrics Setlist/Viewer</button>
        </div>

        <button class="menu-btn btn-jam" onclick="toggleMenu('jamMenu', 'jamArrow')">
            🎸 JAM <span id="jamArrow" class="arrow">▼</span>
        </button>
        <div id="jamMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='chords-chart.html'">🎼 Chords Chart</button>
            <button class="menu-btn sub-btn" onclick="location.href='Setlist.html'">🎼 Setlist</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <button class="menu-btn" onclick="location.href='video_meet.html'">📋 Video Conference</button>
        <button class="menu-btn" onclick="location.href='index - Copy.html'">📋 Ministry Form</button>
        <button class="menu-btn" onclick="location.href='lineup_viewer.html'">📋 View Saved Lineups</button>
        <button class="menu-btn" onclick="location.href='announcement.html'">📧 Line Up / Announcement Sender</button>
    </div>

    <div id="pastorsView" class="portal-section">
        <button class="btn-back" onclick="switchView('selectionView')">⬅️ Back to Main Menu</button>

        <button class="menu-btn btn-man" onclick="location.href='schedule_maker.html'">
            🖥️ Sunday / Midweek Scheduler
        </button>

        <button class="menu-btn btn-preacher" onclick="toggleMenu('preachMenu', 'preachArrow')">
            📖 Pastors / Pulpit Ministers <span id="preachArrow" class="arrow">▼</span>
        </button>
        <div id="preachMenu" class="submenu">
            <button class="menu-btn sub-btn" onclick="location.href='preacher_upload.html'">📤 Upload Your File / Teaching</button>
        </div>
    </div>

    <div class="footer">
        Digital WAN-MAN Portal &bull; 2026
    </div>
</div>

<script>
    function switchView(viewId) {
        document.querySelectorAll('.portal-section').forEach(view => {
            view.classList.remove('active-view');
        });
        
        document.querySelectorAll('.submenu').forEach(m => m.classList.remove("active"));
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove("rotate"));

        document.getElementById(viewId).classList.add('active-view');
    }

    function toggleMenu(menuId, arrowId) {
        const menu = document.getElementById(menuId);
        const arrow = document.getElementById(arrowId);
        const isActive = menu.classList.contains("active");

        document.querySelectorAll('.submenu').forEach(m => m.classList.remove("active"));
        document.querySelectorAll('.arrow').forEach(a => a.classList.remove("rotate"));

        if (!isActive) {
            menu.classList.add("active");
            arrow.classList.add("rotate");
        }
    }
</script>

</body>
</html>
