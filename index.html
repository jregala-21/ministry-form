<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Manager - Home</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4f46e5, #6d28d9);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .home-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .icon-circle {
            background: #f0eeff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
            color: #1a1a1a;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 14px 30px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            width: 85%;
            box-sizing: border-box;
        }

        /* Primary Button (Main Action) */
        .btn-primary {
            background: #4f46e5;
            color: white;
        }

        .btn-primary:hover {
            background: #4338ca;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        /* Secondary/Outline Buttons */
        .btn-secondary {
            background: transparent;
            color: #4f46e5;
            border: 2px solid #4f46e5;
        }

        .btn-secondary:hover {
            background: #f0eeff;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="home-container">
        <div class="icon-circle">🎵</div>
        <h1>JIL WAN-MAN TAGUIG PORTAL</h1>
        <p>Welcome to WAN-MAN portal. Access your chord library, send captions, or manage ministry forms.</p>
        
        <div class="button-group">
            <!-- <a href="announcement.html" class="btn btn-primary">Send Lineup/Announcement →</a> -->
            
            <a href="chords-chart.html" class="btn btn-secondary">Chords Chart 🎸</a>

            <a href="index - Copy.html" class="btn btn-secondary">Ministry Form 📋</a>
        </div>

        <div class="footer-text">Let us improved the ministry of God</div>
    </div>

</body>
</html>
