<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Archives</title>
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #f43f5e;
            --success: #10b981;
            --bg-gradient: linear-gradient(135deg, #4f46e5, #6d28d9);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0; padding: 15px; color: #1e293b;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { text-align: center; color: white; margin-bottom: 25px; }
        
        /* SEARCH STYLES */
        .search-container {
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }

        .lineup-card {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative; border-left: 5px solid var(--primary);
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .date { font-size: 1.1rem; font-weight: 800; color: var(--primary); display: block; }
        .leader { font-size: 0.85rem; color: #64748b; font-weight: 600; }

        .action-btns { display: flex; gap: 8px; }

        .btn-delete {
            background: #fff1f2; color: var(--danger); border: 1px solid #fecdd3;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
            font-size: 11px; font-weight: bold;
        }

        .btn-edit {
            background: #eef2ff; color: var(--primary); border: 1px solid #c7d2fe;
            padding: 6px 12px; border-radius: 6px; cursor: pointer;
            font-size: 11px; font-weight: bold;
        }

        .verse-box {
            background: #f1f5f9; padding: 10px; border-radius: 8px;
            font-size: 13px; color: #475569; font-style: italic;
            margin-bottom: 15px; border-left: 3px solid #cbd5e1;
        }

        .song-box { background: #f8fafc; padding: 12px; border-radius: 8px; margin-top: 10px; }
        .sec-label { font-size: 9px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .song-list { margin: 4px 0 0 0; padding: 0; list-style: none; }
        .song-entry { font-size: 13px; font-weight: 600; margin-bottom: 4px; display: flex; flex-direction: column; }
        .song-link { font-size: 11px; color: #6366f1; text-decoration: none; font-weight: normal; margin-top: 2px; }
        .back-btn { margin-top: 30px; color: white; text-decoration: none; font-size: 13px; opacity: 0.8; }
        hr { border: 0; border-top: 1px solid #e2e8f0; margin: 10px 0; }

        /* MODAL STYLES */
        .modal {
            display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 500px; border-radius: 12px; padding: 20px;
            max-height: 85vh; overflow-y: auto;
        }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: #e2e8f0; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }

        .search-wrapper {
        position: relative;
        width: 100%;
        max-width: 600px;
    }

    #suggestions {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: white;
        border-radius: 0 0 8px 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        z-index: 50;
        max-height: 200px;
        overflow-y: auto;
        display: none; /* Hidden by default */
    }

    .suggestion-item {
        padding: 12px 15px;
        cursor: pointer;
        font-size: 14px;
        border-bottom: 1px solid #f1f5f9;
    }

    .suggestion-item:hover {
        background-color: #f8fafc;
        color: var(--primary);
        font-weight: bold;
    }
    </style>
</head>
<body>

    <div class="header">
        <h1>📋 Service Archives</h1>
    </div>

    <!-- NEW SEARCH BOX -->
    <div class="search-wrapper">
    <div class="search-container" style="max-width: 100%; margin-bottom: 0;">
        <input type="text" id="searchInput" 
               placeholder="Search by Leader Name..." 
               onkeyup="filterByLeader()" 
               onclick="showSuggestions()"
               autocomplete="off">
    </div>
    <div id="suggestions"></div>
</div>

    <div class="container" id="lineupContainer">
        <div style="color:white; text-align:center;">Loading archives...</div>
    </div>

    <a href="index.html" class="back-btn">← Back to Dashboard</a>

    <!-- Edit Modal (Same as before) -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div style="font-weight:bold; margin-bottom:15px; color:var(--primary);">Edit Lineup</div>
            <input type="hidden" id="editTimestamp">
            <textarea id="editVerse" placeholder="Bible Verse" style="width:100%; margin-bottom:10px;"></textarea>
            <input type="text" id="editIntro" placeholder="Intro" style="width:100%; margin-bottom:10px;">
            <input type="text" id="editPraise" placeholder="Praise" style="width:100%; margin-bottom:10px;">
            <input type="text" id="editWorship" placeholder="Worship" style="width:100%; margin-bottom:10px;">
            <input type="text" id="editMinisterial" placeholder="Ministerial" style="width:100%; margin-bottom:10px;">
            <input type="text" id="editVictory" placeholder="Victory" style="width:100%; margin-bottom:10px;">
            <input type="text" id="editClosing" placeholder="Closing" style="width:100%; margin-bottom:10px;">
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" id="saveBtn" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const FETCH_URL = "https://script.google.com/macros/s/AKfycbyZ0YIviyQ3Rgky0yd71cBdbFwkcDfAl0Ht9UzJDkgcuyskgLPr-XajW9D-xJKL09Uu/exec";
        const ACTION_URL = "https://script.google.com/macros/s/AKfycbxlP1F2b8rvEAawOF6vVe_y9N0Ku-zuTclILzhb780Hf_dEb_6lmJgfW8hKiSR7d60M/exec";

        let allLineups = []; // To store data for searching

        async function loadData() {
            try {
                const res = await fetch(`${FETCH_URL}?viewLineups=true`);
                allLineups = await res.json();
                render(allLineups);
            } catch (e) {
                document.getElementById('lineupContainer').innerHTML = "<div style='color:white'>Failed to load lineups.</div>";
            }
        }

        // NEW: Search Filtering Logic
        function filterByLeader() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allLineups.filter(item => 
                (item.leader || "").toLowerCase().includes(query)
            );
            render(filtered);
        }

        function render(list) {
            const cont = document.getElementById('lineupContainer');
            cont.innerHTML = '';
            
            if(list.length === 0) {
                cont.innerHTML = "<div style='color:white; text-align:center;'>No matching records found.</div>";
                return;
            }

            // Slice and reverse so newest is on top
            [...list].reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = 'lineup-card';
                
                const sections = [
                    createSection("Intro", item.intro),
                    createSection("Praise", item.praise),
                    createSection("Worship", item.worship),
                    createSection("Ministerial", item.ministerial),
                    createSection("Victory", item.victory),
                    createSection("Closing", item.closing)
                ].filter(h => h !== "").join('<hr>');

                card.innerHTML = `
                    <div class="card-top">
                        <div>
                            <span class="date">${item.date || 'No Date'}</span>
                            <span class="leader">🎤 ${item.leader || 'No Leader'}</span>
                        </div>
                        <div class="action-btns">
                            <button class="btn-edit" onclick="openEdit('${item.timestamp}')">EDIT</button>
                            <button class="btn-delete" onclick="deleteItem('${item.timestamp}', this)">DELETE</button>
                        </div>
                    </div>
                    ${item.verse ? `<div class="verse-box">📖 ${item.verse}</div>` : ''}
                    <div class="song-box">${sections}</div>
                `;
                cont.appendChild(card);
            });
        }

        function createSection(label, dataString) {
            if (!dataString || dataString.trim() === "" || dataString.trim() === "|") return "";
            const parts = dataString.split('|');
            const titles = parts[0] ? parts[0].split(',').map(s => s.trim()).filter(s => s !== "") : [];
            const links = parts[1] ? parts[1].split(',').map(s => s.trim()).filter(s => s !== "") : [];
            if (titles.length === 0) return "";
            
            let html = `<div class="section-item"><span class="sec-label">${label}</span><ul class="song-list">`;
            titles.forEach((t, i) => {
                html += `<li class="song-entry">${t}`;
                if (links[i] && links[i] !== "undefined" && links[i].startsWith("http")) {
                    html += `<a href="${links[i]}" target="_blank" class="song-link">🔗 View Link</a>`;
                }
                html += `</li>`;
            });
            html += `</ul></div>`;
            return html;
        }

        // --- Keep your existing openEdit, closeModal, saveEdit, and deleteItem functions here ---
        function openEdit(timestamp) {
            const item = allLineups.find(i => i.timestamp === timestamp);
            if (!item) return;
            document.getElementById('editTimestamp').value = timestamp;
            document.getElementById('editVerse').value = item.verse || "";
            document.getElementById('editIntro').value = item.intro || "";
            document.getElementById('editPraise').value = item.praise || "";
            document.getElementById('editWorship').value = item.worship || "";
            document.getElementById('editMinisterial').value = item.ministerial || "";
            document.getElementById('editVictory').value = item.victory || "";
            document.getElementById('editClosing').value = item.closing || "";
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        async function saveEdit() {
            const btn = document.getElementById('saveBtn');
            const updatedItem = {
                action: "editLineup",
                timestamp: document.getElementById('editTimestamp').value,
                verse: document.getElementById('editVerse').value,
                intro: document.getElementById('editIntro').value,
                praise: document.getElementById('editPraise').value,
                worship: document.getElementById('editWorship').value,
                ministerial: document.getElementById('editMinisterial').value,
                victory: document.getElementById('editVictory').value,
                closing: document.getElementById('editClosing').value
            };
            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                await fetch(ACTION_URL, { method: "POST", body: JSON.stringify(updatedItem) });
                location.reload();
            } catch (e) { alert("Update failed."); btn.innerText = "Save Changes"; btn.disabled = false; }
        }

        async function deleteItem(timestamp, btn) {
            if(!confirm("Delete this?")) return;
            btn.innerText = "..."; btn.disabled = true;
            try {
                await fetch(ACTION_URL, { method: "POST", body: JSON.stringify({ action: "deleteLineup", timestamp: timestamp }) });
                location.reload();
            } catch (e) { alert("Delete failed."); btn.innerText = "DELETE"; btn.disabled = false; }
        }

        loadData();

// Show unique leader names when clicking the search bar
    function showSuggestions() {
        const suggBox = document.getElementById('suggestions');
        const input = document.getElementById('searchInput');
        
        // Get unique leader names from allLineups
        const leaders = [...new Set(allLineups.map(item => item.leader))]
                        .filter(name => name && name.trim() !== "")
                        .sort();

        if (leaders.length === 0) return;

        suggBox.innerHTML = '';
        leaders.forEach(name => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.textContent = name;
            div.onclick = function() {
                input.value = name;
                suggBox.style.display = 'none';
                filterByLeader();
            };
            suggBox.appendChild(div);
        });

        suggBox.style.display = 'block';
    }

    // Hide suggestions when clicking outside
    document.addEventListener('click', function(e) {
        const wrapper = document.querySelector('.search-wrapper');
        if (!wrapper.contains(e.target)) {
            document.getElementById('suggestions').style.display = 'none';
        }
    });

    // Update filterByLeader to also handle the suggestions
    function filterByLeader() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const suggBox = document.getElementById('suggestions');
        
        // Filter the UI cards
        const filtered = allLineups.filter(item => 
            (item.leader || "").toLowerCase().includes(query)
        );
        render(filtered);

        // Also filter the suggestion list while typing
        const items = document.querySelectorAll('.suggestion-item');
        let hasVisible = false;
        items.forEach(item => {
            if (item.textContent.toLowerCase().includes(query)) {
                item.style.display = 'block';
                hasVisible = true;
            } else {
                item.style.display = 'none';
            }
        });
        
        suggBox.style.display = hasVisible ? 'block' : 'none';
    }
    </script>
</body>
</html>
